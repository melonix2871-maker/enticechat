<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global P2P Chat - Works Anywhere!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1e1f22;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #111214;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
        }

        .workspace-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2b2d31;
            background: #111214;
        }

        .workspace-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workspace-status {
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .channels-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #949ba4;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .channel-list, .member-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .channel-item, .member-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .channel-item:hover, .member-item:hover {
            background: #2b2d31;
        }

        .channel-item.active {
            background: #2b2d31;
            color: #5865f2;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .member-status {
            font-size: 10px;
            margin-left: auto;
            color: #10b981;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1f22;
        }

        .chat-header {
            height: 64px;
            padding: 0 20px;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1f22;
        }

        .channel-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .channel-info p {
            font-size: 12px;
            color: #949ba4;
        }

        .huddle-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .huddle-button.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .huddle-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #949ba4;
        }

        .message-text {
            color: #dbdee1;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #2b2d31;
            background: #1e1f22;
        }

        .message-input-wrapper {
            background: #2b2d31;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .message-input {
            width: 100%;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .huddle-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }

        .huddle-modal.active {
            display: flex;
        }

        .huddle-header {
            background: #111214;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b2d31;
        }

        .huddle-title {
            font-size: 18px;
            font-weight: 600;
        }

        .huddle-controls {
            display: flex;
            gap: 12px;
        }

        .huddle-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            background: #1a1a1a;
        }

        .video-container {
            position: relative;
            background: #2b2d31;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 1;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            background: #2b2d31;
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .leave-huddle {
            background: #dc2626;
            color: white;
            padding: 8px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .connection-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2b2d31;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1f22;
        }

        ::-webkit-scrollbar-thumb {
            background: #2b2d31;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="workspace-header">
                <div class="workspace-name">
                    <span id="workspaceName">Global Chat</span>
                </div>
                <div class="workspace-status">
                    <span class="status-indicator"></span>
                    <span id="connectionStatus">Connecting...</span>
                </div>
            </div>
            
            <div class="channels-section">
                <div class="section-header">
                    <span>Channels</span>
                </div>
                <ul class="channel-list" id="channelList"></ul>
                
                <div class="section-header">
                    <span>🌍 Active Users Worldwide — <span id="activeUserCount">0</span></span>
                </div>
                <ul class="member-list" id="memberList">
                    <li style="padding: 12px; color: #949ba4; text-align: center;">Waiting for users...</li>
                </ul>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h2 id="currentChannelName"># general</h2>
                    <p id="currentChannelTopic">Global discussions</p>
                </div>
                <button class="huddle-button" id="huddleButton">
                    🎙️ Start Huddle
                </button>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="input-area">
                <div class="message-input-wrapper">
                    <textarea class="message-input" id="messageInput" placeholder="Message #general" rows="1" onkeydown="handleMessageKeydown(event)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="huddleModal" class="huddle-modal">
        <div class="huddle-header">
            <div class="huddle-title">🎙️ Huddle - Live Conversation <span id="huddleUserCount">0</span> participants</div>
            <div class="huddle-controls">
                <button class="control-btn" id="huddleAudioBtn" style="background: #10b981;">🎤</button>
                <button class="control-btn" id="huddleVideoBtn" style="background: #10b981;">📹</button>
                <button class="control-btn">🖥️</button>
                <button class="leave-huddle">Leave Huddle</button>
            </div>
        </div>
        <div class="huddle-grid" id="huddleGrid"></div>
    </div>

    <div class="connection-badge" id="connectionBadge">
        <span>🔗</span>
        <span id="roomUrlDisplay"></span>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'global-chat-' + Math.random().toString(36).substring(7);
        const username = urlParams.get('username') || `User_${Math.floor(Math.random() * 1000)}`;
        
        // Update URL without reload to show room
        if (!urlParams.get('room')) {
            const newUrl = `${window.location.pathname}?room=${roomName}&username=${username}`;
            window.history.replaceState({}, '', newUrl);
        }
        
        // Global state
        let currentChannel = 'general';
        let messages = [];
        let users = new Map();
        let localStream = null;
        let peerConnections = new Map();
        let inHuddle = false;
        let currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        let socket = null;
        let reconnectAttempts = 0;
        
        // Public signaling server (using a free service)
        // You can replace this with your own server
        const SIGNALING_SERVER = 'https://broadcastchannel.onrender.com';
        
        // WebRTC Configuration
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };
        
        // Initialize WebSocket connection
        function initWebSocket() {
            // Using a free public WebSocket echo server for signaling
            // In production, use a proper signaling server
            socket = io('wss://webrtc-signaling-server-1.onrender.com', {
                transports: ['websocket'],
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 1000
            });
            
            socket.on('connect', () => {
                console.log('Connected to signaling server');
                updateConnectionStatus(true, 'Connected');
                
                // Join room
                socket.emit('join-room', {
                    room: roomName,
                    userId: currentUserId,
                    username: username
                });
                
                reconnectAttempts = 0;
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                reconnectAttempts++;
                if (reconnectAttempts > 5) {
                    updateConnectionStatus(false, 'Using P2P fallback');
                    // Fallback to direct WebRTC with STUN only
                }
            });
            
            socket.on('user-joined', (data) => {
                if (data.userId !== currentUserId) {
                    addUser(data.userId, data.username);
                    addSystemMessage(`🌍 ${data.username} joined from ${data.location || 'somewhere'}`);
                }
            });
            
            socket.on('user-left', (data) => {
                removeUser(data.userId);
                addSystemMessage(`👋 ${data.username} left the room`);
            });
            
            socket.on('active-users', (usersList) => {
                // Update users list from server
                users.clear();
                usersList.forEach(user => {
                    if (user.userId !== currentUserId) {
                        users.set(user.userId, user);
                    }
                });
                updateUserList();
            });
            
            socket.on('offer', async (data) => {
                await handleOffer(data.from, data.offer);
            });
            
            socket.on('answer', async (data) => {
                await handleAnswer(data.from, data.answer);
            });
            
            socket.on('ice-candidate', async (data) => {
                await handleIceCandidate(data.from, data.candidate);
            });
            
            socket.on('chat-message', (data) => {
                addMessageToChat(data.username, data.message, data.time);
            });
            
            socket.on('user-count', (count) => {
                document.getElementById('activeUserCount').textContent = count;
            });
        }
        
        function updateConnectionStatus(connected, message) {
            const statusEl = document.getElementById('connectionStatus');
            const indicator = document.querySelector('.status-indicator');
            if (connected) {
                statusEl.innerHTML = message || '● Online';
                statusEl.style.color = '#10b981';
                indicator.style.background = '#10b981';
            } else {
                statusEl.innerHTML = message || '○ Offline';
                statusEl.style.color = '#ef4444';
                indicator.style.background = '#ef4444';
            }
        }
        
        // User management
        function addUser(userId, userName) {
            if (userId === currentUserId) return;
            
            const userData = {
                userId: userId,
                username: userName,
                online: true,
                joinedAt: Date.now()
            };
            users.set(userId, userData);
            updateUserList();
            
            // If in huddle, connect to new user
            if (inHuddle && localStream) {
                setTimeout(() => {
                    createPeerConnection(userId, true);
                }, 1000);
            }
        }
        
        function removeUser(userId) {
            const user = users.get(userId);
            if (user) {
                users.delete(userId);
                updateUserList();
                
                // Remove video if in huddle
                if (inHuddle) {
                    removeVideoElement(userId);
                    if (peerConnections.has(userId)) {
                        peerConnections.get(userId).close();
                        peerConnections.delete(userId);
                    }
                }
            }
        }
        
        function updateUserList() {
            const memberList = document.getElementById('memberList');
            const activeCount = users.size;
            document.getElementById('activeUserCount').textContent = activeCount;
            
            if (activeCount === 0) {
                memberList.innerHTML = '<li style="padding: 12px; color: #949ba4; text-align: center;">No other users online</li>';
                return;
            }
            
            const allUsers = Array.from(users.values())
                .sort((a, b) => a.username.localeCompare(b.username));
            
            memberList.innerHTML = allUsers.map(user => `
                <li class="member-item">
                    <span class="online-dot"></span>
                    <span class="channel-name">${escapeHtml(user.username)}</span>
                    <span class="member-status">online</span>
                </li>
            `).join('');
        }
        
        // WebRTC Peer Connection
        async function createPeerConnection(peerId, isInitiator) {
            if (peerConnections.has(peerId)) return;
            if (peerId === currentUserId) return;
            
            const pc = new RTCPeerConnection(configuration);
            peerConnections.set(peerId, pc);
            
            // Add local stream tracks
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }
            
            // Handle incoming tracks
            pc.ontrack = (event) => {
                const remoteStream = event.streams[0];
                const user = users.get(peerId);
                addVideoElement(peerId, remoteStream, user?.username || 'Peer');
            };
            
            // Handle ICE candidates
            pc.onicecandidate = (event) => {
                if (event.candidate && socket) {
                    socket.emit('ice-candidate', {
                        to: peerId,
                        from: currentUserId,
                        candidate: event.candidate,
                        room: roomName
                    });
                }
            };
            
            // Handle connection state
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    const user = users.get(peerId);
                    if (user) {
                        console.log(`Video connected with ${user.username}`);
                    }
                } else if (pc.connectionState === 'disconnected') {
                    removeVideoElement(peerId);
                }
            };
            
            if (isInitiator && socket) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('offer', {
                    to: peerId,
                    from: currentUserId,
                    offer: offer,
                    room: roomName
                });
            }
            
            return pc;
        }
        
        async function handleOffer(peerId, offer) {
            const pc = await createPeerConnection(peerId, false);
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                if (socket) {
                    socket.emit('answer', {
                        to: peerId,
                        from: currentUserId,
                        answer: answer,
                        room: roomName
                    });
                }
            }
        }
        
        async function handleAnswer(peerId, answer) {
            const pc = peerConnections.get(peerId);
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        }
        
        async function handleIceCandidate(peerId, candidate) {
            const pc = peerConnections.get(peerId);
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(candidate));
            }
        }
        
        // Video grid management
        function addVideoElement(userId, stream, username) {
            const grid = document.getElementById('huddleGrid');
            let container = document.getElementById(`video-${userId}`);
            
            if (!container) {
                container = document.createElement('div');
                container.className = 'video-container';
                container.id = `video-${userId}`;
                
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.srcObject = stream;
                
                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = username;
                
                container.appendChild(video);
                container.appendChild(label);
                grid.appendChild(container);
                
                updateHuddleUserCount();
            }
        }
        
        function removeVideoElement(userId) {
            const container = document.getElementById(`video-${userId}`);
            if (container) {
                container.remove();
                updateHuddleUserCount();
            }
        }
        
        function updateHuddleUserCount() {
            const count = document.querySelectorAll('#huddleGrid .video-container').length;
            document.getElementById('huddleUserCount').textContent = count;
        }
        
        // Start/Stop Huddle
        async function startHuddle() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                addVideoElement(currentUserId, localStream, `${username} (You)`);
                
                // Create connections with all existing users
                for (let [userId, user] of users) {
                    if (userId !== currentUserId) {
                        await createPeerConnection(userId, true);
                    }
                }
                
                inHuddle = true;
                const huddleBtn = document.getElementById('huddleButton');
                huddleBtn.classList.add('active');
                huddleBtn.innerHTML = '🔴 End Huddle';
                document.getElementById('huddleModal').classList.add('active');
                
                // Setup modal controls
                setupModalControls();
                
                addSystemMessage('🎙️ Huddle started! You can now talk with everyone in the room.');
            } catch (err) {
                console.error('Error starting huddle:', err);
                addSystemMessage('❌ Cannot access camera/microphone. Please check permissions.');
            }
        }
        
        function setupModalControls() {
            const audioBtn = document.getElementById('huddleAudioBtn');
            const videoBtn = document.getElementById('huddleVideoBtn');
            const screenBtn = document.querySelector('#huddleModal .huddle-controls .control-btn:nth-child(3)');
            const leaveBtn = document.querySelector('#huddleModal .leave-huddle');
            
            audioBtn.onclick = toggleHuddleAudio;
            videoBtn.onclick = toggleHuddleVideo;
            screenBtn.onclick = toggleHuddleScreen;
            leaveBtn.onclick = stopHuddle;
        }
        
        function stopHuddle() {
            // Close all peer connections
            peerConnections.forEach((pc, userId) => {
                pc.close();
            });
            peerConnections.clear();
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Clear video grid
            document.getElementById('huddleGrid').innerHTML = '';
            
            inHuddle = false;
            const huddleBtn = document.getElementById('huddleButton');
            huddleBtn.classList.remove('active');
            huddleBtn.innerHTML = '🎙️ Start Huddle';
            document.getElementById('huddleModal').classList.remove('active');
            
            addSystemMessage('🔇 Huddle ended.');
        }
        
        function toggleHuddle() {
            if (inHuddle) {
                stopHuddle();
            } else {
                startHuddle();
            }
        }
        
        function toggleHuddleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    const btn = document.getElementById('huddleAudioBtn');
                    if (audioTrack.enabled) {
                        btn.style.background = '#10b981';
                        btn.innerHTML = '🎤';
                        addSystemMessage('🎤 Microphone enabled');
                    } else {
                        btn.style.background = '#dc2626';
                        btn.innerHTML = '🔇';
                        addSystemMessage('🔇 Microphone muted');
                    }
                }
            }
        }
        
        function toggleHuddleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    const btn = document.getElementById('huddleVideoBtn');
                    if (videoTrack.enabled) {
                        btn.style.background = '#10b981';
                        btn.innerHTML = '📹';
                        addSystemMessage('📹 Camera enabled');
                    } else {
                        btn.style.background = '#dc2626';
                        btn.innerHTML = '📷❌';
                        addSystemMessage('📷 Camera disabled');
                    }
                }
            }
        }
        
        async function toggleHuddleScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                // Replace video track for all connections
                peerConnections.forEach((pc) => {
                    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                });
                
                // Update local video
                const localVideoContainer = document.getElementById(`video-${currentUserId}`);
                if (localVideoContainer) {
                    const video = localVideoContainer.querySelector('video');
                    if (video) video.srcObject = screenStream;
                }
                
                videoTrack.onended = () => {
                    // Restore camera
                    if (localStream) {
                        const cameraTrack = localStream.getVideoTracks()[0];
                        peerConnections.forEach((pc) => {
                            const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                            if (sender && cameraTrack) {
                                sender.replaceTrack(cameraTrack);
                            }
                        });
                        
                        const localVideoContainer = document.getElementById(`video-${currentUserId}`);
                        if (localVideoContainer) {
                            const video = localVideoContainer.querySelector('video');
                            if (video) video.srcObject = localStream;
                        }
                    }
                };
                
                addSystemMessage('🖥️ Screen sharing started');
            } catch (err) {
                console.error('Error sharing screen:', err);
                addSystemMessage('❌ Failed to share screen');
            }
        }
        
        // Chat functions
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const messageData = {
                username: username,
                message: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                room: roomName
            };
            
            addMessageToChat(username, text, messageData.time);
            
            if (socket) {
                socket.emit('chat-message', messageData);
            }
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function addMessageToChat(author, message, time) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${author.substring(0, 2).toUpperCase()}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(author)} ${author === username ? '(You)' : ''}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(message) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.opacity = '0.7';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Channels
        function renderChannels() {
            const channels = ['general', 'random', 'announcements', 'tech-talk'];
            const channelList = document.getElementById('channelList');
            channelList.innerHTML = channels.map(channel => `
                <li class="channel-item ${channel === currentChannel ? 'active' : ''}" onclick="switchChannel('${channel}')">
                    <span class="channel-icon">#</span>
                    <span class="channel-name">${channel}</span>
                </li>
            `).join('');
        }
        
        function switchChannel(channel) {
            currentChannel = channel;
            document.getElementById('currentChannelName').innerHTML = `# ${channel}`;
            document.getElementById('currentChannelTopic').innerHTML = `${channel} discussions`;
            renderChannels();
            
            document.getElementById('messagesContainer').innerHTML = '';
            addSystemMessage(`Switched to #${channel} channel`);
        }
        
        function handleMessageKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Display room URL
        document.getElementById('roomUrlDisplay').innerHTML = `Room: ${roomName}`;
        document.getElementById('workspaceName').innerHTML = `${roomName} 🌍`;
        
        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Initialize
        renderChannels();
        initWebSocket();
        
        addSystemMessage(`🎉 Welcome to ${roomName}! You are logged in as ${username}`);
        addSystemMessage(`🌍 This chat works ANYWHERE on the internet!`);
        addSystemMessage(`🔗 Share this URL with friends: ${window.location.href}`);
        addSystemMessage(`💡 Click "Start Huddle" to begin video conference with everyone in the room!`);
        addSystemMessage(`👥 Active users from around the world will appear here`);
        
        // Global function for huddle toggle
        window.toggleHuddle = toggleHuddle;
        window.toggleHuddleAudio = toggleHuddleAudio;
        window.toggleHuddleVideo = toggleHuddleVideo;
        window.toggleHuddleScreen = toggleHuddleScreen;
        window.stopHuddle = stopHuddle;
        window.switchChannel = switchChannel;
        
        document.getElementById('huddleButton').onclick = toggleHuddle;
    </script>
</body>
</html>
