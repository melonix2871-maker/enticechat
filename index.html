<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slack-like Team Chat with Huddle - P2P Conference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #1e1f22;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Layout */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #111214;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
        }

        .workspace-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2b2d31;
            background: #111214;
        }

        .workspace-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workspace-status {
            font-size: 12px;
            color: #10b981;
            margin-top: 4px;
        }

        /* Channels Section */
        .channels-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #949ba4;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .channel-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .channel-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .channel-item:hover {
            background: #2b2d31;
        }

        .channel-item.active {
            background: #2b2d31;
            color: #5865f2;
        }

        .channel-icon {
            font-size: 18px;
        }

        .channel-name {
            flex: 1;
            font-size: 15px;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1f22;
        }

        .chat-header {
            height: 64px;
            padding: 0 20px;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1f22;
        }

        .channel-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .channel-info p {
            font-size: 12px;
            color: #949ba4;
        }

        .huddle-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .huddle-button.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .huddle-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #949ba4;
        }

        .message-text {
            color: #dbdee1;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            border-top: 1px solid #2b2d31;
            background: #1e1f22;
        }

        .message-input-wrapper {
            background: #2b2d31;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .message-input {
            width: 100%;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #949ba4;
        }

        /* Huddle Modal - Video Conference */
        .huddle-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }

        .huddle-modal.active {
            display: flex;
        }

        .huddle-header {
            background: #111214;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b2d31;
        }

        .huddle-title {
            font-size: 18px;
            font-weight: 600;
        }

        .huddle-controls {
            display: flex;
            gap: 12px;
        }

        .huddle-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            background: #1a1a1a;
        }

        .video-container {
            position: relative;
            background: #2b2d31;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 1;
        }

        .video-audio-indicator {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            background: #2b2d31;
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn.active {
            background: #10b981;
        }

        .control-btn.muted {
            background: #dc2626;
        }

        .leave-huddle {
            background: #dc2626;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Peer List */
        .peer-list {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 12px;
            min-width: 150px;
            z-index: 100;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1f22;
        }

        ::-webkit-scrollbar-thumb {
            background: #2b2d31;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="workspace-header">
                <div class="workspace-name">
                    <span id="workspaceName">TeamHub</span>
                </div>
                <div class="workspace-status" id="workspaceStatus">● Online</div>
            </div>
            
            <div class="channels-section">
                <div class="section-header">
                    <span>Channels</span>
                </div>
                <ul class="channel-list" id="channelList"></ul>
                
                <div class="section-header">
                    <span>Active Users</span>
                </div>
                <ul class="member-list" id="memberList" style="list-style: none;"></ul>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h2 id="currentChannelName"># general</h2>
                    <p id="currentChannelTopic">General discussions</p>
                </div>
                <button class="huddle-button" id="huddleButton" onclick="toggleHuddle()">
                    🎙️ Start Huddle
                </button>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="input-area">
                <div class="message-input-wrapper">
                    <textarea class="message-input" id="messageInput" placeholder="Message #general" rows="1" onkeydown="handleMessageKeydown(event)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Huddle Modal -->
    <div id="huddleModal" class="huddle-modal">
        <div class="huddle-header">
            <div class="huddle-title">🎙️ Huddle - Live Conversation</div>
            <div class="huddle-controls">
                <button class="control-btn" id="huddleAudioBtn" onclick="toggleHuddleAudio()">🎤</button>
                <button class="control-btn" id="huddleVideoBtn" onclick="toggleHuddleVideo()">📹</button>
                <button class="control-btn" onclick="toggleHuddleScreen()">🖥️</button>
                <button class="leave-huddle" onclick="toggleHuddle()">Leave Huddle</button>
            </div>
        </div>
        <div class="huddle-grid" id="huddleGrid"></div>
    </div>

    <div class="peer-list" id="peerList">
        <div>👥 Active: <span id="peerCount">0</span></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'general';
        const username = urlParams.get('username') || `User_${Math.floor(Math.random() * 1000)}`;
        
        // Global state
        let currentChannel = 'general';
        let messages = [];
        let users = new Map();
        let localStream = null;
        let peerConnections = new Map();
        let inHuddle = false;
        let socket = null;
        let currentUserId = Math.random().toString(36).substring(7);
        
        // Initialize
        document.title = `${roomName} | Team Chat`;
        document.getElementById('workspaceName').innerHTML = `${roomName} <span style="font-size: 12px;">🏢</span>`;
        
        // Initialize socket connection with signaling server
        function initSocket() {
            // Using public signaling server - in production, use your own
            socket = io('https://webrtc-signaling-server.herokuapp.com/', {
                transports: ['websocket'],
                upgrade: false
            });
            
            socket.on('connect', () => {
                console.log('Connected to signaling server');
                socket.emit('join-room', { room: roomName, userId: currentUserId, username });
                addSystemMessage(`✅ Connected to room: ${roomName}`);
                updateUserList();
            });
            
            socket.on('user-joined', (data) => {
                users.set(data.userId, { userId: data.userId, username: data.username });
                updateUserList();
                addSystemMessage(`👤 ${data.username} joined the room`);
                
                if (inHuddle && localStream) {
                    createPeerConnection(data.userId, true);
                }
            });
            
            socket.on('user-left', (data) => {
                users.delete(data.userId);
                updateUserList();
                addSystemMessage(`👋 ${data.username} left the room`);
                
                if (peerConnections.has(data.userId)) {
                    peerConnections.get(data.userId).close();
                    peerConnections.delete(data.userId);
                }
                if (inHuddle) {
                    removeVideoElement(data.userId);
                }
            });
            
            socket.on('offer', async (data) => {
                await handleOffer(data);
            });
            
            socket.on('answer', async (data) => {
                const pc = peerConnections.get(data.from);
                if (pc) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
            
            socket.on('ice-candidate', (data) => {
                const pc = peerConnections.get(data.from);
                if (pc) {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
            
            socket.on('chat-message', (data) => {
                addMessageToChat(data.username, data.message, data.time);
            });
        }
        
        // Create peer connection for WebRTC
        async function createPeerConnection(peerId, isInitiator) {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            });
            
            peerConnections.set(peerId, pc);
            
            // Add local stream tracks
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }
            
            // Handle incoming tracks
            pc.ontrack = (event) => {
                const remoteStream = event.streams[0];
                addVideoElement(peerId, remoteStream, users.get(peerId)?.username || 'Peer');
            };
            
            // Handle ICE candidates
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', {
                        to: peerId,
                        from: currentUserId,
                        candidate: event.candidate,
                        room: roomName
                    });
                }
            };
            
            // Handle connection state
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    console.log(`Connected to peer: ${peerId}`);
                } else if (pc.connectionState === 'disconnected') {
                    removeVideoElement(peerId);
                }
            };
            
            if (isInitiator) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('offer', {
                    to: peerId,
                    from: currentUserId,
                    offer: offer,
                    room: roomName
                });
            }
            
            return pc;
        }
        
        async function handleOffer(data) {
            const pc = await createPeerConnection(data.from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', {
                to: data.from,
                from: currentUserId,
                answer: answer,
                room: roomName
            });
        }
        
        // Video grid management
        function addVideoElement(userId, stream, username) {
            const grid = document.getElementById('huddleGrid');
            let container = document.getElementById(`video-${userId}`);
            
            if (!container) {
                container = document.createElement('div');
                container.className = 'video-container';
                container.id = `video-${userId}`;
                
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.srcObject = stream;
                
                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = username;
                
                const audioIndicator = document.createElement('div');
                audioIndicator.className = 'video-audio-indicator';
                audioIndicator.innerHTML = '🔊';
                audioIndicator.style.display = 'none';
                
                container.appendChild(video);
                container.appendChild(label);
                container.appendChild(audioIndicator);
                grid.appendChild(container);
            }
        }
        
        function removeVideoElement(userId) {
            const container = document.getElementById(`video-${userId}`);
            if (container) {
                container.remove();
            }
        }
        
        // Start/Stop Huddle
        async function startHuddle() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addVideoElement(currentUserId, localStream, `${username} (You)`);
                
                // Create connections with all existing users
                for (let [userId, user] of users) {
                    if (userId !== currentUserId) {
                        await createPeerConnection(userId, true);
                    }
                }
                
                inHuddle = true;
                document.getElementById('huddleButton').classList.add('active');
                document.getElementById('huddleButton').innerHTML = '🔴 End Huddle';
                document.getElementById('huddleModal').classList.add('active');
                
                addSystemMessage('🎙️ Huddle started! You can now talk with everyone in the room.');
            } catch (err) {
                console.error('Error starting huddle:', err);
                addSystemMessage('❌ Cannot access camera/microphone. Please check permissions.');
            }
        }
        
        function stopHuddle() {
            // Close all peer connections
            peerConnections.forEach((pc, userId) => {
                pc.close();
            });
            peerConnections.clear();
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Clear video grid
            document.getElementById('huddleGrid').innerHTML = '';
            
            inHuddle = false;
            document.getElementById('huddleButton').classList.remove('active');
            document.getElementById('huddleButton').innerHTML = '🎙️ Start Huddle';
            document.getElementById('huddleModal').classList.remove('active');
            
            addSystemMessage('🔇 Huddle ended.');
        }
        
        function toggleHuddle() {
            if (inHuddle) {
                stopHuddle();
            } else {
                startHuddle();
            }
        }
        
        function toggleHuddleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    const btn = document.getElementById('huddleAudioBtn');
                    if (audioTrack.enabled) {
                        btn.classList.remove('muted');
                        btn.classList.add('active');
                        btn.innerHTML = '🎤';
                    } else {
                        btn.classList.remove('active');
                        btn.classList.add('muted');
                        btn.innerHTML = '🔇';
                    }
                }
            }
        }
        
        function toggleHuddleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    const btn = document.getElementById('huddleVideoBtn');
                    if (videoTrack.enabled) {
                        btn.classList.remove('muted');
                        btn.classList.add('active');
                        btn.innerHTML = '📹';
                    } else {
                        btn.classList.remove('active');
                        btn.classList.add('muted');
                        btn.innerHTML = '📷❌';
                    }
                }
            }
        }
        
        async function toggleHuddleScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                // Replace video track for all connections
                peerConnections.forEach((pc) => {
                    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                });
                
                videoTrack.onended = () => {
                    // Restore camera when screen share ends
                    if (localStream) {
                        const cameraTrack = localStream.getVideoTracks()[0];
                        peerConnections.forEach((pc) => {
                            const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                            if (sender && cameraTrack) {
                                sender.replaceTrack(cameraTrack);
                            }
                        });
                    }
                };
                
                addSystemMessage('🖥️ Screen sharing started');
            } catch (err) {
                console.error('Error sharing screen:', err);
            }
        }
        
        // Chat functions
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const message = {
                username: username,
                message: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                userId: currentUserId
            };
            
            messages.push(message);
            addMessageToChat(message.username, message.message, message.time);
            
            // Broadcast via socket
            socket.emit('chat-message', {
                room: roomName,
                ...message
            });
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function addMessageToChat(author, message, time) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${author.substring(0, 2).toUpperCase()}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(author)} ${author === username ? '(You)' : ''}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(message) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.opacity = '0.7';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Update UI
        function updateUserList() {
            const memberList = document.getElementById('memberList');
            const peerCount = users.size + 1;
            document.getElementById('peerCount').textContent = peerCount;
            
            const allUsers = [{ userId: currentUserId, username: username }, ...Array.from(users.values())];
            memberList.innerHTML = allUsers.map(user => `
                <li class="channel-item" style="padding: 4px 12px;">
                    <span class="channel-icon">👤</span>
                    <span class="channel-name">${escapeHtml(user.username)} ${user.userId === currentUserId ? '(You)' : ''}</span>
                    ${user.userId !== currentUserId && inHuddle ? '<span style="font-size: 10px;">🔊</span>' : ''}
                </li>
            `).join('');
        }
        
        // Channels
        function renderChannels() {
            const channels = ['general', 'random', 'announcements', 'tech-talk'];
            const channelList = document.getElementById('channelList');
            channelList.innerHTML = channels.map(channel => `
                <li class="channel-item ${channel === currentChannel ? 'active' : ''}" onclick="switchChannel('${channel}')">
                    <span class="channel-icon">#</span>
                    <span class="channel-name">${channel}</span>
                </li>
            `).join('');
        }
        
        function switchChannel(channel) {
            currentChannel = channel;
            document.getElementById('currentChannelName').innerHTML = `# ${channel}`;
            document.getElementById('currentChannelTopic').innerHTML = `${channel} discussions`;
            renderChannels();
            
            // Clear messages and load channel messages
            document.getElementById('messagesContainer').innerHTML = '';
            addSystemMessage(`Switched to #${channel} channel`);
        }
        
        function handleMessageKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Initialize
        renderChannels();
        initSocket();
        addSystemMessage(`Welcome to ${roomName}! You are logged in as ${username}`);
        addSystemMessage(`🔗 Share this URL: ${window.location.href}`);
        
        // Update workspace status
        setInterval(() => {
            const status = document.getElementById('workspaceStatus');
            if (inHuddle) {
                status.innerHTML = '🔴 In Huddle';
                status.style.color = '#ef4444';
            } else {
                status.innerHTML = '● Online';
                status.style.color = '#10b981';
            }
        }, 1000);
    </script>
</body>
</html>
