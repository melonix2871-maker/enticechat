<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PeerJS Chat - Global Video Conference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1e1f22;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #111214;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
        }

        .workspace-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2b2d31;
            background: #111214;
        }

        .workspace-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workspace-status {
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .channels-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #949ba4;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .channel-list, .member-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .channel-item, .member-item {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .channel-item:hover, .member-item:hover {
            background: #2b2d31;
        }

        .channel-item.active {
            background: #2b2d31;
            color: #5865f2;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .member-status {
            font-size: 10px;
            margin-left: auto;
            color: #10b981;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1f22;
        }

        .chat-header {
            height: 64px;
            padding: 0 20px;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1f22;
        }

        .channel-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .channel-info p {
            font-size: 12px;
            color: #949ba4;
        }

        .huddle-button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .huddle-button.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .huddle-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #949ba4;
        }

        .message-text {
            color: #dbdee1;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #2b2d31;
            background: #1e1f22;
        }

        .message-input-wrapper {
            background: #2b2d31;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .message-input {
            width: 100%;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .huddle-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }

        .huddle-modal.active {
            display: flex;
        }

        .huddle-header {
            background: #111214;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b2d31;
        }

        .huddle-title {
            font-size: 18px;
            font-weight: 600;
        }

        .huddle-controls {
            display: flex;
            gap: 12px;
        }

        .huddle-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            background: #1a1a1a;
        }

        .video-container {
            position: relative;
            background: #2b2d31;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 1;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            background: #2b2d31;
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .leave-huddle {
            background: #dc2626;
            color: white;
            padding: 8px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .connection-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2b2d31;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1f22;
        }

        ::-webkit-scrollbar-thumb {
            background: #2b2d31;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="workspace-header">
                <div class="workspace-name">
                    <span id="workspaceName">PeerChat</span>
                </div>
                <div class="workspace-status">
                    <span class="status-indicator"></span>
                    <span id="connectionStatus">Connecting...</span>
                </div>
            </div>
            
            <div class="channels-section">
                <div class="section-header">
                    <span>Channels</span>
                </div>
                <ul class="channel-list" id="channelList"></ul>
                
                <div class="section-header">
                    <span>👥 Active Users — <span id="activeUserCount">0</span></span>
                </div>
                <ul class="member-list" id="memberList">
                    <li style="padding: 12px; color: #949ba4; text-align: center;">Waiting for users...</li>
                </ul>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h2 id="currentChannelName"># general</h2>
                    <p id="currentChannelTopic">General discussions</p>
                </div>
                <button class="huddle-button" id="huddleButton">
                    🎙️ Start Huddle
                </button>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="input-area">
                <div class="message-input-wrapper">
                    <textarea class="message-input" id="messageInput" placeholder="Message #general" rows="1" onkeydown="handleMessageKeydown(event)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="huddleModal" class="huddle-modal">
        <div class="huddle-header">
            <div class="huddle-title">🎙️ Huddle - Live Conversation <span id="huddleUserCount">0</span> participants</div>
            <div class="huddle-controls">
                <button class="control-btn" id="huddleAudioBtn" style="background: #10b981;">🎤</button>
                <button class="control-btn" id="huddleVideoBtn" style="background: #10b981;">📹</button>
                <button class="control-btn" id="huddleScreenBtn">🖥️</button>
                <button class="leave-huddle" id="leaveHuddleBtn">Leave Huddle</button>
            </div>
        </div>
        <div class="huddle-grid" id="huddleGrid"></div>
    </div>

    <div class="connection-badge">
        <span>🔗</span>
        <span id="roomUrlDisplay"></span>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'default-room';
        const username = urlParams.get('username') || `User_${Math.floor(Math.random() * 1000)}`;
        
        // Update URL to show room and username
        const newUrl = `${window.location.pathname}?room=${encodeURIComponent(roomName)}&username=${encodeURIComponent(username)}`;
        window.history.replaceState({}, '', newUrl);
        
        // Global state
        let currentChannel = 'general';
        let messages = [];
        let peers = new Map(); // Store peer connections
        let localStream = null;
        let peer = null;
        let inHuddle = false;
        let currentUserId = `user_${Date.now()}_${Math.random().toString(36).substring(2, 8)}`;
        let activeCalls = new Map();
        
        // PeerJS configuration
        const peerConfig = {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    {
                        urls: 'turn:openrelay.metered.ca:80',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    },
                    {
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ]
            }
        };
        
        // Room storage using localStorage for cross-tab communication
        const ROOM_STORAGE_KEY = `peerchat_room_${roomName}`;
        
        // Initialize PeerJS
        function initPeerJS() {
            // Create a unique ID for this peer
            const peerId = `${roomName}_${currentUserId}`;
            
            peer = new Peer(peerId, peerConfig);
            
            peer.on('open', (id) => {
                console.log('Connected to PeerJS server with ID:', id);
                updateConnectionStatus(true, 'Connected');
                
                // Register this user in the room
                registerUserInRoom();
                
                // Start heartbeat to maintain presence
                startHeartbeat();
                
                // Listen for room changes
                listenForRoomChanges();
            });
            
            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
                updateConnectionStatus(false, 'Connection error');
                addSystemMessage(`⚠️ Connection error: ${err.type}. Trying to reconnect...`);
                
                // Retry connection after 5 seconds
                setTimeout(() => {
                    if (!peer.open) {
                        initPeerJS();
                    }
                }, 5000);
            });
            
            peer.on('call', (call) => {
                console.log('Incoming call from:', call.peer);
                if (inHuddle && localStream) {
                    answerCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('connection', (conn) => {
                console.log('Data connection from:', conn.peer);
                setupDataConnection(conn);
            });
        }
        
        // Register user in room
        function registerUserInRoom() {
            const roomData = getRoomData();
            const userData = {
                id: currentUserId,
                username: username,
                peerId: `${roomName}_${currentUserId}`,
                joinedAt: Date.now(),
                lastSeen: Date.now()
            };
            
            // Check if user already exists
            const existingUser = roomData.users.find(u => u.id === currentUserId);
            if (!existingUser) {
                roomData.users.push(userData);
                saveRoomData(roomData);
                addSystemMessage(`🎉 You joined as ${username}`);
            }
            
            updateUserList();
        }
        
        function getRoomData() {
            const stored = localStorage.getItem(ROOM_STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                // Clean up stale users (older than 30 seconds)
                const now = Date.now();
                data.users = data.users.filter(user => now - user.lastSeen < 30000);
                return data;
            }
            return { room: roomName, users: [] };
        }
        
        function saveRoomData(data) {
            localStorage.setItem(ROOM_STORAGE_KEY, JSON.stringify(data));
            // Trigger storage event for other tabs
            localStorage.setItem('peerchat_trigger', Date.now().toString());
        }
        
        function startHeartbeat() {
            setInterval(() => {
                const roomData = getRoomData();
                const user = roomData.users.find(u => u.id === currentUserId);
                if (user) {
                    user.lastSeen = Date.now();
                    saveRoomData(roomData);
                }
                updateUserList();
            }, 5000);
        }
        
        function listenForRoomChanges() {
            window.addEventListener('storage', (e) => {
                if (e.key === ROOM_STORAGE_KEY || e.key === 'peerchat_trigger') {
                    updateUserList();
                }
            });
        }
        
        function updateUserList() {
            const roomData = getRoomData();
            const activeUsers = roomData.users.filter(u => u.id !== currentUserId);
            const memberList = document.getElementById('memberList');
            const activeCount = activeUsers.length;
            document.getElementById('activeUserCount').textContent = activeCount;
            
            if (activeCount === 0) {
                memberList.innerHTML = '<li style="padding: 12px; color: #949ba4; text-align: center;">No other users online</li>';
                return;
            }
            
            memberList.innerHTML = activeUsers.map(user => `
                <li class="member-item">
                    <span class="online-dot"></span>
                    <span class="channel-name">${escapeHtml(user.username)}</span>
                    <span class="member-status">online</span>
                </li>
            `).join('');
            
            // Connect to new peers if in huddle
            if (inHuddle && localStream) {
                activeUsers.forEach(user => {
                    if (!peers.has(user.id)) {
                        connectToPeer(user);
                    }
                });
            }
        }
        
        function connectToPeer(user) {
            if (user.id === currentUserId) return;
            if (peers.has(user.id)) return;
            
            console.log('Connecting to peer:', user.username);
            
            // Create data connection
            const conn = peer.connect(user.peerId);
            setupDataConnection(conn);
            
            // Call the peer for video
            if (localStream) {
                const call = peer.call(user.peerId, localStream);
                setupCall(call, user);
            }
        }
        
        function setupDataConnection(conn) {
            conn.on('open', () => {
                console.log('Data connection opened with:', conn.peer);
                
                // Send user info
                conn.send({
                    type: 'user-info',
                    username: username,
                    userId: currentUserId
                });
            });
            
            conn.on('data', (data) => {
                handleDataMessage(data, conn);
            });
            
            conn.on('close', () => {
                console.log('Data connection closed');
                // Find and remove peer
                for (let [userId, peerConn] of peers) {
                    if (peerConn === conn) {
                        peers.delete(userId);
                        break;
                    }
                }
            });
        }
        
        function setupCall(call, user) {
            call.on('stream', (remoteStream) => {
                console.log('Received stream from:', user.username);
                addVideoElement(user.id, remoteStream, user.username);
            });
            
            call.on('close', () => {
                console.log('Call closed with:', user.username);
                removeVideoElement(user.id);
                peers.delete(user.id);
            });
            
            call.on('error', (err) => {
                console.error('Call error:', err);
            });
            
            peers.set(user.id, call);
        }
        
        function answerCall(call) {
            if (localStream) {
                call.answer(localStream);
                setupCall(call, { id: call.peer.split('_')[1], username: 'Peer' });
            }
        }
        
        function handleDataMessage(data, conn) {
            if (data.type === 'chat') {
                addMessageToChat(data.username, data.message, data.time);
            } else if (data.type === 'user-info') {
                // Store peer info
                peers.set(data.userId, conn);
            }
        }
        
        // Video grid management
        function addVideoElement(userId, stream, username) {
            const grid = document.getElementById('huddleGrid');
            let container = document.getElementById(`video-${userId}`);
            
            if (!container) {
                container = document.createElement('div');
                container.className = 'video-container';
                container.id = `video-${userId}`;
                
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.srcObject = stream;
                
                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = username;
                
                container.appendChild(video);
                container.appendChild(label);
                grid.appendChild(container);
                
                updateHuddleUserCount();
            }
        }
        
        function removeVideoElement(userId) {
            const container = document.getElementById(`video-${userId}`);
            if (container) {
                container.remove();
                updateHuddleUserCount();
            }
        }
        
        function updateHuddleUserCount() {
            const count = document.querySelectorAll('#huddleGrid .video-container').length;
            document.getElementById('huddleUserCount').textContent = count;
        }
        
        // Start/Stop Huddle
        async function startHuddle() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                addVideoElement(currentUserId, localStream, `${username} (You)`);
                
                // Connect to all existing users
                const roomData = getRoomData();
                const activeUsers = roomData.users.filter(u => u.id !== currentUserId);
                
                for (let user of activeUsers) {
                    connectToPeer(user);
                }
                
                inHuddle = true;
                const huddleBtn = document.getElementById('huddleButton');
                huddleBtn.classList.add('active');
                huddleBtn.innerHTML = '🔴 End Huddle';
                document.getElementById('huddleModal').classList.add('active');
                
                addSystemMessage('🎙️ Huddle started! You can now talk with everyone in the room.');
            } catch (err) {
                console.error('Error starting huddle:', err);
                addSystemMessage('❌ Cannot access camera/microphone. Please check permissions.');
            }
        }
        
        function stopHuddle() {
            // Close all calls
            peers.forEach((call, userId) => {
                if (call.close) call.close();
            });
            peers.clear();
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Clear video grid
            document.getElementById('huddleGrid').innerHTML = '';
            
            inHuddle = false;
            const huddleBtn = document.getElementById('huddleButton');
            huddleBtn.classList.remove('active');
            huddleBtn.innerHTML = '🎙️ Start Huddle';
            document.getElementById('huddleModal').classList.remove('active');
            
            addSystemMessage('🔇 Huddle ended.');
        }
        
        function toggleHuddle() {
            if (inHuddle) {
                stopHuddle();
            } else {
                startHuddle();
            }
        }
        
        function toggleHuddleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    const btn = document.getElementById('huddleAudioBtn');
                    if (audioTrack.enabled) {
                        btn.style.background = '#10b981';
                        btn.innerHTML = '🎤';
                        addSystemMessage('🎤 Microphone enabled');
                    } else {
                        btn.style.background = '#dc2626';
                        btn.innerHTML = '🔇';
                        addSystemMessage('🔇 Microphone muted');
                    }
                }
            }
        }
        
        function toggleHuddleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    const btn = document.getElementById('huddleVideoBtn');
                    if (videoTrack.enabled) {
                        btn.style.background = '#10b981';
                        btn.innerHTML = '📹';
                        addSystemMessage('📹 Camera enabled');
                    } else {
                        btn.style.background = '#dc2626';
                        btn.innerHTML = '📷❌';
                        addSystemMessage('📷 Camera disabled');
                    }
                }
            }
        }
        
        async function toggleHuddleScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                // Replace video track for all calls
                peers.forEach((call) => {
                    if (call.peerConnection) {
                        const senders = call.peerConnection.getSenders();
                        const videoSender = senders.find(s => s.track?.kind === 'video');
                        if (videoSender) {
                            videoSender.replaceTrack(videoTrack);
                        }
                    }
                });
                
                // Update local video
                const localVideoContainer = document.getElementById(`video-${currentUserId}`);
                if (localVideoContainer) {
                    const video = localVideoContainer.querySelector('video');
                    if (video) video.srcObject = screenStream;
                }
                
                videoTrack.onended = () => {
                    // Restore camera
                    if (localStream) {
                        const cameraTrack = localStream.getVideoTracks()[0];
                        peers.forEach((call) => {
                            if (call.peerConnection) {
                                const senders = call.peerConnection.getSenders();
                                const videoSender = senders.find(s => s.track?.kind === 'video');
                                if (videoSender && cameraTrack) {
                                    videoSender.replaceTrack(cameraTrack);
                                }
                            }
                        });
                        
                        const localVideoContainer = document.getElementById(`video-${currentUserId}`);
                        if (localVideoContainer) {
                            const video = localVideoContainer.querySelector('video');
                            if (video) video.srcObject = localStream;
                        }
                    }
                };
                
                addSystemMessage('🖥️ Screen sharing started');
            } catch (err) {
                console.error('Error sharing screen:', err);
                addSystemMessage('❌ Failed to share screen');
            }
        }
        
        // Chat functions
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const messageData = {
                type: 'chat',
                username: username,
                message: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            
            addMessageToChat(username, text, messageData.time);
            
            // Send to all peers
            peers.forEach((call, userId) => {
                if (call.send) {
                    call.send(messageData);
                } else if (call.peerConnection?.dataChannel) {
                    // For data connections
                    const conn = peers.get(userId);
                    if (conn && conn.send) conn.send(messageData);
                }
            });
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function addMessageToChat(author, message, time) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${author.substring(0, 2).toUpperCase()}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(author)} ${author === username ? '(You)' : ''}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(message) {
            const messagesDiv = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.opacity = '0.7';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-text">${escapeHtml(message)}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateConnectionStatus(connected, message) {
            const statusEl = document.getElementById('connectionStatus');
            const indicator = document.querySelector('.status-indicator');
            if (connected) {
                statusEl.innerHTML = message || '● Online';
                statusEl.style.color = '#10b981';
                indicator.style.background = '#10b981';
            } else {
                statusEl.innerHTML = message || '○ Offline';
                statusEl.style.color = '#ef4444';
                indicator.style.background = '#ef4444';
            }
        }
        
        // Channels
        function renderChannels() {
            const channels = ['general', 'random', 'announcements', 'tech-talk'];
            const channelList = document.getElementById('channelList');
            channelList.innerHTML = channels.map(channel => `
                <li class="channel-item ${channel === currentChannel ? 'active' : ''}" onclick="switchChannel('${channel}')">
                    <span class="channel-icon">#</span>
                    <span class="channel-name">${channel}</span>
                </li>
            `).join('');
        }
        
        function switchChannel(channel) {
            currentChannel = channel;
            document.getElementById('currentChannelName').innerHTML = `# ${channel}`;
            document.getElementById('currentChannelTopic').innerHTML = `${channel} discussions`;
            renderChannels();
            
            document.getElementById('messagesContainer').innerHTML = '';
            addSystemMessage(`Switched to #${channel} channel`);
        }
        
        function handleMessageKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            const roomData = getRoomData();
            roomData.users = roomData.users.filter(u => u.id !== currentUserId);
            saveRoomData(roomData);
            if (peer) peer.destroy();
        });
        
        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Display room URL
        document.getElementById('roomUrlDisplay').innerHTML = `Room: ${roomName}`;
        document.getElementById('workspaceName').innerHTML = `${roomName} 🎥`;
        
        // Initialize
        renderChannels();
        initPeerJS();
        
        addSystemMessage(`🎉 Welcome to ${roomName}! You are logged in as ${username}`);
        addSystemMessage(`🌍 This chat works ANYWHERE using PeerJS!`);
        addSystemMessage(`🔗 Share this URL with friends: ${window.location.href}`);
        addSystemMessage(`💡 Click "Start Huddle" to begin video conference with everyone in the room!`);
        addSystemMessage(`👥 Active users from around the world will appear here automatically`);
        
        // Setup button handlers
        document.getElementById('huddleButton').onclick = toggleHuddle;
        document.getElementById('huddleAudioBtn').onclick = toggleHuddleAudio;
        document.getElementById('huddleVideoBtn').onclick = toggleHuddleVideo;
        document.getElementById('huddleScreenBtn').onclick = toggleHuddleScreen;
        document.getElementById('leaveHuddleBtn').onclick = stopHuddle;
        
        // Make functions globally available
        window.switchChannel = switchChannel;
        window.toggleHuddle = toggleHuddle;
        window.toggleHuddleAudio = toggleHuddleAudio;
        window.toggleHuddleVideo = toggleHuddleVideo;
        window.toggleHuddleScreen = toggleHuddleScreen;
        window.stopHuddle = stopHuddle;
    </script>
</body>
</html>
