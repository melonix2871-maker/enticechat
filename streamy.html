<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EnticeChat Live · Mobile-Optimized P2P</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reconnecting-websocket/1.0.0/reconnecting-websocket.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --accent-primary: #FF6B6B;
      --accent-secondary: #4ECDC4;
      --bg-dark: #03030c;
      --success: #2ecc71;
      --warning: #f39c12;
      --error: #e74c3c;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, var(--bg-dark));
      color: #f0f0f0;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.4;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 16px;
      font-size: clamp(0.75rem, 3vw, 0.9rem);
    }

    .info-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .pill {
      background: rgba(255,255,255,0.1);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .relay-panel {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .relay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.75rem;
      color: #ccc;
    }

    .relay-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      max-height: 80px;
      overflow-y: auto;
    }

    .relay-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      font-size: 0.65rem;
      font-family: monospace;
    }

    .relay-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-success { background: var(--success); box-shadow: 0 0 3px var(--success); }
    .dot-warning { background: var(--warning); }
    .dot-error { background: var(--error); }
    .dot-idle { background: #666; }

    .button-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }

    .broadcaster { background: var(--accent-primary); color: white; }
    .viewer { background: var(--accent-secondary); color: white; }
    .danger-btn { background: #e63939; color: white; }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }

    .control-bar button, .control-bar select {
      padding: 8px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.85rem;
      touch-action: manipulation;
    }
    
    select option { background: #1a1a2e; }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      z-index: 2;
    }

    @media (min-width: 768px) {
      body { padding: 20px; }
      .button-row { flex-direction: row; justify-content: center; }
      button { width: auto; min-width: 180px; }
      .video-grid:has(> .video-wrapper[style*="block"] + .video-wrapper[style*="block"]) {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    footer { text-align: center; font-size: 0.65rem; margin-top: 20px; opacity: 0.5; }
    .mobile-warning { display: none; }
    @media (max-width: 480px) {
      .info-card .pill { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">📱 Mobile-Optimized · Auto-Recovery · 360p Stable</div>

  <div class="info-card">
    <span class="pill">📡 <span id="channelDisplay">enticechat-live</span></span>
    <span class="pill" id="status">● Ready</span>
    <span class="pill">👥 <span id="peerCount">0</span></span>
    <span class="pill">🎭 <span id="nodeRoleStat">—</span></span>
    <span class="pill">🔄 <span id="hopStat">0</span></span>
    <span class="pill">🔌 <span id="activeRelay">—</span></span>
  </div>

  <div class="relay-panel" id="relayPanel">
    <div class="relay-header">
      <span>🛰️ RELAY STATUS</span>
      <span id="relaySummary">scanning...</span>
    </div>
    <div class="relay-grid" id="relayGrid"></div>
  </div>

  <div class="button-row">
    <button id="startBroadcastBtn" class="broadcaster">🎥 START BROADCAST</button>
    <button id="joinViewerBtn" class="viewer">👁️ JOIN AS VIEWER</button>
  </div>

  <div class="control-bar" id="controlBar" style="display:none;">
    <button id="muteMicBtn">🎤 Mute</button>
    <select id="qualitySelect">
      <option value="360p" selected>📱 360p (Mobile Optimized)</option>
      <option value="480p">📺 480p (Balanced)</option>
      <option value="720p">💻 720p (WiFi Only)</option>
    </select>
    <button id="stopBtn" class="danger-btn">⏹️ Stop</button>
  </div>

  <div class="video-grid">
    <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="video-label">📹 You</div>
    </div>
    <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
      <video id="mainRemoteVideo" autoplay playsinline></video>
      <div class="video-label">🔴 Live</div>
    </div>
  </div>
  <footer>⚡ Auto-reconnect · Multi-relay fallback · WebRTC backup</footer>
</div>

<script>
(function(){
  // ============ CONFIGURATION ============
  const CHANNEL = "enticechat-live";
  // Filtered reliable relays (removed problematic ones like nostromo)
  const RELAY_LIST = [
    "wss://relay.oldenburg.cool",
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://relay.primal.net",
    "wss://relay.snort.social",
    "wss://tracker.openwebtorrent.com"
  ];
  
  // ============ GLOBALS ============
  let webConnect = null;
  let localStream = null;
  let myRole = null;           // 'origin', 'viewer', 'relay'
  let forwardedPeers = new Set();
  let currentHops = 0;
  let maxChildren = 4;         // Lower for mobile
  let healthInterval = null;
  let currentActiveRelay = null;
  let reconnectAttempts = 0;
  let isShuttingDown = false;
  
  // ============ DOM Elements ============
  const statusSpan = document.getElementById("status");
  const peerCountSpan = document.getElementById("peerCount");
  const roleSpan = document.getElementById("nodeRoleStat");
  const hopSpan = document.getElementById("hopStat");
  const activeRelaySpan = document.getElementById("activeRelay");
  const relayGridDiv = document.getElementById("relayGrid");
  const relaySummarySpan = document.getElementById("relaySummary");
  const controlBarDiv = document.getElementById("controlBar");
  const localVideoWrapper = document.getElementById("localVideoWrapper");
  const localVideo = document.getElementById("localVideo");
  const mainRemoteWrapper = document.getElementById("mainRemoteWrapper");
  const mainRemoteVideo = document.getElementById("mainRemoteVideo");
  const startBtn = document.getElementById("startBroadcastBtn");
  const joinBtn = document.getElementById("joinViewerBtn");
  const stopBtn = document.getElementById("stopBtn");
  const muteBtn = document.getElementById("muteMicBtn");
  const qualitySelect = document.getElementById("qualitySelect");

  // ============ Helper Functions ============
  function setStatus(msg, isError = false) {
    if (isShuttingDown && !isError) return;
    statusSpan.innerHTML = isError ? `⚠️ ${msg}` : `● ${msg}`;
    statusSpan.style.color = isError ? "#ff8888" : "#ccc";
    console.log(`[Status] ${msg}`);
  }

  function updateStats() {
    peerCountSpan.innerText = forwardedPeers.size;
    roleSpan.innerText = myRole || "—";
    hopSpan.innerText = currentHops;
  }

  function getDeviceProfile() {
    const cores = navigator.hardwareConcurrency || 2;
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile || cores <= 4) {
      return { maxPeers: 3, maxHops: 5, isPowerful: false };
    }
    return { maxPeers: 6, maxHops: 8, isPowerful: true };
  }

  async function getMediaConstraints(quality) {
    const profile = getDeviceProfile();
    // Force 360p on mobile for stability
    let selectedQuality = quality;
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent) && quality !== '360p') {
      selectedQuality = '360p';
      qualitySelect.value = '360p';
    }
    
    const configs = {
      '360p': { width: { ideal: 640 }, height: { ideal: 360 }, frameRate: { ideal: 15, max: 20 } },
      '480p': { width: { ideal: 854 }, height: { ideal: 480 }, frameRate: { ideal: 24, max: 30 } },
      '720p': { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 30 } }
    };
    const selected = configs[selectedQuality] || configs['360p'];
    return {
      video: selected,
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    };
  }

  // ============ Relay Manager with Proper Error Handling ============
  class RelayManager {
    constructor() {
      this.relayStatus = new Map();
      this.workingRelays = [];
      this.isTesting = false;
    }

    async testRelay(url, timeout = 3000) {
      return new Promise((resolve) => {
        const timeoutId = setTimeout(() => resolve(false), timeout);
        try {
          const ws = new WebSocket(url);
          ws.onopen = () => {
            clearTimeout(timeoutId);
            ws.close();
            resolve(true);
          };
          ws.onerror = () => {
            clearTimeout(timeoutId);
            resolve(false);
          };
          ws.onclose = () => {
            clearTimeout(timeoutId);
          };
        } catch(e) {
          clearTimeout(timeoutId);
          resolve(false);
        }
      });
    }

    async scanRelays() {
      if (this.isTesting) return this.workingRelays;
      this.isTesting = true;
      
      for (let url of RELAY_LIST) {
        this.relayStatus.set(url, 'testing');
      }
      this.updateUI();
      
      const results = await Promise.all(RELAY_LIST.map(async (url) => {
        const isWorking = await this.testRelay(url);
        this.relayStatus.set(url, isWorking ? 'online' : 'failed');
        this.updateUI();
        return isWorking ? url : null;
      }));
      
      this.workingRelays = results.filter(r => r !== null);
      relaySummarySpan.innerText = this.workingRelays.length > 0 ? 
        `✅ ${this.workingRelays.length} relays` : `⚠️ Using WebRTC fallback`;
      this.isTesting = false;
      return this.workingRelays;
    }

    updateUI() {
      if (!relayGridDiv) return;
      let html = '';
      for (let [url, status] of this.relayStatus.entries()) {
        let dotClass = 'dot-idle';
        if (status === 'online') dotClass = 'dot-success';
        else if (status === 'failed') dotClass = 'dot-error';
        else if (status === 'testing') dotClass = 'dot-warning';
        const shortName = url.replace('wss://', '').split('/')[0].substring(0, 20);
        html += `<div class="relay-badge"><span class="relay-dot ${dotClass}"></span><span title="${url}">${shortName}</span></div>`;
      }
      relayGridDiv.innerHTML = html || '<span>scanning...</span>';
    }

    async getBestRelay() {
      if (this.workingRelays.length === 0) {
        await this.scanRelays();
      }
      return this.workingRelays.length > 0 ? this.workingRelays[0] : null;
    }
  }

  // ============ WebRTC Fallback (Simple) ============
  class WebRTCFallback {
    constructor(channel, isHost) {
      this.channel = channel;
      this.isHost = isHost;
      this.pc = null;
      this.streamCallback = null;
    }

    async initHost(stream) {
      this.pc = new RTCPeerConnection({ 
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }] 
      });
      stream.getTracks().forEach(track => this.pc.addTrack(track, stream));
      
      const offer = await this.pc.createOffer();
      await this.pc.setLocalDescription(offer);
      
      // Store for discovery (simplified - in production use signaling server)
      localStorage.setItem(`webrtc_${this.channel}`, JSON.stringify({
        sdp: this.pc.localDescription.sdp,
        type: this.pc.localDescription.type,
        timestamp: Date.now()
      }));
      
      setTimeout(() => localStorage.removeItem(`webrtc_${this.channel}`), 30000);
      return this.pc;
    }

    async connectAsViewer() {
      const data = localStorage.getItem(`webrtc_${this.channel}`);
      if (!data) throw new Error("No host found");
      
      const offer = JSON.parse(data);
      if (Date.now() - offer.timestamp > 30000) throw new Error("Offer expired");
      
      this.pc = new RTCPeerConnection({ 
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }] 
      });
      this.pc.ontrack = (event) => {
        if (this.streamCallback) this.streamCallback(event.streams[0]);
      };
      
      await this.pc.setRemoteDescription({ sdp: offer.sdp, type: offer.type });
      const answer = await this.pc.createAnswer();
      await this.pc.setLocalDescription(answer);
      return this.pc;
    }

    onStream(cb) { this.streamCallback = cb; }
    close() { if (this.pc) this.pc.close(); }
    isConnected() { return this.pc && this.pc.connectionState === 'connected'; }
  }

  // ============ Core P2P Functions ============
  async function startBroadcast() {
    await stopAll();
    isShuttingDown = false;
    myRole = "origin";
    const deviceProfile = getDeviceProfile();
    maxChildren = deviceProfile.maxPeers;
    currentHops = 0;
    forwardedPeers.clear();
    
    const quality = qualitySelect.value;
    setStatus("Requesting camera/mic...");
    
    try {
      localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(quality));
      localVideo.srcObject = localStream;
      localVideoWrapper.style.display = "block";
      controlBarDiv.style.display = "flex";
      
      setStatus("Finding reliable relay...");
      const relayManager = new RelayManager();
      const bestRelay = await relayManager.getBestRelay();
      
      if (bestRelay) {
        currentActiveRelay = bestRelay;
        activeRelaySpan.innerText = bestRelay.split('/')[2].substring(0, 20);
        setStatus(`Connecting via ${bestRelay.split('/')[2]}`);
        
        // Create reconnecting WebSocket
        const rws = new ReconnectingWebSocket(bestRelay);
        rws.reconnectInterval = 2000;
        rws.maxReconnectInterval = 15000;
        rws.reconnectDecay = 1.2;
        rws.timeoutInterval = 5000;
        
        // Safe wrapper for webconnect
        const wcConfig = {
          appName: "EnticeChat",
          channelName: CHANNEL,
          signalServers: [bestRelay],
          createWebSocket: () => rws,
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };
        
        webConnect = webconnect(wcConfig);
        
        // SAFE: Check if webConnect has the method before calling
        if (webConnect && typeof webConnect.onConnect === 'function') {
          webConnect.onConnect(async (attr) => {
            if (forwardedPeers.size < maxChildren && localStream) {
              try {
                await webConnect.openStreaming(localStream, { connectId: attr.connectId });
                forwardedPeers.add(attr.connectId);
                currentHops = Math.min(currentHops + 1, deviceProfile.maxHops);
                updateStats();
              } catch(e) { console.warn("Forward error:", e); }
            }
          });
        }
        
        setStatus("🔴 LIVE (WebSocket)");
      } else {
        // WebRTC fallback
        currentActiveRelay = "webrtc-p2p";
        activeRelaySpan.innerText = "WebRTC-P2P";
        setStatus("🌐 Using WebRTC direct mode");
        
        const webrtc = new WebRTCFallback(CHANNEL, true);
        await webrtc.initHost(localStream);
        
        // Create a wrapper with safe method checking
        webConnect = {
          _webrtc: webrtc,
          onConnect: (cb) => { setTimeout(() => cb({ connectId: 'webrtc-host' }), 500); },
          openStreaming: async () => true,
          Disconnect: () => webrtc.close(),
          isConnected: () => webrtc.isConnected(),
          // Add missing method to prevent errors
          onStreaming: () => {}
        };
        setStatus("🔴 LIVE (P2P)");
      }
      
      updateStats();
      startHealthMonitor();
      
    } catch(err) {
      console.error("Broadcast error:", err);
      setStatus("Camera/mic access denied or failed", true);
      await stopAll();
    }
  }

  async function joinViewer() {
    await stopAll();
    isShuttingDown = false;
    myRole = "viewer";
    forwardedPeers.clear();
    currentHops = 0;
    controlBarDiv.style.display = "flex";
    setStatus("Searching for stream...");
    
    try {
      const relayManager = new RelayManager();
      const bestRelay = await relayManager.getBestRelay();
      
      if (bestRelay) {
        currentActiveRelay = bestRelay;
        activeRelaySpan.innerText = bestRelay.split('/')[2].substring(0, 20);
        
        const rws = new ReconnectingWebSocket(bestRelay);
        rws.reconnectInterval = 2000;
        rws.maxReconnectInterval = 15000;
        
        const wcConfig = {
          appName: "EnticeChat",
          channelName: CHANNEL,
          signalServers: [bestRelay],
          createWebSocket: () => rws,
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };
        
        webConnect = webconnect(wcConfig);
        
        // SAFE: Check if onStreaming exists before assigning
        if (webConnect && typeof webConnect.onStreaming === 'function') {
          webConnect.onStreaming((stream) => {
            mainRemoteVideo.srcObject = stream;
            mainRemoteWrapper.style.display = "block";
            setStatus("✅ Watching");
            const deviceProfile = getDeviceProfile();
            if (deviceProfile.isPowerful) promoteToRelay(stream);
          });
        }
        
        setStatus("Connected, waiting for stream...");
      } else {
        // WebRTC fallback
        currentActiveRelay = "webrtc-p2p";
        activeRelaySpan.innerText = "WebRTC-P2P";
        setStatus("🌐 Trying WebRTC direct...");
        
        const webrtc = new WebRTCFallback(CHANNEL, false);
        webrtc.onStream((stream) => {
          mainRemoteVideo.srcObject = stream;
          mainRemoteWrapper.style.display = "block";
          setStatus("✅ Watching (P2P)");
          const deviceProfile = getDeviceProfile();
          if (deviceProfile.isPowerful) promoteToRelay(stream);
        });
        
        await webrtc.connectAsViewer();
        
        webConnect = {
          _webrtc: webrtc,
          onStreaming: (cb) => webrtc.onStream(cb),
          Disconnect: () => webrtc.close(),
          isConnected: () => webrtc.isConnected(),
          onConnect: () => {}
        };
      }
      
      updateStats();
      startHealthMonitor();
      
    } catch(err) {
      console.error("Viewer error:", err);
      setStatus("No active broadcast found", true);
      await stopAll();
    }
  }

  function promoteToRelay(incomingStream) {
    if (myRole === 'relay') return;
    myRole = 'relay';
    setStatus("🔄 Acting as relay node");
    
    // SAFE: Check if webConnect and onConnect exist
    if (webConnect && typeof webConnect.onConnect === 'function') {
      webConnect.onConnect(async (attr) => {
        if (forwardedPeers.size < maxChildren && incomingStream && webConnect && typeof webConnect.openStreaming === 'function') {
          try {
            await webConnect.openStreaming(incomingStream, { connectId: attr.connectId });
            forwardedPeers.add(attr.connectId);
            currentHops++;
            updateStats();
          } catch(e) { console.warn("Relay forward failed:", e); }
        }
      });
    }
  }

  function startHealthMonitor() {
    if (healthInterval) clearInterval(healthInterval);
    healthInterval = setInterval(() => {
      // SAFE: Check if webConnect exists and isConnected is a function
      const isConnected = webConnect && typeof webConnect.isConnected === 'function' ? webConnect.isConnected() : true;
      if (webConnect && !isConnected && !isShuttingDown) {
        console.warn("Connection lost, attempting recovery");
        setStatus("Reconnecting...");
        if (myRole === 'origin') startBroadcast();
        else if (myRole === 'viewer') joinViewer();
      }
    }, 10000);
  }

  async function stopAll() {
    isShuttingDown = true;
    if (healthInterval) { clearInterval(healthInterval); healthInterval = null; }
    
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    
    if (webConnect && typeof webConnect.Disconnect === 'function') {
      try { webConnect.Disconnect(); } catch(e) {}
    }
    webConnect = null;
    
    forwardedPeers.clear();
    currentHops = 0;
    localVideoWrapper.style.display = "none";
    mainRemoteWrapper.style.display = "none";
    controlBarDiv.style.display = "none";
    if (localVideo.srcObject) localVideo.srcObject = null;
    if (mainRemoteVideo.srcObject) mainRemoteVideo.srcObject = null;
    
    setStatus("Stopped");
    updateStats();
    myRole = null;
    currentActiveRelay = null;
    activeRelaySpan.innerText = "—";
    reconnectAttempts = 0;
  }

  // ============ Event Listeners ============
  muteBtn.onclick = () => {
    if (localStream) {
      const audioTrack = localStream.getAudioTracks()[0];
      if (audioTrack) {
        audioTrack.enabled = !audioTrack.enabled;
        muteBtn.innerHTML = audioTrack.enabled ? "🎤 Mute" : "🔇 Unmute";
      }
    }
  };
  
  startBtn.onclick = startBroadcast;
  joinBtn.onclick = joinViewer;
  stopBtn.onclick = stopAll;
  
  // Initialize relay scanner
  const initialScanner = new RelayManager();
  initialScanner.scanRelays().catch(console.warn);
  
  updateStats();
  setStatus("Ready. Choose role.");
})();
</script>
</body>
</html>
