<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EnticeChat Live · Resilient P2P Mesh</title>
  <!-- Core libraries -->
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reconnecting-websocket/1.0.0/reconnecting-websocket.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --accent-primary: #FF6B6B;
      --accent-secondary: #4ECDC4;
      --bg-dark: #03030c;
      --success: #2ecc71;
      --warning: #f39c12;
      --error: #e74c3c;
      --info: #3498db;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, var(--bg-dark));
      color: #f0f0f0;
      margin: 0;
      padding: 15px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }

    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 25px;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
    }

    /* Info Bar */
    .info-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 15px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .pill {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      font-family: monospace;
    }

    /* Relay status panel */
    .relay-panel {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .relay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #ccc;
    }

    .relay-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .relay-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 30px;
      background: rgba(255,255,255,0.05);
      font-size: 0.75rem;
      font-family: monospace;
      transition: all 0.2s;
    }

    .relay-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-success { background: var(--success); box-shadow: 0 0 4px var(--success); }
    .dot-warning { background: var(--warning); box-shadow: 0 0 4px var(--warning); }
    .dot-error { background: var(--error); }
    .dot-idle { background: #666; }

    /* Buttons & controls */
    .button-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    button:active { transform: scale(0.97); }

    .broadcaster { background: var(--accent-primary); color: white; box-shadow: 0 4px 12px rgba(255,107,107,0.3); }
    .viewer { background: var(--accent-secondary); color: white; box-shadow: 0 4px 12px rgba(78,205,196,0.3); }
    .danger-btn { background: #e63939; color: white; }
    .small-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; font-size: 0.85rem; width: auto; }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 15px 0;
    }

    .control-bar button, .control-bar select {
      padding: 10px 20px;
      border-radius: 40px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.9rem;
    }
    select option { background: #1a1a2e; }

    /* Video grid */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 10px;
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .button-row { flex-direction: row; justify-content: center; }
      button { width: auto; min-width: 200px; }
      .video-grid:has(> .video-wrapper[style*="block"] + .video-wrapper[style*="block"]) {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    footer { text-align: center; font-size: 0.7rem; margin-top: 30px; opacity: 0.5; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">⚡ Multi-Relay · Auto-Reconnect · DHT Mesh · WebRTC Fallback</div>

  <div class="info-card">
    <span class="pill">📡 Channel: <strong id="channelDisplay">enticechat-live</strong></span>
    <span class="pill" id="status">● Ready</span>
    <span class="pill">👥 Peers: <span id="peerCount">0</span></span>
    <span class="pill">🎭 Role: <span id="nodeRoleStat">—</span></span>
    <span class="pill">🔄 Hops: <span id="hopStat">0</span></span>
    <span class="pill">🔌 Active: <span id="activeRelay">none</span></span>
  </div>

  <div class="relay-panel" id="relayPanel">
    <div class="relay-header">
      <span>🛰️ RELAY NETWORK</span>
      <span id="relaySummary">testing relays...</span>
    </div>
    <div class="relay-grid" id="relayGrid"></div>
  </div>

  <div class="main-layout">
    <div class="button-row">
      <button id="startBroadcastBtn" class="broadcaster">🎥 START BROADCAST</button>
      <button id="joinViewerBtn" class="viewer">👁️ JOIN AS VIEWER</button>
    </div>

    <div class="control-bar" id="controlBar" style="display:none;">
      <button id="muteMicBtn">🎤 Mute</button>
      <select id="qualitySelect">
        <option value="low">360p (Low bandwidth)</option>
        <option value="medium" selected>480p (Balanced)</option>
        <option value="high">720p (High quality)</option>
      </select>
      <button id="stopBtn" class="danger-btn">⏹️ Stop Session</button>
    </div>

    <div class="video-grid">
      <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-label">📹 You (Broadcaster)</div>
      </div>
      <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
        <video id="mainRemoteVideo" autoplay playsinline></video>
        <div class="video-label">🔴 Live Stream</div>
      </div>
    </div>
  </div>
  <footer>⚡ Resilient P2P · Auto failover + WebRTC bootstrap · DHT-aware</footer>
</div>

<script>
  (function(){
    // ---------- CONFIGURATION ----------
    const CHANNEL = "enticechat-live";
    const RELAY_LIST = [
      "wss://relay.oldenburg.cool",
      "wss://relay.nostr.band",
      "wss://relay.damus.io",
      "wss://nos.lol",
      "wss://relay.primal.net",
      "wss://relay.snort.social",
      "wss://tracker.webtorrent.dev",
      "wss://tracker.btorrent.xyz",
      "wss://tracker.openwebtorrent.com"
    ];
    
    // ---------- GLOBALS ----------
    let currentRelayManager = null;     // instance of ResilientRelayManager
    let webConnect = null;
    let localStream = null;
    let myRole = null;                  // 'origin', 'viewer', 'relay'
    let forwardedPeers = new Set();     // track forwarded connections for DHT hop
    let currentHops = 0;
    let maxChildren = 6;
    let healthInterval = null;
    let currentActiveRelayUrl = null;

    // ---------- DOM elements ----------
    const statusSpan = document.getElementById("status");
    const peerCountSpan = document.getElementById("peerCount");
    const roleSpan = document.getElementById("nodeRoleStat");
    const hopSpan = document.getElementById("hopStat");
    const activeRelaySpan = document.getElementById("activeRelay");
    const relayGridDiv = document.getElementById("relayGrid");
    const relaySummarySpan = document.getElementById("relaySummary");
    const controlBarDiv = document.getElementById("controlBar");
    const localVideoWrapper = document.getElementById("localVideoWrapper");
    const localVideo = document.getElementById("localVideo");
    const mainRemoteWrapper = document.getElementById("mainRemoteWrapper");
    const mainRemoteVideo = document.getElementById("mainRemoteVideo");
    const startBtn = document.getElementById("startBroadcastBtn");
    const joinBtn = document.getElementById("joinViewerBtn");
    const stopBtn = document.getElementById("stopBtn");
    const muteBtn = document.getElementById("muteMicBtn");
    const qualitySelect = document.getElementById("qualitySelect");

    // ---------- HELPERS ----------
    function setStatus(msg, isError = false) {
      statusSpan.innerHTML = isError ? `⚠️ ${msg}` : `● ${msg}`;
      statusSpan.style.color = isError ? "#ff8888" : "#ccc";
    }

    function updateStats() {
      peerCountSpan.innerText = forwardedPeers.size;
      roleSpan.innerText = myRole || "—";
      hopSpan.innerText = currentHops;
    }

    function getDeviceCapacity() {
      const cores = navigator.hardwareConcurrency || 4;
      return cores >= 8 ? 8 : (cores >= 4 ? 6 : 4);
    }

    function isPowerfulDevice() {
      return (navigator.hardwareConcurrency || 4) >= 6;
    }

    async function getMediaConstraints(quality) {
      const preset = {
        low: { width: 640, height: 360, frameRate: 15 },
        medium: { width: 854, height: 480, frameRate: 24 },
        high: { width: 1280, height: 720, frameRate: 30 }
      };
      const selected = preset[quality] || preset.medium;
      return { video: selected, audio: true };
    }

    // ---------- RESILIENT RELAY MANAGER (reconnecting websocket + multi-relay + WebRTC fallback) ----------
    class ResilientRelayManager {
      constructor(channel) {
        this.channel = channel;
        this.relayStatus = new Map();    // url -> 'pending'|'online'|'failed'
        this.activeRelay = null;
        this.reconnectAttempt = 0;
        this.isShuttingDown = false;
        this.webRTCFallbackActive = false;
        this.initRelayTesting();
      }

      async initRelayTesting() {
        // show all relays as idle
        for (let url of RELAY_LIST) {
          this.relayStatus.set(url, 'pending');
        }
        this.renderRelayUI();
        // test concurrently with timeout
        const testPromises = RELAY_LIST.map(async (url) => {
          const ok = await this.testSingleRelay(url);
          this.relayStatus.set(url, ok ? 'online' : 'failed');
          this.renderRelayUI();
          return ok ? url : null;
        });
        const results = await Promise.all(testPromises);
        const working = results.filter(r => r !== null);
        relaySummarySpan.innerText = working.length ? `✅ ${working.length} relays reachable` : `⚠️ No relays, will use WebRTC bootstrap`;
        if (working.length === 0) {
          setStatus("No relays, using WebRTC bootstrap", false);
        }
      }

      async testSingleRelay(url, timeoutMs = 3000) {
        return new Promise((resolve) => {
          const timeout = setTimeout(() => resolve(false), timeoutMs);
          try {
            const ws = new WebSocket(url);
            ws.onopen = () => {
              clearTimeout(timeout);
              ws.close();
              resolve(true);
            };
            ws.onerror = () => {
              clearTimeout(timeout);
              resolve(false);
            };
          } catch(e) {
            clearTimeout(timeout);
            resolve(false);
          }
        });
      }

      renderRelayUI() {
        if (!relayGridDiv) return;
        let html = '';
        for (let [url, status] of this.relayStatus.entries()) {
          let dotClass = 'dot-idle';
          if (status === 'online') dotClass = 'dot-success';
          else if (status === 'failed') dotClass = 'dot-error';
          else if (status === 'pending') dotClass = 'dot-warning';
          const shortName = url.replace('wss://', '').split('/')[0];
          html += `<div class="relay-badge"><span class="relay-dot ${dotClass}"></span><span title="${url}">${shortName}</span></div>`;
        }
        relayGridDiv.innerHTML = html || '<span>no relays</span>';
      }

      async acquireRelayConnection(role) {
        if (this.isShuttingDown) return null;
        // first: try to get a working online relay
        let workingUrl = null;
        for (let [url, status] of this.relayStatus.entries()) {
          if (status === 'online') {
            workingUrl = url;
            break;
          }
        }
        if (!workingUrl) {
          // try to find any that might be online but not marked, re-test quickly
          for (let url of RELAY_LIST) {
            if (this.relayStatus.get(url) !== 'failed') {
              const ok = await this.testSingleRelay(url, 2000);
              if (ok) {
                workingUrl = url;
                this.relayStatus.set(url, 'online');
                this.renderRelayUI();
                break;
              } else {
                this.relayStatus.set(url, 'failed');
              }
            }
          }
        }
        if (workingUrl) {
          this.activeRelay = workingUrl;
          currentActiveRelayUrl = workingUrl;
          activeRelaySpan.innerText = workingUrl.split('/')[2];
          setStatus(`Connecting via ${workingUrl.split('/')[2]}`, false);
          // Create a ReconnectingWebSocket instance
          const rws = new ReconnectingWebSocket(workingUrl);
          rws.reconnectInterval = 1000;
          rws.maxReconnectInterval = 20000;
          rws.reconnectDecay = 1.3;
          rws.timeoutInterval = 4000;
          rws.debug = false;
          // Attach event logging
          rws.addEventListener('connecting', () => {
            if (!this.isShuttingDown) setStatus("🔄 Reconnecting relay...", false);
          });
          rws.addEventListener('open', () => {
            if (!this.isShuttingDown) setStatus(role === 'origin' ? "🔴 Live (relay)" : "✅ Connected (relay)");
          });
          return { type: 'websocket', connection: rws, url: workingUrl };
        }
        // Fallback to WebRTC bootstrap if no relay
        setStatus("🌐 No relays, activating WebRTC bootstrap", false);
        activeRelaySpan.innerText = "WebRTC-P2P";
        currentActiveRelayUrl = "webrtc-bootstrap";
        return { type: 'webrtc', connection: null, url: null };
      }

      shutdown() {
        this.isShuttingDown = true;
      }
    }

    // ---------- WebRTC Bootstrap (simple localStorage signaling for demo) ----------
    class WebRTCBootstrapper {
      constructor(channel, isHost) {
        this.channel = channel;
        this.isHost = isHost;
        this.pc = null;
        this.streamCallback = null;
        this.dataChannel = null;
      }

      async initAsHost(streamToShare) {
        this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        // add tracks
        if (streamToShare) {
          streamToShare.getTracks().forEach(track => this.pc.addTrack(track, streamToShare));
        }
        const offer = await this.pc.createOffer();
        await this.pc.setLocalDescription(offer);
        // store offer in localStorage (for demo / same-origin)
        const offerData = { sdp: this.pc.localDescription.sdp, type: this.pc.localDescription.type };
        localStorage.setItem(`webrtc_bootstrap_${this.channel}`, JSON.stringify(offerData));
        // cleanup after 5 minutes
        setTimeout(() => localStorage.removeItem(`webrtc_bootstrap_${this.channel}`), 300000);
        return this.pc;
      }

      async connectAsViewer() {
        const raw = localStorage.getItem(`webrtc_bootstrap_${this.channel}`);
        if (!raw) throw new Error("No host offer found");
        const offerData = JSON.parse(raw);
        this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        this.pc.ontrack = (event) => {
          if (this.streamCallback) this.streamCallback(event.streams[0]);
        };
        await this.pc.setRemoteDescription({ sdp: offerData.sdp, type: offerData.type });
        const answer = await this.pc.createAnswer();
        await this.pc.setLocalDescription(answer);
        // store answer back (optional, but for full handshake we'd need signaling; but for demo viewer only needs remote stream)
        return this.pc;
      }

      onStream(cb) { this.streamCallback = cb; }
      close() { if (this.pc) this.pc.close(); }
    }

    // ---------- MAIN ACTIONS ----------
    async function startBroadcast() {
      await stopAll();
      myRole = "origin";
      maxChildren = getDeviceCapacity();
      currentHops = 0;
      forwardedPeers.clear();
      
      const quality = qualitySelect.value;
      try {
        localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(quality));
        localVideo.srcObject = localStream;
        localVideoWrapper.style.display = "block";
        controlBarDiv.style.display = "flex";
        setStatus("Acquiring resilient relay...");
        
        currentRelayManager = new ResilientRelayManager(CHANNEL);
        const relayConn = await currentRelayManager.acquireRelayConnection('origin');
        
        if (relayConn.type === 'websocket') {
          // Use webconnect with custom reconnecting websocket
          const rws = relayConn.connection;
          const wcConfig = {
            appName: "EnticeChat",
            channelName: CHANNEL,
            signalServers: [relayConn.url],
            createWebSocket: (url, protocols) => rws,
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
          };
          webConnect = webconnect(wcConfig);
          // DHT forwarding logic
          webConnect.onConnect(async (attr) => {
            if (forwardedPeers.size < maxChildren) {
              await webConnect.openStreaming(localStream, { connectId: attr.connectId });
              forwardedPeers.add(attr.connectId);
              currentHops = Math.min(currentHops + 1, 12);
              updateStats();
            }
          });
          setStatus("🔴 LIVE (WebSocket relay)");
        } 
        else {
          // WebRTC bootstrap fallback
          setStatus("🌐 Using WebRTC bootstrap (no relays)");
          const bootstrapper = new WebRTCBootstrapper(CHANNEL, true);
          await bootstrapper.initAsHost(localStream);
          // mock webconnect to keep consistent interface
          webConnect = {
            _boot: bootstrapper,
            onConnect: (cb) => { setTimeout(() => cb({ connectId: 'webrtc-host' }), 500); },
            openStreaming: async (stream) => { /* already added tracks */ return true; },
            Disconnect: () => bootstrapper.close(),
            isConnected: () => true
          };
        }
        updateStats();
        startHealthMonitor();
      } catch (err) {
        console.error(err);
        setStatus("Camera/mic error or relay failure", true);
        await stopAll();
      }
    }

    async function joinViewer() {
      await stopAll();
      myRole = "viewer";
      forwardedPeers.clear();
      currentHops = 0;
      controlBarDiv.style.display = "flex";
      setStatus("Searching for stream...");
      
      currentRelayManager = new ResilientRelayManager(CHANNEL);
      const relayConn = await currentRelayManager.acquireRelayConnection('viewer');
      
      if (relayConn.type === 'websocket') {
        const rws = relayConn.connection;
        const wcConfig = {
          appName: "EnticeChat",
          channelName: CHANNEL,
          signalServers: [relayConn.url],
          createWebSocket: (url, protocols) => rws,
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };
        webConnect = webconnect(wcConfig);
        webConnect.onStreaming((stream) => {
          mainRemoteVideo.srcObject = stream;
          mainRemoteWrapper.style.display = "block";
          setStatus("✅ Watching (relay)");
          if (isPowerfulDevice()) promoteToRelay(stream);
        });
      } 
      else {
        // WebRTC fallback
        setStatus("🌐 Attempting WebRTC bootstrap discovery");
        const bootstrapper = new WebRTCBootstrapper(CHANNEL, false);
        bootstrapper.onStream((stream) => {
          mainRemoteVideo.srcObject = stream;
          mainRemoteWrapper.style.display = "block";
          setStatus("✅ Watching (WebRTC P2P)");
          if (isPowerfulDevice()) promoteToRelay(stream);
        });
        try {
          await bootstrapper.connectAsViewer();
          webConnect = {
            _boot: bootstrapper,
            onStreaming: (cb) => bootstrapper.onStream(cb),
            Disconnect: () => bootstrapper.close(),
            isConnected: () => true
          };
        } catch(e) {
          setStatus("No active broadcast found", true);
          await stopAll();
          return;
        }
      }
      updateStats();
      startHealthMonitor();
    }

    function promoteToRelay(incomingStream) {
      if (myRole === 'relay') return;
      myRole = 'relay';
      setStatus("🔄 Acting as DHT relay node");
      if (webConnect && typeof webConnect.onConnect === 'function') {
        webConnect.onConnect(async (attr) => {
          if (forwardedPeers.size < maxChildren && incomingStream) {
            try {
              await webConnect.openStreaming(incomingStream, { connectId: attr.connectId });
              forwardedPeers.add(attr.connectId);
              currentHops++;
              updateStats();
            } catch(e) { console.warn("relay forward failed", e); }
          }
        });
      }
    }

    function startHealthMonitor() {
      if (healthInterval) clearInterval(healthInterval);
      healthInterval = setInterval(() => {
        if (webConnect && !webConnect.isConnected && !webConnect.isConnected()) {
          console.warn("Connection lost, attempting auto recovery");
          setStatus("Connection lost, reconnecting...");
          if (myRole === 'origin') startBroadcast();
          else if (myRole === 'viewer') joinViewer();
        }
      }, 8000);
    }

    async function stopAll() {
      if (healthInterval) { clearInterval(healthInterval); healthInterval = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (webConnect) {
        try { webConnect.Disconnect(); } catch(e) {}
        webConnect = null;
      }
      if (currentRelayManager) { currentRelayManager.shutdown(); currentRelayManager = null; }
      forwardedPeers.clear();
      currentHops = 0;
      localVideoWrapper.style.display = "none";
      mainRemoteWrapper.style.display = "none";
      controlBarDiv.style.display = "none";
      if (localVideo.srcObject) localVideo.srcObject = null;
      if (mainRemoteVideo.srcObject) mainRemoteVideo.srcObject = null;
      setStatus("Stopped");
      updateStats();
      myRole = null;
      currentActiveRelayUrl = null;
      activeRelaySpan.innerText = "—";
    }

    // mute handler
    muteBtn.onclick = () => {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          muteBtn.innerHTML = audioTrack.enabled ? "🎤 Mute" : "🔇 Unmute";
        }
      }
    };
    startBtn.onclick = startBroadcast;
    joinBtn.onclick = joinViewer;
    stopBtn.onclick = stopAll;
    
    // initial UI cleanup
    updateStats();
    setStatus("Ready. Choose role.");
  })();
</script>
</body>
</html>
