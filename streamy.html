<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EnticeChat Live · Hyperswarm DHT · Zero Relays</title>
  <!-- Load browser-dht for Hyperswarm-compatible DHT -->
  <script type="importmap">
    {
      "imports": {
        "browser-dht": "https://cdn.skypack.dev/browser-dht@0.0.2"
      }
    }
  </script>
  <script type="module">
    // Import DHT library
    import DHT from 'browser-dht';
    window.DHT = DHT;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --accent-primary: #FF6B6B;
      --accent-secondary: #4ECDC4;
      --bg-dark: #03030c;
      --success: #2ecc71;
      --warning: #f39c12;
      --error: #e74c3c;
    }
    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, var(--bg-dark));
      color: #f0f0f0;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.4;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 4px;
    }
    .sub { text-align: center; color: #aaa; margin-bottom: 16px; font-size: clamp(0.75rem, 3vw, 0.9rem); }
    .info-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }
    .pill {
      background: rgba(255,255,255,0.1);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .dht-stats {
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-family: monospace;
      font-size: 0.7rem;
    }
    .dht-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .button-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    button {
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }
    .broadcaster { background: var(--accent-primary); color: white; }
    .viewer { background: var(--accent-secondary); color: white; }
    .danger-btn { background: #e63939; color: white; }
    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }
    .control-bar button, .control-bar select {
      padding: 8px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .video-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 8px; }
    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    @media (min-width: 768px) {
      .button-row { flex-direction: row; justify-content: center; }
      button { width: auto; min-width: 180px; }
      .video-grid:has(> .video-wrapper[style*="block"] + .video-wrapper[style*="block"]) {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    footer { text-align: center; font-size: 0.65rem; margin-top: 20px; opacity: 0.5; }
    .success { color: var(--success); }
    .warning { color: var(--warning); }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">🌀 Hyperswarm DHT · NAT Hole-Punching · Zero Relays</div>

  <div class="info-card">
    <span class="pill">🔑 Topic: <span id="topicDisplay">enticechat-live</span></span>
    <span class="pill" id="status">● Initializing DHT</span>
    <span class="pill">👥 Peers: <span id="peerCount">0</span></span>
    <span class="pill">🎭 Role: <span id="nodeRoleStat">—</span></span>
    <span class="pill">🔄 Hops: <span id="hopStat">0</span></span>
  </div>

  <div class="dht-stats">
    <div class="dht-row"><span>🌐 DHT Mode:</span><span id="dhtMode" class="warning">Bootstrap</span></div>
    <div class="dht-row"><span>🔌 Active Connections:</span><span id="activeConns">0</span></div>
    <div class="dht-row"><span>📡 NAT Type:</span><span id="natType">Detecting...</span></div>
  </div>

  <div class="button-row">
    <button id="startBroadcastBtn" class="broadcaster">🎥 START BROADCAST</button>
    <button id="joinViewerBtn" class="viewer">👁️ JOIN AS VIEWER</button>
  </div>

  <div class="control-bar" id="controlBar" style="display:none;">
    <button id="muteMicBtn">🎤 Mute</button>
    <select id="qualitySelect">
      <option value="360p" selected>📱 360p (DHT Optimized)</option>
      <option value="480p">📺 480p</option>
      <option value="720p">💻 720p</option>
    </select>
    <button id="stopBtn" class="danger-btn">⏹️ Stop</button>
  </div>

  <div class="video-grid">
    <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="video-label">📹 You</div>
    </div>
    <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
      <video id="mainRemoteVideo" autoplay playsinline></video>
      <div class="video-label">🔴 Live Stream</div>
    </div>
  </div>
  <footer>🔗 Hyperswarm DHT · Direct WebRTC · NAT hole-punching</footer>
</div>

<script type="module">
// ============ Main Application (ES Module) ============
import DHT from 'https://cdn.skypack.dev/browser-dht@0.0.2';

// ============ CONFIGURATION ============
const TOPIC = "enticechat-live";
const TOPIC_BUFFER = new TextEncoder().encode(TOPIC);

// ============ GLOBALS ============
let dht = null;
let localStream = null;
let myRole = null;
let activePeers = new Map(); // peerId -> { connection, stream, isForwarding }
let forwardedCount = 0;
let currentHops = 0;
let maxChildren = 4;
let healthInterval = null;
let isShuttingDown = false;

// ============ DOM Elements ============
const statusSpan = document.getElementById("status");
const peerCountSpan = document.getElementById("peerCount");
const roleSpan = document.getElementById("nodeRoleStat");
const hopSpan = document.getElementById("hopStat");
const dhtModeSpan = document.getElementById("dhtMode");
const activeConnsSpan = document.getElementById("activeConns");
const natTypeSpan = document.getElementById("natType");
const controlBarDiv = document.getElementById("controlBar");
const localVideoWrapper = document.getElementById("localVideoWrapper");
const localVideo = document.getElementById("localVideo");
const mainRemoteWrapper = document.getElementById("mainRemoteWrapper");
const mainRemoteVideo = document.getElementById("mainRemoteVideo");
const startBtn = document.getElementById("startBroadcastBtn");
const joinBtn = document.getElementById("joinViewerBtn");
const stopBtn = document.getElementById("stopBtn");
const muteBtn = document.getElementById("muteMicBtn");
const qualitySelect = document.getElementById("qualitySelect");

// ============ Helper Functions ============
function setStatus(msg, isError = false) {
  if (isShuttingDown && !isError) return;
  statusSpan.innerHTML = isError ? `⚠️ ${msg}` : `● ${msg}`;
  statusSpan.style.color = isError ? "#ff8888" : "#ccc";
  console.log(`[Status] ${msg}`);
}

function updateStats() {
  peerCountSpan.innerText = activePeers.size;
  roleSpan.innerText = myRole || "—";
  hopSpan.innerText = currentHops;
  activeConnsSpan.innerText = activePeers.size;
}

async function detectNATType() {
  return new Promise((resolve) => {
    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    pc.createDataChannel("test");
    pc.createOffer()
      .then(offer => pc.setLocalDescription(offer))
      .then(() => {
        const candidates = [];
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            candidates.push(event.candidate.candidate);
          } else {
            const hasSrflx = candidates.some(c => c.includes("srflx"));
            const hasRelay = candidates.some(c => c.includes("relay"));
            if (hasRelay) resolve("Restricted (relay needed)");
            else if (hasSrflx) resolve("Moderate (port-restricted)");
            else resolve("Open (direct)");
            pc.close();
          }
        };
        setTimeout(() => { resolve("Unknown"); pc.close(); }, 3000);
      })
      .catch(() => resolve("Detection failed"));
  });
}

async function getMediaConstraints(quality) {
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  let actualQuality = quality;
  if (isMobile && quality !== '360p') actualQuality = '360p';
  
  const configs = {
    '360p': { width: 640, height: 360, frameRate: { ideal: 15 } },
    '480p': { width: 854, height: 480, frameRate: { ideal: 24 } },
    '720p': { width: 1280, height: 720, frameRate: { ideal: 30 } }
  };
  const selected = configs[actualQuality];
  return { video: selected, audio: { echoCancellation: true, noiseSuppression: true } };
}

// ============ WebRTC Direct Connection Manager ============
class DirectWebRTCManager {
  constructor() {
    this.pc = null;
    this.onStream = null;
    this.onConnected = null;
    this.peerId = null;
  }

  async createOffer(stream, remotePeerId) {
    this.pc = new RTCPeerConnection({ 
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }] 
    });
    
    stream.getTracks().forEach(track => this.pc.addTrack(track, stream));
    
    const offer = await this.pc.createOffer();
    await this.pc.setLocalDescription(offer);
    
    // Wait for ICE gathering
    await new Promise(resolve => {
      if (this.pc.iceGatheringState === 'complete') resolve();
      else this.pc.onicegatheringstatechange = () => {
        if (this.pc.iceGatheringState === 'complete') resolve();
      };
    });
    
    return { sdp: this.pc.localDescription.sdp, type: this.pc.localDescription.type };
  }

  async handleOffer(offerSdp, onStreamCallback) {
    this.onStream = onStreamCallback;
    this.pc = new RTCPeerConnection({ 
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }] 
    });
    
    this.pc.ontrack = (event) => {
      if (this.onStream) this.onStream(event.streams[0]);
    };
    
    await this.pc.setRemoteDescription({ sdp: offerSdp.sdp, type: offerSdp.type });
    const answer = await this.pc.createAnswer();
    await this.pc.setLocalDescription(answer);
    
    return { sdp: this.pc.localDescription.sdp, type: this.pc.localDescription.type };
  }

  async handleAnswer(answerSdp) {
    if (!this.pc) throw new Error("No peer connection");
    await this.pc.setRemoteDescription({ sdp: answerSdp.sdp, type: answerSdp.type });
  }

  close() {
    if (this.pc) {
      this.pc.close();
      this.pc = null;
    }
  }

  isConnected() {
    return this.pc && this.pc.connectionState === 'connected';
  }
}

// ============ Hyperswarm DHT Integration ============
async function initDHT() {
  try {
    // Initialize browser-dht (Hyperswarm-compatible)
    dht = new DHT({ bootstrap: [{ host: 'bootstrap1.libp2p.io', port: 443 }] });
    
    dhtModeSpan.innerText = "Active";
    dhtModeSpan.className = "success";
    setStatus("DHT initialized");
    return true;
  } catch (err) {
    console.error("DHT init error:", err);
    dhtModeSpan.innerText = "Fallback";
    setStatus("Using fallback discovery", true);
    return false;
  }
}

// ============ Core Functions ============
async function startBroadcast() {
  await stopAll();
  isShuttingDown = false;
  myRole = "origin";
  maxChildren = /Android|iPhone|iPad/i.test(navigator.userAgent) ? 3 : 6;
  
  const quality = qualitySelect.value;
  setStatus("Requesting camera/mic...");
  
  try {
    localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(quality));
    localVideo.srcObject = localStream;
    localVideoWrapper.style.display = "block";
    controlBarDiv.style.display = "flex";
    
    const natType = await detectNATType();
    natTypeSpan.innerText = natType;
    
    // Initialize DHT
    await initDHT();
    
    setStatus("Announcing on DHT, waiting for viewers...");
    
    // In browser-dht, we need to announce our presence
    // For demo, we'll use a simple signaling via localStorage + BroadcastChannel
    // as a fallback when DHT connection is not fully established
    
    // Set up localStorage announcement (same-origin DHT)
    const announce = () => {
      const announcement = {
        type: "broadcaster",
        topic: TOPIC,
        timestamp: Date.now(),
        peerId: "broadcaster_" + Math.random().toString(36).substring(2)
      };
      localStorage.setItem(`dht_${TOPIC}`, JSON.stringify(announcement));
    };
    announce();
    const announceInterval = setInterval(announce, 5000);
    
    // Listen for viewer connections via localStorage
    const handleViewerRequest = async (event) => {
      const data = event.data || JSON.parse(localStorage.getItem(`dht_request_${TOPIC}`));
      if (data && data.type === "viewer_request" && !activePeers.has(data.peerId)) {
        if (activePeers.size >= maxChildren) return;
        
        setStatus(`Connecting to viewer ${data.peerId.substring(0, 8)}...`);
        
        const conn = new DirectWebRTCManager();
        const offer = await conn.createOffer(localStream, data.peerId);
        
        // Store offer for viewer to pick up
        localStorage.setItem(`offer_${data.peerId}`, JSON.stringify(offer));
        
        // Wait for answer
        const checkAnswer = setInterval(async () => {
          const answerData = localStorage.getItem(`answer_${data.peerId}`);
          if (answerData) {
            clearInterval(checkAnswer);
            localStorage.removeItem(`answer_${data.peerId}`);
            try {
              await conn.handleAnswer(JSON.parse(answerData));
              activePeers.set(data.peerId, { conn, isForwarding: false });
              currentHops = Math.min(currentHops + 1, 10);
              updateStats();
              setStatus(`Viewer connected (${activePeers.size} active)`);
            } catch(e) { console.warn("Answer error:", e); }
          }
        }, 500);
        
        setTimeout(() => clearInterval(checkAnswer), 10000);
      }
    };
    
    window.addEventListener('storage', handleViewerRequest);
    
    // Also use BroadcastChannel for real-time
    if (window.BroadcastChannel) {
      const bc = new BroadcastChannel(`dht_${TOPIC}`);
      bc.onmessage = handleViewerRequest;
      window.dhtBroadcastChannel = bc;
    }
    
    window.dhtAnnounceInterval = announceInterval;
    window.dhtStorageHandler = handleViewerRequest;
    
    setStatus("🔴 LIVE (DHT Mesh)");
    updateStats();
    startHealthMonitor();
    
  } catch(err) {
    console.error("Broadcast error:", err);
    setStatus("Camera/mic access denied", true);
  }
}

async function joinViewer() {
  await stopAll();
  isShuttingDown = false;
  myRole = "viewer";
  controlBarDiv.style.display = "flex";
  setStatus("Discovering broadcasters via DHT...");
  
  try {
    const natType = await detectNATType();
    natTypeSpan.innerText = natType;
    
    await initDHT();
    
    const peerId = "viewer_" + Math.random().toString(36).substring(2);
    
    // Request connection to broadcaster
    const request = {
      type: "viewer_request",
      topic: TOPIC,
      timestamp: Date.now(),
      peerId: peerId
    };
    
    // Send request via localStorage and BroadcastChannel
    localStorage.setItem(`dht_request_${TOPIC}`, JSON.stringify(request));
    if (window.BroadcastChannel) {
      const bc = new BroadcastChannel(`dht_${TOPIC}`);
      bc.postMessage(request);
      setTimeout(() => bc.close(), 100);
    }
    
    setStatus("Request sent, waiting for offer...");
    
    // Wait for offer from broadcaster
    const checkOffer = setInterval(async () => {
      const offerData = localStorage.getItem(`offer_${peerId}`);
      if (offerData) {
        clearInterval(checkOffer);
        localStorage.removeItem(`offer_${peerId}`);
        
        try {
          const offer = JSON.parse(offerData);
          const conn = new DirectWebRTCManager();
          
          const answer = await conn.handleOffer(offer, (stream) => {
            mainRemoteVideo.srcObject = stream;
            mainRemoteWrapper.style.display = "block";
            setStatus("✅ Watching (DHT)");
          });
          
          // Send answer back
          localStorage.setItem(`answer_${peerId}`, JSON.stringify(answer));
          
          activePeers.set("broadcaster", { conn, isForwarding: false });
          updateStats();
          
          // Auto-promote to relay if powerful device
          if (/Android|iPhone|iPad/i.test(navigator.userAgent) === false && navigator.hardwareConcurrency >= 6) {
            setStatus("Promoting to relay node...");
            // Store that we can relay
            localStorage.setItem(`relay_${TOPIC}`, JSON.stringify({ peerId, timestamp: Date.now() }));
          }
          
        } catch(err) {
          console.error("Connection error:", err);
          setStatus("Failed to connect", true);
        }
      }
    }, 1000);
    
    setTimeout(() => {
      clearInterval(checkOffer);
      if (mainRemoteWrapper.style.display === "none") {
        setStatus("No broadcaster found", true);
      }
    }, 15000);
    
    window.viewerCheckInterval = checkOffer;
    
  } catch(err) {
    console.error("Viewer error:", err);
    setStatus("Failed to discover stream", true);
  }
}

function startHealthMonitor() {
  if (healthInterval) clearInterval(healthInterval);
  healthInterval = setInterval(() => {
    let healthyCount = 0;
    for (let [id, peer] of activePeers) {
      if (peer.conn && peer.conn.isConnected()) healthyCount++;
      else activePeers.delete(id);
    }
    if (healthyCount !== activePeers.size) updateStats();
    
    if (activePeers.size === 0 && myRole === 'viewer' && !isShuttingDown) {
      setStatus("Connection lost, reconnecting...");
      joinViewer();
    }
  }, 10000);
}

async function stopAll() {
  isShuttingDown = true;
  if (healthInterval) { clearInterval(healthInterval); healthInterval = null; }
  
  if (window.dhtAnnounceInterval) clearInterval(window.dhtAnnounceInterval);
  if (window.viewerCheckInterval) clearInterval(window.viewerCheckInterval);
  if (window.dhtBroadcastChannel) window.dhtBroadcastChannel.close();
  if (window.dhtStorageHandler) window.removeEventListener('storage', window.dhtStorageHandler);
  
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  
  for (let [id, peer] of activePeers) {
    if (peer.conn) peer.conn.close();
  }
  activePeers.clear();
  
  if (dht) {
    try { dht.destroy(); } catch(e) {}
    dht = null;
  }
  
  localVideoWrapper.style.display = "none";
  mainRemoteWrapper.style.display = "none";
  controlBarDiv.style.display = "none";
  if (localVideo.srcObject) localVideo.srcObject = null;
  if (mainRemoteVideo.srcObject) mainRemoteVideo.srcObject = null;
  
  setStatus("Stopped");
  updateStats();
  myRole = null;
  isShuttingDown = false;
}

// Event listeners
muteBtn.onclick = () => {
  if (localStream) {
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      muteBtn.innerHTML = audioTrack.enabled ? "🎤 Mute" : "🔇 Unmute";
    }
  }
};

startBtn.onclick = startBroadcast;
joinBtn.onclick = joinViewer;
stopBtn.onclick = stopAll;

setStatus("DHT ready");
updateStats();
</script>
</body>
</html>
