<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>EnticeChat · Auto-Mesh P2P Streaming</title>
  <!-- WebTorrent for DHT discovery (replaces manual signaling) -->
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
  <!-- Simple Peer for WebRTC with automatic SDP handling -->
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --accent-primary: #FF6B6B;
      --accent-secondary: #4ECDC4;
      --bg-dark: #0a0a1a;
      --success: #2ecc71;
      --warning: #f39c12;
      --error: #e74c3c;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
      color: #f0f0f0;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 4px;
    }

    .sub {
      text-align: center;
      color: #888;
      margin-bottom: 20px;
      font-size: clamp(0.7rem, 3vw, 0.85rem);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #888;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: bold;
    }

    /* DHT Panel */
    .dht-panel {
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .room-info {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      margin-bottom: 15px;
    }

    .room-hash {
      font-family: monospace;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 30px;
      display: inline-block;
      word-break: break-all;
    }

    /* Buttons */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-broadcast {
      background: var(--accent-primary);
      color: white;
    }

    .btn-viewer {
      background: var(--accent-secondary);
      color: white;
    }

    .btn-stop {
      background: #e63939;
      color: white;
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    @media (min-width: 768px) {
      .video-grid:has(.video-wrapper:nth-child(2):not([style*="display: none"])) {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }

    .peer-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
    }

    .mesh-visualization {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .mesh-node {
      background: rgba(78,205,196,0.2);
      border: 1px solid var(--accent-secondary);
      border-radius: 30px;
      padding: 3px 8px;
      font-size: 0.65rem;
    }

    footer {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 25px;
      opacity: 0.5;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      button { padding: 10px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">🌀 Auto-DHT Mesh · Zero Manual SDP · Auto-Reconnect</div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">STATUS</div><div class="stat-value" id="statusText">● Ready</div></div>
    <div class="stat-card"><div class="stat-label">PEERS</div><div class="stat-value" id="peerCount">0</div></div>
    <div class="stat-card"><div class="stat-label">ROLE</div><div class="stat-value" id="roleText">—</div></div>
    <div class="stat-card"><div class="stat-label">HOPS</div><div class="stat-value" id="hopCount">0</div></div>
  </div>

  <div class="dht-panel">
    <div class="room-info">
      <div class="stat-label">AUTO-DISCOVERY ROOM</div>
      <div class="room-hash" id="roomHash">enticechat-live</div>
      <div style="font-size:0.7rem; margin-top:6px;">🔍 Anyone in this room auto-connects</div>
    </div>
    <div class="mesh-visualization" id="meshVisual"></div>
  </div>

  <div class="button-group">
    <button id="startBtn" class="btn-broadcast">🎥 Start Broadcast</button>
    <button id="viewerBtn" class="btn-viewer">👁️ Auto-Join as Viewer</button>
    <button id="stopBtn" class="btn-stop" style="display:none;">⏹️ Stop</button>
  </div>

  <div class="video-grid">
    <div class="video-wrapper" id="localWrapper" style="display:none;">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="video-label">📹 You</div>
      <div class="peer-badge" id="localBadge">Broadcaster</div>
    </div>
    <div class="video-wrapper" id="remoteWrapper" style="display:none;">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="video-label">🔴 Live Stream</div>
      <div class="peer-badge" id="remoteBadge">Connected</div>
    </div>
  </div>
  <footer>⚡ WebTorrent DHT · Auto-Mesh Relaying · No Manual SDP · Auto-Reconnect</footer>
</div>

<script>
(function() {
  // ============ CONFIGURATION ============
  const ROOM = "enticechat-live";
  const ROOM_HASH = Array.from(ROOM).map(c => c.charCodeAt(0)).join('');
  
  // ============ GLOBALS ============
  let client = null;           // WebTorrent client
  let torrent = null;          // Torrent for signaling
  let localStream = null;
  let peers = new Map();       // peerId -> { peer, stream, hops, isRelay }
  let myPeerId = null;
  let myRole = null;           // 'broadcaster' or 'viewer'
  let currentHops = 0;
  let maxChildren = 4;
  let reconnectTimer = null;
  let healthCheckInterval = null;
  let isShuttingDown = false;
  
  // For mobile optimization
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const deviceCores = navigator.hardwareConcurrency || 2;
  const canBeRelay = !isMobile && deviceCores >= 4;
  
  // ============ DOM Elements ============
  const statusSpan = document.getElementById('statusText');
  const peerCountSpan = document.getElementById('peerCount');
  const roleSpan = document.getElementById('roleText');
  const hopSpan = document.getElementById('hopCount');
  const meshVisual = document.getElementById('meshVisual');
  const startBtn = document.getElementById('startBtn');
  const viewerBtn = document.getElementById('viewerBtn');
  const stopBtn = document.getElementById('stopBtn');
  const localWrapper = document.getElementById('localWrapper');
  const localVideo = document.getElementById('localVideo');
  const remoteWrapper = document.getElementById('remoteWrapper');
  const remoteVideo = document.getElementById('remoteVideo');
  const remoteBadge = document.getElementById('remoteBadge');
  
  // ============ Helper Functions ============
  function setStatus(msg, isError = false) {
    statusSpan.innerHTML = isError ? `⚠️ ${msg}` : `● ${msg}`;
    statusSpan.style.color = isError ? '#ff8888' : '#ccc';
    console.log(`[Status] ${msg}`);
  }
  
  function updateStats() {
    peerCountSpan.innerText = peers.size;
    roleSpan.innerText = myRole === 'broadcaster' ? '📹 Broadcaster' : (myRole === 'viewer' ? '👁️ Viewer' : '—');
    hopSpan.innerText = currentHops;
    
    // Update mesh visualization
    if (meshVisual) {
      let html = '';
      for (let [id, p] of peers) {
        const shortId = id.substring(0, 6);
        const type = p.isRelay ? '🔄 Relay' : (myRole === 'broadcaster' ? '👤 Viewer' : '📡 Source');
        html += `<div class="mesh-node">${type} ${shortId} (${p.hops || 0} hops)</div>`;
      }
      meshVisual.innerHTML = html || '<span style="opacity:0.5;">Waiting for peers...</span>';
    }
  }
  
  async function getMediaConstraints() {
    return {
      video: {
        width: { ideal: isMobile ? 640 : 1280 },
        height: { ideal: isMobile ? 360 : 720 },
        frameRate: { ideal: isMobile ? 15 : 24 }
      },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    };
  }
  
  // ============ WebTorrent DHT Signaling (Auto-Discovery, No Manual SDP) ============
  function initDHT() {
    return new Promise((resolve, reject) => {
      try {
        client = new WebTorrent({ tracker: { announce: [
          'wss://tracker.webtorrent.dev',
          'wss://tracker.openwebtorrent.com',
          'wss://tracker.btorrent.xyz'
        ] } });
        
        client.on('error', (err) => {
          console.warn('WebTorrent error:', err);
          // Fallback - continue without DHT
          resolve(null);
        });
        
        // Create a torrent for signaling - this acts as our DHT room
        const signalingData = Buffer.from(JSON.stringify({
          type: 'signaling',
          room: ROOM,
          timestamp: Date.now()
        }));
        
        client.seed(signalingData, { name: ROOM }, (tor) => {
          torrent = tor;
          setStatus('DHT connected - auto-discovery active');
          resolve(tor);
        });
        
        setTimeout(() => {
          if (!torrent) {
            resolve(null);
          }
        }, 5000);
      } catch(e) {
        console.warn('DHT init failed, using fallback', e);
        resolve(null);
      }
    });
  }
  
  // Broadcast presence via DHT
  function announcePresence(type, streamInfo = null) {
    if (!torrent) return;
    
    const announce = {
      type: 'announce',
      role: type,
      peerId: myPeerId,
      room: ROOM,
      timestamp: Date.now(),
      canRelay: canBeRelay,
      hops: currentHops
    };
    
    // Update torrent with new announce (re-seed with updated data)
    const announceData = Buffer.from(JSON.stringify(announce));
    if (torrent && !torrent.destroyed) {
      try {
        torrent.swarm.add(announceData);
      } catch(e) {}
    }
  }
  
  // ============ SimplePeer with Automatic SDP ============
  function createPeer(stream, isInitiator, remoteId = null) {
    const peer = new SimplePeer({
      initiator: isInitiator,
      stream: stream,
      trickle: true,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          {
            urls: ['turn:openrelay.metered.ca:80', 'turn:openrelay.metered.ca:443'],
            username: 'openrelayproject',
            credential: 'openrelayproject'
          }
        ]
      }
    });
    
    // Auto SDP handling - no manual intervention needed
    peer.on('signal', (data) => {
      // Send signal via DHT
      if (remoteId && torrent && !torrent.destroyed) {
        const signalMsg = {
          type: 'signal',
          to: remoteId,
          from: myPeerId,
          signal: data,
          room: ROOM,
          timestamp: Date.now()
        };
        torrent.swarm.add(Buffer.from(JSON.stringify(signalMsg)));
      }
    });
    
    peer.on('connect', () => {
      console.log('Peer connected');
      if (remoteId && peers.has(remoteId)) {
        peers.get(remoteId).connected = true;
      }
    });
    
    peer.on('stream', (remoteStream) => {
      console.log('Received stream from peer');
      if (myRole === 'viewer') {
        remoteVideo.srcObject = remoteStream;
        remoteWrapper.style.display = 'block';
        remoteBadge.innerHTML = '✅ Streaming';
        setStatus('✅ Watching live stream');
      } else if (myRole === 'broadcaster' && remoteId) {
        // New viewer connected
        const existing = peers.get(remoteId);
        if (existing) {
          existing.stream = remoteStream;
        }
        updateStats();
      }
    });
    
    peer.on('error', (err) => {
      console.warn('Peer error:', err);
    });
    
    peer.on('close', () => {
      if (remoteId) {
        peers.delete(remoteId);
        updateStats();
      }
    });
    
    return peer;
  }
  
  // ============ DHT Signal Listener (Auto-Discovery) ============
  function startSignalListener() {
    if (!torrent) return;
    
    const checkInterval = setInterval(() => {
      if (torrent && torrent.swarm && torrent.swarm.queued) {
        // Read messages from DHT
        const messages = torrent.swarm.queued || [];
        for (const msg of messages) {
          try {
            const data = JSON.parse(msg.toString());
            if (data.room === ROOM && data.from !== myPeerId) {
              handleSignal(data);
            }
          } catch(e) {}
        }
      }
    }, 1000);
    
    return checkInterval;
  }
  
  function handleSignal(data) {
    if (data.type === 'announce') {
      // New peer discovered - auto-connect if we're broadcaster
      if (myRole === 'broadcaster' && data.role === 'viewer' && !peers.has(data.peerId)) {
        if (peers.size < maxChildren) {
          console.log(`Auto-connecting to viewer: ${data.peerId}`);
          const peer = createPeer(localStream, true, data.peerId);
          peers.set(data.peerId, { peer, stream: null, hops: 1, isRelay: false });
          updateStats();
          
          // Send connection confirmation
          const confirmMsg = {
            type: 'connected',
            to: data.peerId,
            from: myPeerId,
            room: ROOM
          };
          torrent.swarm.add(Buffer.from(JSON.stringify(confirmMsg)));
        }
      }
      else if (myRole === 'viewer' && data.role === 'broadcaster' && !peers.has(data.peerId)) {
        // Viewer auto-connects to broadcaster
        console.log(`Auto-connecting to broadcaster: ${data.peerId}`);
        const peer = createPeer(null, true, data.peerId);
        peers.set(data.peerId, { peer, stream: null, hops: 0, isRelay: false });
        updateStats();
      }
    }
    else if (data.type === 'signal' && data.to === myPeerId) {
      // Handle WebRTC signal
      const peerConn = peers.get(data.from);
      if (peerConn && peerConn.peer) {
        peerConn.peer.signal(data.signal);
      }
    }
    else if (data.type === 'connected' && data.to === myPeerId) {
      // Connection confirmed
      const peerConn = peers.get(data.from);
      if (peerConn) {
        peerConn.connected = true;
        setStatus(`Connected to ${data.from.substring(0, 8)}`);
      }
    }
  }
  
  // ============ Relay Promotion (DHT Hops) ============
  function promoteToRelay(incomingStream, sourceId) {
    if (!canBeRelay || myRole === 'relay') return;
    
    myRole = 'relay';
    currentHops++;
    setStatus(`🔄 Acting as relay node (hop ${currentHops})`);
    
    // Announce as relay in DHT
    announcePresence('relay');
    
    // Forward stream to new viewers
    const forwardToNewPeers = (signalData) => {
      if (signalData.type === 'announce' && signalData.role === 'viewer' && peers.size < maxChildren) {
        const peer = createPeer(incomingStream, true, signalData.peerId);
        peers.set(signalData.peerId, { peer, stream: null, hops: currentHops + 1, isRelay: true });
        updateStats();
      }
    };
    
    // Listen for new peers to forward to
    if (torrent) {
      const relayInterval = setInterval(() => {
        if (torrent && torrent.swarm && torrent.swarm.queued) {
          for (const msg of torrent.swarm.queued) {
            try {
              const data = JSON.parse(msg.toString());
              if (data.room === ROOM && data.from !== myPeerId && data.type === 'announce' && data.role === 'viewer') {
                forwardToNewPeers(data);
              }
            } catch(e) {}
          }
        }
      }, 2000);
      
      window._relayInterval = relayInterval;
    }
  }
  
  // ============ Auto-Reconnect Logic ============
  function startHealthMonitor() {
    if (healthCheckInterval) clearInterval(healthCheckInterval);
    
    healthCheckInterval = setInterval(() => {
      if (isShuttingDown) return;
      
      let activePeers = 0;
      for (let [id, p] of peers) {
        if (p.peer && !p.peer.destroyed) activePeers++;
        else peers.delete(id);
      }
      
      if (activePeers !== peers.size) updateStats();
      
      // Auto-reconnect if disconnected
      if (myRole === 'viewer' && peers.size === 0 && !isShuttingDown) {
        setStatus('Disconnected, auto-reconnecting...');
        setTimeout(() => {
          if (!isShuttingDown && myRole === 'viewer') {
            announcePresence('viewer');
          }
        }, 3000);
      }
    }, 8000);
  }
  
  // ============ Main Actions ============
  async function startBroadcast() {
    await stopAll();
    isShuttingDown = false;
    myRole = 'broadcaster';
    myPeerId = 'bc_' + Math.random().toString(36).substring(2, 10);
    maxChildren = isMobile ? 3 : 6;
    
    setStatus('Requesting camera/mic...');
    
    try {
      localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints());
      localVideo.srcObject = localStream;
      localWrapper.style.display = 'block';
      
      // Initialize DHT
      await initDHT();
      startSignalListener();
      
      // Announce presence
      announcePresence('broadcaster');
      
      startBtn.style.display = 'none';
      viewerBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      
      setStatus('🔴 LIVE - Auto-discovery active');
      updateStats();
      startHealthMonitor();
      
    } catch(err) {
      console.error('Broadcast error:', err);
      setStatus('Camera/mic access denied', true);
      await stopAll();
    }
  }
  
  async function startViewer() {
    await stopAll();
    isShuttingDown = false;
    myRole = 'viewer';
    myPeerId = 'vw_' + Math.random().toString(36).substring(2, 10);
    
    setStatus('Auto-discovering broadcasters...');
    
    try {
      // Initialize DHT
      await initDHT();
      startSignalListener();
      
      // Announce as viewer
      announcePresence('viewer');
      
      startBtn.style.display = 'none';
      viewerBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      
      setStatus('Searching for stream...');
      updateStats();
      startHealthMonitor();
      
      // Auto-promote to relay if capable
      if (canBeRelay) {
        setTimeout(() => {
          if (remoteVideo.srcObject && peers.size > 0) {
            promoteToRelay(remoteVideo.srcObject, 'broadcaster');
          }
        }, 5000);
      }
      
    } catch(err) {
      console.error('Viewer error:', err);
      setStatus('Failed to start', true);
    }
  }
  
  async function stopAll() {
    isShuttingDown = true;
    
    if (healthCheckInterval) {
      clearInterval(healthCheckInterval);
      healthCheckInterval = null;
    }
    if (window._relayInterval) {
      clearInterval(window._relayInterval);
      window._relayInterval = null;
    }
    if (window._signalInterval) {
      clearInterval(window._signalInterval);
      window._signalInterval = null;
    }
    
    // Close all peers
    for (let [id, p] of peers) {
      if (p.peer) p.peer.destroy();
    }
    peers.clear();
    
    // Stop local stream
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    
    // Destroy torrent
    if (torrent && !torrent.destroyed) {
      try { torrent.destroy(); } catch(e) {}
      torrent = null;
    }
    
    // Destroy client
    if (client && !client.destroyed) {
      try { client.destroy(); } catch(e) {}
      client = null;
    }
    
    // Reset UI
    localWrapper.style.display = 'none';
    remoteWrapper.style.display = 'none';
    localVideo.srcObject = null;
    remoteVideo.srcObject = null;
    
    startBtn.style.display = 'inline-block';
    viewerBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
    
    myRole = null;
    currentHops = 0;
    setStatus('Ready');
    updateStats();
    
    isShuttingDown = false;
  }
  
  // ============ Event Listeners ============
  startBtn.onclick = startBroadcast;
  viewerBtn.onclick = startViewer;
  stopBtn.onclick = stopAll;
  
  // Initial setup
  updateStats();
  setStatus('Ready - Click Start Broadcast or Auto-Join');
})();
</script>
</body>
</html>
