<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EnticeChat Live · DHT-Hop P2P</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <style>
    :root {
      --accent-primary: #FF6B6B;
      --accent-secondary: #4ECDC4;
      --bg-dark: #03030c;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, var(--bg-dark));
      color: #f0f0f0;
      margin: 0;
      padding: 15px;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, var(--accent-primary));
      -webkit-background-clip: text;
      color: transparent;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      margin-bottom: 5px;
    }

    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 25px;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
    }

    /* Info Bar Responsiveness */
    .info-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .pill {
      background: rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    /* Layout logic */
    .main-layout {
      display: flex;
      flex-direction: column; /* Stack on mobile */
      gap: 20px;
    }

    .button-row {
      display: flex;
      flex-direction: column; /* Stack buttons on small screens */
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%; /* Full width on mobile */
    }

    .broadcaster { background: var(--accent-primary); color: white; }
    .viewer { background: var(--accent-secondary); color: white; }
    
    .danger-btn { background: #e63939; color: white; }

    /* Video Grid logic */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr; 
      gap: 15px;
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .control-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .control-bar button, select {
      width: 100%;
      margin: 0;
    }

    select {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Desktop Adjustments */
    @media (min-width: 768px) {
      .button-row {
        flex-direction: row;
        justify-content: center;
      }
      button {
        width: auto;
        min-width: 200px;
      }
      .control-bar {
        display: flex;
        justify-content: center;
      }
      .control-bar button, select {
        width: auto;
      }
      /* If two videos are active, show side-by-side */
      .video-grid:has(> .video-wrapper[style*="block"] + .video-wrapper[style*="block"]) {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">Pure Browser DHT-Hop P2P • Smart Relay Tree</div>

  <div class="info-card">
    <span class="pill"><strong>Channel:</strong> <span id="channelDisplay">enticechat-live</span></span>
    <span class="pill" id="status">Ready</span>
    <span class="pill">Peers: <span id="peerCount">0</span></span>
    <span class="pill">Role: <span id="nodeRoleStat">none</span></span>
    <span class="pill">Hops: <span id="hopStat">0</span></span>
  </div>

  <div class="main-layout">
    <div class="video-section">
      <div class="button-row">
        <button id="startBroadcastBtn" class="broadcaster">🎥 Start Broadcast</button>
        <button id="joinViewerBtn" class="viewer">👁️ Join as Viewer</button>
      </div>

      <div class="control-bar" id="controlBar" style="display:none;">
        <button id="muteMicBtn">🎤 Mute</button>
        <select id="qualitySelect">
          <option value="low" selected>360p (Low)</option>
          <option value="medium">480p (Med)</option>
          <option value="high">720p (High)</option>
        </select>
        <button id="stopBtn" class="danger-btn">Stop</button>
      </div>

      <div class="video-grid">
        <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="video-label">You</div>
        </div>

        <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
          <video id="mainRemoteVideo" autoplay playsinline></video>
          <div class="video-label">Live Stream</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// [JS code remains identical to your original logic to maintain functionality]
const CHANNEL = "enticechat-live";
let webConnect = null, localStream = null, myRole = null;
let forwardedTo = new Set(), currentHops = 0, maxChildren = 6;
const MAX_DEPTH = 12;

function isStrongDevice() { return navigator.hardwareConcurrency >= 6; }
function calculateCapacity() {
  const cores = navigator.hardwareConcurrency || 4;
  return cores >= 8 ? 8 : 4;
}

function setStatus(msg) { document.getElementById("status").innerText = msg; }

function updateStats() {
  document.getElementById("peerCount").innerText = forwardedTo.size;
  document.getElementById("nodeRoleStat").innerText = myRole || "none";
  document.getElementById("hopStat").innerText = currentHops;
}

async function getMediaConstraints(quality) {
  const configs = {
    low: { width: 640, height: 360, frameRate: 15 },
    medium: { width: 854, height: 480, frameRate: 24 },
    high: { width: 1280, height: 720, frameRate: 30 }
  };
  return { video: configs[quality] || configs.medium, audio: true };
}

async function startBroadcast() {
  await stopAll();
  myRole = "origin";
  maxChildren = calculateCapacity();
  const quality = document.getElementById("qualitySelect").value;
  localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(quality));
  document.getElementById("localVideo").srcObject = localStream;
  document.getElementById("localVideoWrapper").style.display = "block";
  document.getElementById("controlBar").style.display = "grid";
  webConnect = webconnect({ appName: "EnticeChat", channelName: CHANNEL, maxPeers: maxChildren * 2 });
  webConnect.onConnect(async (attr) => {
    if (forwardedTo.size < maxChildren) {
      await webConnect.openStreaming(localStream, { connectId: attr.connectId });
      forwardedTo.add(attr.connectId);
      currentHops = 1;
      updateStats();
    }
  });
  setStatus("🔴 Live");
  updateStats();
}

async function joinViewer() {
  await stopAll();
  myRole = "viewer";
  webConnect = webconnect({ appName: "EnticeChat", channelName: CHANNEL });
  webConnect.onStreaming((stream) => {
    document.getElementById("mainRemoteVideo").srcObject = stream;
    document.getElementById("mainRemoteWrapper").style.display = "block";
    document.getElementById("controlBar").style.display = "grid";
    if (isStrongDevice()) promoteToRelay(stream);
    setStatus("✅ Watching");
    updateStats();
  });
}

function promoteToRelay(incomingStream) {
  if (myRole === "relay") return;
  myRole = "relay";
  webConnect.onConnect(async (attr) => {
    if (forwardedTo.size < maxChildren) {
      await webConnect.openStreaming(incomingStream, { connectId: attr.connectId });
      forwardedTo.add(attr.connectId);
      updateStats();
    }
  });
}

async function stopAll() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (webConnect) try { webConnect.Disconnect(); } catch(e){}
  forwardedTo.clear();
  document.querySelectorAll('.video-wrapper').forEach(el => el.style.display = 'none');
  document.getElementById("controlBar").style.display = "none";
  setStatus("Stopped");
  updateStats();
}

document.getElementById("startBroadcastBtn").onclick = startBroadcast;
document.getElementById("joinViewerBtn").onclick = joinViewer;
document.getElementById("stopBtn").onclick = stopAll;
document.getElementById("muteMicBtn").onclick = () => {
  if (localStream) {
    const t = localStream.getAudioTracks()[0];
    if (t) { t.enabled = !t.enabled; document.getElementById("muteMicBtn").innerText = t.enabled ? "🎤 Mute" : "🎤 Unmute"; }
  }
};
</script>
</body>
</html>
