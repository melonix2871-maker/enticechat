<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>EnticeChat Live · DHT-Hop P2P</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <style>
    body {
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;    
    }
    .container {
      max-width: 1480px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      background: linear-gradient(135deg, #FFB347, #FF6B6B);
      -webkit-background-clip: text;
      color: transparent;
      font-size: 2.8rem;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    .info-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 25px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .pill {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.95rem;
    }
    .main-layout {
      display: flex;
      gap: 20px;
    }
    .video-section {
      flex: 1;
      min-width: 0;
    }
    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      justify-content: center;
    }
    button {
      padding: 14px 28px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .broadcaster {
      background: #FF6B6B;
      color: white;
    }
    .viewer {
      background: #4ECDC4;
      color: white;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .danger-btn {
      background: #e63939;
      color: white;
    }
    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .control-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    select {
      padding: 10px 16px;
      border-radius: 30px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">Pure Browser DHT-Hop P2P • Smart Relay Tree • Scalable to 1M+</div>

  <div class="info-card">
    <span><strong>Channel:</strong> <span class="room-badge" id="channelDisplay">enticechat-live</span></span>
    <span id="status">Choose your role</span>
    <span class="pill">Peers: <span id="peerCount">0</span></span>
    <span class="pill">Role: <span id="nodeRoleStat">none</span></span>
    <span class="pill">Hops: <span id="hopStat">0</span></span>
    <span class="pill">Relays: <span id="relayCount">0</span></span>
  </div>

  <div class="main-layout">
    <div class="video-section">
      <div class="button-row">
        <button id="startBroadcastBtn" class="broadcaster">🎥 Start Broadcast</button>
        <button id="joinViewerBtn" class="viewer">👁️ Join as Viewer</button>
      </div>

      <div class="control-bar" id="controlBar" style="display:none;">
        <button id="stopBtn" class="danger-btn">Stop Stream</button>
        <button id="muteMicBtn">🎤 Mute</button>
        <select id="qualitySelect">
          <option value="low" selected>Low (360p)</option>
          <option value="medium">Medium (540p)</option>
          <option value="high">High (720p)</option>
        </select>
      </div>

      <div class="video-grid">
        <!-- Local Video (Broadcaster) -->
        <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="video-label" id="localVideoLabel">You (Broadcaster)</div>
        </div>

        <!-- Remote Video (Viewer + Relay) -->
        <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
          <video id="mainRemoteVideo" autoplay playsinline></video>
          <div class="video-label" id="mainRemoteLabel">Live Stream</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CHANNEL = "enticechat-live";

let webConnect = null;
let localStream = null;
let myRole = null;
let myConnectId = null;
let myName = `User_${Math.random().toString(36).slice(2,8)}`;

let forwardedTo = new Set();
let currentHops = 0;
let maxChildren = 6;           // Increased for better scaling
let MAX_DEPTH = 12;            // Allow deeper tree for 1M scale

function isStrongDevice() {
  return navigator.hardwareConcurrency >= 6;
}

function calculateCapacity() {
  const cores = navigator.hardwareConcurrency || 4;
  if (cores >= 16) return 12;
  if (cores >= 8) return 8;
  if (cores >= 4) return 6;
  return 4;
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function updateStats() {
  document.getElementById("peerCount").innerText = forwardedTo.size + (myRole === "viewer" ? 1 : 0);
  document.getElementById("nodeRoleStat").innerText = myRole || "none";
  document.getElementById("hopStat").innerText = currentHops;
  document.getElementById("relayCount").innerText = forwardedTo.size;
}

// Improved quality handling
async function getMediaConstraints(quality) {
  const configs = {
    low:  { width: 640, height: 360, frameRate: 15 },
    medium: { width: 854, height: 480, frameRate: 24 },
    high:  { width: 1280, height: 720, frameRate: 30 }
  };
  return {
    video: configs[quality] || configs.medium,
    audio: true
  };
}

async function startBroadcast() {
  await stopAll();

  myRole = "origin";
  maxChildren = calculateCapacity();

  const quality = document.getElementById("qualitySelect").value;
  localStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(quality));

  document.getElementById("localVideo").srcObject = localStream;
  document.getElementById("localVideoWrapper").style.display = "block";
  document.getElementById("controlBar").style.display = "flex";

  webConnect = webconnect({ 
    appName: "EnticeChat", 
    channelName: CHANNEL,
    maxPeers: maxChildren * 2
  });

  webConnect.getMyId(attr => {
    myConnectId = attr.connectId;
    setStatus("🔴 Broadcasting • Relay Tree Active");
  });

  // Smart forwarding with hop control
  webConnect.onConnect(async (attr) => {
    if (forwardedTo.size >= maxChildren || currentHops >= MAX_DEPTH) return;

    try {
      await webConnect.openStreaming(localStream, { connectId: attr.connectId });
      forwardedTo.add(attr.connectId);
      currentHops = Math.max(currentHops, 1);
      updateStats();
    } catch(e) {
      console.warn("Forward failed to peer", e);
    }
  });

  updateStats();
}

async function joinViewer() {
  await stopAll();

  myRole = "viewer";
  maxChildren = calculateCapacity();

  webConnect = webconnect({ 
    appName: "EnticeChat", 
    channelName: CHANNEL,
    maxPeers: maxChildren * 2
  });

  webConnect.onStreaming((stream) => {
    document.getElementById("mainRemoteVideo").srcObject = stream;
    document.getElementById("mainRemoteWrapper").style.display = "block";
    setStatus("✅ Receiving Live Stream");

    // Auto-promote strong devices to relays
    if (isStrongDevice()) {
      setTimeout(() => promoteToRelay(stream), 800);
    }
    updateStats();
  });

  webConnect.getMyId(attr => {
    myConnectId = attr.connectId;
  });
}

function promoteToRelay(incomingStream) {
  if (myRole === "relay" || myRole === "origin") return;

  myRole = "relay";
  setStatus("🔁 Relay Node Active");

  webConnect.onConnect(async (attr) => {
    if (forwardedTo.size >= maxChildren || currentHops >= MAX_DEPTH) return;

    try {
      await webConnect.openStreaming(incomingStream, { connectId: attr.connectId });
      forwardedTo.add(attr.connectId);
      currentHops++;
      updateStats();
    } catch(e) {}
  });
}

async function stopAll() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (webConnect) {
    try { webConnect.Disconnect(); } catch(e){}
    webConnect = null;
  }
  forwardedTo.clear();
  currentHops = 0;

  document.getElementById("localVideoWrapper").style.display = "none";
  document.getElementById("mainRemoteWrapper").style.display = "none";
  document.getElementById("controlBar").style.display = "none";

  setStatus("Stream stopped");
  updateStats();
}

// Event Listeners
document.getElementById("startBroadcastBtn").onclick = startBroadcast;
document.getElementById("joinViewerBtn").onclick = joinViewer;
document.getElementById("stopBtn").onclick = stopAll;

// Quality change handler (for broadcaster)
document.getElementById("qualitySelect").addEventListener("change", async () => {
  if (myRole === "origin" && localStream) {
    const newQuality = document.getElementById("qualitySelect").value;
    try {
      const newStream = await navigator.mediaDevices.getUserMedia(await getMediaConstraints(newQuality));
      // Replace tracks
      localStream.getTracks().forEach(track => track.stop());
      localStream = newStream;
      document.getElementById("localVideo").srcObject = newStream;
      setStatus(`Quality changed to ${newQuality} (720p max)`);
    } catch(e) {
      console.error("Quality switch failed", e);
    }
  }
});

document.getElementById("muteMicBtn").onclick = () => {
  if (localStream) {
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      document.getElementById("muteMicBtn").textContent = audioTrack.enabled ? "🎤 Mute" : "🎤 Unmute";
    }
  }
};
</script>
</body>
</html>
