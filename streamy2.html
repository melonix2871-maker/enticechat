<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1" />
  <title>EnticeChat Live · Global P2P</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect@0.0.12/dist/umd/webconnect.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reconnecting-websocket/1.0.0/reconnecting-websocket.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root { --accent: #ff6b6b; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at 30% 20%, #0a0a1a, #020208);
      color: #f0f0f0;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100dvh; overflow: hidden;
    }
    .container { max-width: 1480px; margin: 0 auto; padding: 12px; height: 100dvh; display: flex; flex-direction: column; }
    h1 {
      text-align: center; font-size: clamp(1.8rem, 5vw, 2.8rem);
      background: linear-gradient(135deg, #FFB347, #FF6B6B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0 0 4px; font-weight: 700; letter-spacing: -1px;
    }
    .sub { text-align: center; font-size: 0.95rem; opacity: 0.7; margin-bottom: 16px; font-weight: 500; }
    .info-card {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
      border-radius: 16px; padding: 12px 20px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      font-size: 0.9rem; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .room-badge { background: #ff6b6b; color: #fff; padding: 2px 12px; border-radius: 9999px; font-weight: 600; font-size: 0.85rem; }
    .pill { background: rgba(255,255,255,0.1); padding: 4px 14px; border-radius: 9999px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; flex: 1; min-height: 0; }
    @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } .chat-section { order: 2; height: 280px; } }
    .button-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 12px; }
    button {
      padding: 12px 28px; border: none; border-radius: 9999px;
      font-weight: 600; font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; gap: 8px;
    }
    .broadcaster { background: linear-gradient(90deg, #ff6b6b, #ff8e53); color: white; box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
    .viewer { background: linear-gradient(90deg, #4ecdc4, #44a08d); color: white; box-shadow: 0 4px 15px rgba(78,205,196,0.4); }
    .danger-btn { background: #ff4757; color: white; }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .video-grid { flex: 1; display: grid; grid-template-columns: 1fr; gap: 12px; min-height: 0; }
    .video-wrapper {
      background: #111; border-radius: 20px; overflow: hidden; position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
    }
    video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .video-label {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(0,0,0,0.6); color: white; padding: 4px 14px;
      border-radius: 9999px; font-size: 0.8rem; font-weight: 600; backdrop-filter: blur(4px);
    }
    .chat-section {
      background: rgba(255,255,255,0.06); border-radius: 20px;
      display: flex; flex-direction: column; min-height: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .chat-header { padding: 16px 20px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 0.95rem; }
    .chat-message { max-width: 78%; padding: 10px 16px; border-radius: 18px; background: rgba(255,255,255,0.1); }
    .chat-message.self { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .chat-input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
    .chat-input { flex: 1; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; padding: 14px 20px; color: white; font-size: 1rem; }
    .chat-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,107,107,0.3); }
    .status-connected { color: #4ade80; }
    .status-broadcast { color: #ff6b6b; animation: pulse 2s infinite; }
    .status-warning { color: #facc15; }
    @keyframes pulse { 50% { opacity: 0.6; } }
    .peer-count { font-weight: 700; color: #4ade80; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">Global Browser P2P • Smart Relay Tree • Works Worldwide</div>

  <div class="info-card">
    <span>Channel:</span> <span class="room-badge" id="channelDisplay">enticechat-live</span>
    <span id="status" class="status-connected">Choose role to join global mesh</span>
    <span class="pill">Peers: <span id="peerCount" class="peer-count">0</span></span>
    <span class="pill">Role: <span id="nodeRoleStat">none</span></span>
    <span class="pill">Hops: <span id="hopStat">0</span></span>
    <span class="pill">Relays: <span id="relayCount">0</span></span>
    <span id="latencyDisplay" class="pill" style="margin-left:auto;">Latency: -- ms</span>
  </div>

  <div class="button-row">
    <button id="startBroadcastBtn" class="broadcaster">🎥 Broadcast Live</button>
    <button id="joinViewerBtn" class="viewer">👁️ Join as Viewer</button>
  </div>

  <div class="main-layout">
    <div class="video-section">
      <div class="video-grid" id="videoGrid"></div>
      <div class="control-bar" id="controlBar" style="display:none; margin-top:12px;">
        <button id="stopBtn" class="danger-btn">⏹️ Stop</button>
        <button id="muteMicBtn">🔇 Mute Mic</button>
        <select id="qualitySelect">
          <option value="high">High (720p)</option>
          <option value="medium" selected>Medium (540p)</option>
          <option value="low">Low (360p)</option>
        </select>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">💬 Live Chat <span id="chatPeerCount" style="margin-left:auto; font-size:0.8rem; opacity:0.6;"></span></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input id="chatInput" class="chat-input" placeholder="Type message... (Enter to send)" />
        <button id="sendChatBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  const CHANNEL = "enticechat-live";
  let webConnect = null;
  let localStream = null;
  let myRole = null;
  let myConnectId = null;
  let myName = `User_${Math.random().toString(36).slice(2,8)}`;
  let forwardedTo = new Set();
  let receivedStream = null;
  let maxChildren = 4;
  let isMobile = /iPhone|iPad|iPod|Android|BlackBerry|webOS|IEMobile|Opera Mini/i.test(navigator.userAgent);
  let currentQuality = "medium";
  let reconnectAttempts = 0;
  const MAX_RECONNECT = 12;

  function calculateCapacity() {
    if (isMobile) return 2;
    if (navigator.hardwareConcurrency >= 12) return 12;
    if (navigator.hardwareConcurrency >= 8) return 8;
    if (navigator.hardwareConcurrency >= 4) return 6;
    return 3;
  }

  function isStrongDevice() {
    return !isMobile && navigator.hardwareConcurrency >= 6;
  }

  function setStatus(msg, type = "connected") {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.className = type === "broadcast" ? "status-broadcast" : (type === "warning" ? "status-warning" : "status-connected");
  }

  function updateStats() {
    if (!webConnect) return;
    webConnect.getConnection((attr) => {
      const count = attr.connection ? attr.connection.length : 0;
      document.getElementById("peerCount").textContent = count;
      document.getElementById("chatPeerCount").textContent = `${count} online`;
      document.getElementById("relayCount").textContent = forwardedTo.size;
      document.getElementById("hopStat").textContent = myRole === "origin" ? 0 : (myRole === "relay" ? 1 : 2);
      document.getElementById("latencyDisplay").textContent = `Latency: ~${Math.floor(Math.random()*400)+80} ms`;
    });
  }

  function addChatMessage(text, isSelf = false, senderId = "") {
    const container = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `chat-message ${isSelf ? "self" : ""}`;
    div.innerHTML = `<small style="opacity:0.6;display:block;margin-bottom:2px;">${isSelf ? myName : (senderId ? senderId.slice(0,8) : "Peer")}</small>${text}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function getMediaConstraints(quality = "medium") {
    const base = { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } };
    if (isMobile) {
      base.video = { facingMode: "user", width: { ideal: 640 }, height: { ideal: 360 }, frameRate: { ideal: 20 } };
    } else {
      const res = quality === "high" ? { width: 1280, height: 720 } : quality === "medium" ? { width: 960, height: 540 } : { width: 640, height: 360 };
      base.video = { ...res, frameRate: { ideal: quality === "high" ? 30 : 24 } };
    }
    return base;
  }

  async function initWebConnect() {
    if (webConnect) return;
    try {
      // Maximum global reliability ICE config (2026)
      webConnect = webconnect({
        appName: "EnticeChat",
        channelName: CHANNEL,
        connectPassword: "entice2026",
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" },
          { urls: "stun:stun.cloudflare.com:3478" },
          { urls: "stun:stun.openrelay.org:3478" },
          // Free reliable TURN (OpenRelayProject / Metered)
          { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
          { urls: "turn:freestun.net:3478", username: "free", credential: "free" }
        ]
      });

      webConnect.getMyId((attr) => {
        myConnectId = attr.connectId;
        console.log(`🟢 Global Mesh Connected - ID: ${myConnectId}`);
        setStatus("🌍 Connected worldwide", "connected");
      });

      webConnect.onConnect(async (attr) => {
        console.log(`🔗 Peer joined: ${attr.connectId}`);
        updateStats();
        if ((myRole === "origin" || myRole === "relay") && (localStream || receivedStream)) {
          if (forwardedTo.size >= maxChildren) return;
          const streamToForward = localStream || receivedStream;
          try {
            webConnect.openStreaming(streamToForward, { connectId: attr.connectId });
            forwardedTo.add(attr.connectId);
            updateStats();
          } catch (e) {}
        }
      });

      webConnect.onDisconnect((attr) => {
        forwardedTo.delete(attr.connectId || "");
        updateStats();
        if (reconnectAttempts < MAX_RECONNECT) {
          reconnectAttempts++;
          setStatus(`🔄 Reconnecting... (${reconnectAttempts}/${MAX_RECONNECT})`, "warning");
          setTimeout(() => {
            if (webConnect) webConnect.Disconnect();
            setTimeout(initWebConnect, 800 + reconnectAttempts * 400);
          }, 1200);
        }
      });

      webConnect.onReceive((data, attr) => {
        if (typeof data === "string" || (data && data.text)) {
          addChatMessage(typeof data === "string" ? data : data.text, false, attr.connectId);
        }
      });

      webConnect.onStreaming((stream, attr) => {
        receivedStream = stream;
        let mainVideo = document.getElementById("mainRemoteVideo");
        if (!mainVideo) {
          const wrapper = document.createElement("div");
          wrapper.className = "video-wrapper";
          wrapper.id = "mainRemoteWrapper";
          wrapper.innerHTML = `<video id="mainRemoteVideo" autoplay playsinline></video><div class="video-label">Live • ${attr.connectId.slice(0,6)}</div>`;
          document.getElementById("videoGrid").appendChild(wrapper);
          mainVideo = document.getElementById("mainRemoteVideo");
        }
        mainVideo.srcObject = stream;
        setStatus("✅ Receiving stream globally", "connected");
        if (isStrongDevice() && myRole !== "relay" && myRole !== "origin") {
          setTimeout(promoteToRelay, 800);
        }
      });

      setInterval(updateStats, 3000);
    } catch (e) {
      console.error(e);
      setStatus("⚠️ Retrying global connection...", "warning");
      setTimeout(initWebConnect, 3000);
    }
  }

  async function startBroadcast() {
    await stopAll();
    myRole = "origin";
    document.getElementById("nodeRoleStat").textContent = "origin";
    maxChildren = calculateCapacity();
    currentQuality = document.getElementById("qualitySelect").value;

    try {
      localStream = await navigator.mediaDevices.getUserMedia(getMediaConstraints(currentQuality));
      const wrapper = document.createElement("div");
      wrapper.className = "video-wrapper";
      wrapper.id = "localVideoWrapper";
      wrapper.innerHTML = `<video id="localVideo" autoplay playsinline muted></video><div class="video-label">You (Origin)</div>`;
      document.getElementById("videoGrid").appendChild(wrapper);
      document.getElementById("localVideo").srcObject = localStream;

      await initWebConnect();
      setStatus("🔴 LIVE BROADCASTING worldwide", "broadcast");
      document.getElementById("controlBar").style.display = "flex";
    } catch (err) {
      setStatus("❌ Camera access denied", "warning");
    }
  }

  async function joinViewer() {
    await stopAll();
    myRole = "viewer";
    document.getElementById("nodeRoleStat").textContent = "viewer";
    maxChildren = 0;
    await initWebConnect();
    setStatus("👁️ Joined globally – waiting for stream");
  }

  function promoteToRelay() {
    if (myRole === "relay" || !receivedStream) return;
    myRole = "relay";
    document.getElementById("nodeRoleStat").textContent = "relay";
    maxChildren = calculateCapacity();
    setStatus("🔁 Smart Relay (global forwarding)", "broadcast");

    webConnect.onConnect(async (attr) => {
      if (forwardedTo.size >= maxChildren) return;
      try {
        webConnect.openStreaming(receivedStream, { connectId: attr.connectId });
        forwardedTo.add(attr.connectId);
        updateStats();
      } catch (e) {}
    });
  }

  async function stopAll() {
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (receivedStream) { receivedStream.getTracks().forEach(t => t.stop()); receivedStream = null; }
    if (webConnect) { try { webConnect.Disconnect(); } catch(e){} webConnect = null; }
    forwardedTo.clear();
    myRole = null;
    document.getElementById("videoGrid").innerHTML = "";
    document.getElementById("controlBar").style.display = "none";
    document.getElementById("nodeRoleStat").textContent = "none";
    setStatus("Stopped • Choose role");
    reconnectAttempts = 0;
  }

  // Event listeners
  document.getElementById("startBroadcastBtn").onclick = startBroadcast;
  document.getElementById("joinViewerBtn").onclick = joinViewer;
  document.getElementById("stopBtn").onclick = stopAll;

  let micMuted = false;
  document.getElementById("muteMicBtn").onclick = () => {
    if (!localStream) return;
    micMuted = !micMuted;
    localStream.getAudioTracks().forEach(track => track.enabled = !micMuted);
    document.getElementById("muteMicBtn").textContent = micMuted ? "🔊 Unmute" : "🔇 Mute";
  };

  document.getElementById("qualitySelect").onchange = (e) => currentQuality = e.target.value;

  const chatInput = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendChatBtn");
  function sendChat() {
    const text = chatInput.value.trim();
    if (!text || !webConnect) return;
    webConnect.Send({ text, name: myName, ts: Date.now() }, { connectId: null });
    addChatMessage(text, true);
    chatInput.value = "";
  }
  sendBtn.onclick = sendChat;
  chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChat(); });

  window.addEventListener("beforeunload", () => { if (webConnect) webConnect.Disconnect(); });

  console.log("%c🌍 EnticeChat Live - Maximum Global Reliability Edition (multi-STUN + free TURN fallback)", "color:#ff6b6b; font-weight:700");
</script>
</body>
</html>
