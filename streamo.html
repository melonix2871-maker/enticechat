<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>EnticeChat Live · Pure P2P</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
  <style>
    /* Your original beautiful styles - unchanged */
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 1480px; margin: 0 auto; padding: 0 16px; }
    h1 {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, #FFB347, #FF6B6B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      text-align: center;
    }
    .sub { color: #aaa; margin-top: -8px; font-size: 0.95rem; text-align: center; }
    .main-layout { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .video-section { flex: 3; min-width: 300px; }
    .chat-section {
      flex: 1.15; min-width: 290px;
      background: rgba(10, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(255,215,0,0.18);
      display: flex; flex-direction: column; height: 72vh; overflow: hidden;
    }
    .info-card {
      background: rgba(20, 25, 45, 0.86);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 14px 18px;
      margin: 0 0 20px 0;
      display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
      align-items: center; border: 1px solid rgba(255,255,255,0.12);
    }
    .pill, #status, .room-badge {
      background: #0f172a; padding: 7px 14px; border-radius: 999px;
      font-size: 0.84rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.06);
    }
    .room-badge { font-family: monospace; color: #ffd966; cursor: pointer; user-select: all; }
    .room-badge:hover { background: #162238; }
    .video-grid { display: flex; flex-direction: column; gap: 16px; }
    .video-wrapper {
      position: relative; background: #000; border-radius: 24px;
      overflow: hidden; border: 1px solid rgba(255,215,0,0.26);
      box-shadow: 0 18px 35px -14px rgba(0,0,0,0.65);
    }
    .video-wrapper video { width: 100%; display: block; background: #090909; border-radius: 24px; }
    .video-label {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(0,0,0,0.72); padding: 5px 12px;
      border-radius: 20px; font-size: 0.75rem; font-weight: 600;
      backdrop-filter: blur(4px); z-index: 10;
    }
    .button-row, .control-bar { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 14px; }
    button, select {
      padding: 11px 22px; font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: 999px; color: white; background: #2b3b4f; cursor: pointer;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .broadcaster { background: linear-gradient(95deg, #E63E2E, #C0392B); }
    .viewer { background: linear-gradient(95deg, #1F6392, #0E4A6E); }
    .danger-btn { background: #7f2a2a; }
    .small-btn { padding: 8px 16px; font-size: .82rem; background: #2a2f3f; }
    .chat-header { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.10); font-weight: 700; background: rgba(0,0,0,0.22); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
    .message.own { align-items: flex-end; }
    .message-bubble { max-width: 88%; padding: 9px 14px; border-radius: 18px; background: rgba(30, 40, 60, .92); word-wrap: break-word; }
    .message.own .message-bubble { background: linear-gradient(135deg, #E63E2E, #C0392B); }
    .message-name { font-size: .7rem; opacity: .72; margin-bottom: 4px; margin-left: 10px; }
    .message.own .message-name { text-align: right; margin-right: 10px; margin-left: 0; }
    .message-text { font-size: .9rem; line-height: 1.4; }
    .message-time { font-size: .62rem; opacity: .5; margin-top: 4px; margin-left: 10px; }
    .chat-input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 10px 16px; border: none; border-radius: 40px; background: rgba(20, 30, 45, 0.9); color: white; font-size: 0.9rem; outline: none; }
    .chat-input:focus { border: 1px solid #ffb347; }
    .send-btn { padding: 10px 18px; background: #ffb347; color: #1a1a2e; border-radius: 40px; font-weight: 800; }
    .footer-note { font-size: 0.72rem; color: #6c7a89; margin-top: 22px; text-align: center; border-top: 1px solid #222; padding-top: 20px; line-height: 1.55; }
    .live-pulse { display: inline-block; width: 10px; height: 10px; background: #e74c3c; border-radius: 50%; margin-right: 8px; animation: pulse 1.2s infinite; vertical-align: middle; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
    @media (max-width: 768px) { .main-layout { flex-direction: column; } .chat-section { height: 42vh; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">Pure Browser P2P Mesh • No Server Needed</div>

  <div class="info-card">
    <span>🔗 Channel:</span>
    <span class="room-badge" id="channelDisplay">enticechat-live</span>
    <span id="status">⚡ Choose your role</span>
    <span class="pill">👥 Peers: <span id="peerCount">0</span></span>
    <span class="pill">🧭 Role: <span id="nodeRoleStat">none</span></span>
    <span class="pill">🎚 Quality: <span id="currentQualityStat">high</span></span>
  </div>

  <div class="main-layout">
    <div class="video-section">
      <div class="button-row">
        <button id="startBroadcastBtn" class="broadcaster">🎥 Start Broadcasting</button>
        <button id="joinViewerBtn" class="viewer">👁️ Join as Viewer</button>
      </div>

      <div class="control-bar" id="controlBar" style="display:none;">
        <button id="stopBtn" class="small-btn danger-btn">🔴 Stop / Leave</button>
        <button id="muteMicBtn" class="small-btn">🎤 Mute Mic</button>
        <button id="toggleCamBtn" class="small-btn">📷 Pause Camera</button>
        <select id="qualitySelect">
          <option value="high">High Quality</option>
          <option value="medium" selected>Medium Quality</option>
          <option value="low">Low Quality</option>
        </select>
      </div>

      <div class="video-grid">
        <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="video-label" id="localVideoLabel">You</div>
        </div>
        <div class="video-wrapper" id="mainRemoteWrapper" style="display:none;">
          <video id="mainRemoteVideo" autoplay playsinline></video>
          <div class="video-label" id="mainRemoteLabel">🎙️ Live</div>
        </div>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">💬 Live Chat <span id="chatRoleBadge"></span></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." maxlength="500" />
        <button id="sendChatBtn" class="send-btn">📤 Send</button>
      </div>
    </div>
  </div>

  <div class="footer-note">
    Pure P2P Mesh using WebRTC.<br>
    Broadcaster sends directly to all viewers. Viewers can optionally forward (relay) if device allows.
  </div>
</div>

<script>
  const CHANNEL = "enticechat-live";
  let webConnect = null;
  let localStream = null;
  let myRole = null; // "origin" or "viewer"
  let myConnectId = null;
  let myName = `User_${Math.floor(Math.random() * 9999)}`;

  const statusSpan = document.getElementById("status");
  const peerCountSpan = document.getElementById("peerCount");
  const nodeRoleStat = document.getElementById("nodeRoleStat");
  const currentQualityStat = document.getElementById("currentQualityStat");
  const localVideoWrapper = document.getElementById("localVideoWrapper");
  const localVideo = document.getElementById("localVideo");
  const localVideoLabel = document.getElementById("localVideoLabel");
  const mainRemoteWrapper = document.getElementById("mainRemoteWrapper");
  const mainRemoteVideo = document.getElementById("mainRemoteVideo");
  const mainRemoteLabel = document.getElementById("mainRemoteLabel");
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const sendChatBtn = document.getElementById("sendChatBtn");
  const chatRoleBadge = document.getElementById("chatRoleBadge");

  function setStatus(msg, isLive = false) {
    statusSpan.innerHTML = isLive ? `<span class="live-pulse"></span>${msg}` : msg;
  }

  function addChatMessage(sender, text, isOwn = false) {
    const div = document.createElement("div");
    div.className = `message ${isOwn ? "own" : ""}`;
    div.innerHTML = `
      <div class="message-name">${sender}</div>
      <div class="message-bubble"><div class="message-text">${text}</div></div>
      <div class="message-time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
    `;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function startBroadcast() {
    await stopAll();
    myRole = "origin";
    nodeRoleStat.textContent = "Origin";
    chatRoleBadge.textContent = "· ORIGIN";
    document.getElementById("controlBar").style.display = "flex";

    const quality = document.getElementById("qualitySelect").value;
    const constraints = quality === "high" ? { video: { width: 1280, height: 720 }, audio: true } :
                      quality === "medium" ? { video: { width: 960, height: 540 }, audio: true } :
                      { video: { width: 640, height: 360 }, audio: true };

    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    localVideo.srcObject = localStream;
    localVideoWrapper.style.display = "block";
    localVideoLabel.textContent = "You (Broadcasting)";

    webConnect = webconnect({ appName: "EnticeChat", channelName: CHANNEL });

    webConnect.getMyId((attr) => {
      myConnectId = attr.connectId;
      setStatus("🔴 LIVE as Broadcaster", true);
    });

    webConnect.onConnect(() => peerCountSpan.textContent = "1+");

    webConnect.onReceive((data) => {
      try {
        const msg = JSON.parse(data);
        if (msg.type === "chat") {
          addChatMessage(msg.sender || "Peer", msg.text);
        }
      } catch(e) {}
    });

    webConnect.onStreaming((stream, attr) => {
      // Viewers may also forward stream
      if (mainRemoteVideo.srcObject !== stream) {
        mainRemoteVideo.srcObject = stream;
        mainRemoteWrapper.style.display = "block";
      }
    });
  }

  async function joinAsViewer() {
    await stopAll();
    myRole = "viewer";
    nodeRoleStat.textContent = "Viewer";
    chatRoleBadge.textContent = "· VIEWER";
    document.getElementById("controlBar").style.display = "flex";

    webConnect = webconnect({ appName: "EnticeChat", channelName: CHANNEL });

    webConnect.getMyId((attr) => myConnectId = attr.connectId);

    webConnect.onConnect(() => {
      peerCountSpan.textContent = "1+";
    });

    webConnect.onStreaming((stream, attr) => {
      mainRemoteVideo.srcObject = stream;
      mainRemoteWrapper.style.display = "block";
      mainRemoteLabel.textContent = "Live Stream";
      setStatus("✅ Receiving Live Stream", true);
    });

    webConnect.onReceive((data) => {
      try {
        const msg = JSON.parse(data);
        if (msg.type === "chat") addChatMessage(msg.sender || "Peer", msg.text);
      } catch(e) {}
    });
  }

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text || !webConnect) return;

    webConnect.Send(JSON.stringify({
      type: "chat",
      sender: myName,
      text: text
    }));

    addChatMessage(myName, text, true);
    chatInput.value = "";
  }

  async function stopAll() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    localVideo.srcObject = null;
    mainRemoteVideo.srcObject = null;
    localVideoWrapper.style.display = "none";
    mainRemoteWrapper.style.display = "none";

    if (webConnect) {
      try { webConnect.Disconnect(); } catch(e) {}
      webConnect = null;
    }

    setStatus("⚡ Choose your role");
    peerCountSpan.textContent = "0";
    document.getElementById("controlBar").style.display = "none";
  }

  // Button listeners
  document.getElementById("startBroadcastBtn").addEventListener("click", startBroadcast);
  document.getElementById("joinViewerBtn").addEventListener("click", joinAsViewer);
  document.getElementById("stopBtn").addEventListener("click", stopAll);
  sendChatBtn.addEventListener("click", sendChat);
  chatInput.addEventListener("keypress", e => { if (e.key === "Enter") sendChat(); });

  document.getElementById("channelDisplay").addEventListener("click", () => {
    navigator.clipboard.writeText(CHANNEL).then(() => setStatus("📋 Channel copied!"));
  });

  // Cleanup
  window.addEventListener("beforeunload", stopAll);

  setStatus("⚡ Choose your role");
  console.log("✅ Pure P2P EnticeChat Ready (using webconnect.js mesh)");
</script>
</body>
</html>
