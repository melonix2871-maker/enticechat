<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KatanaShare - P2P Video Chat & File Sharing (VDO.Ninja SDK)</title>
    <style>
        :root {
            --bg: #1e1f22;
            --sidebar-bg: #111214;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text: #e0e0e0;
            --text-muted: #9ca3af;
            --border: #2b2d31;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .main-header {
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 50;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .file-storage-btn {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room-badge {
            background: #2b2d31;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .peer-count {
            background: #2b2d31;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        /* Main Content Layout */
        .content-area { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }
        .workspace-header { padding: 20px 16px; border-bottom: 1px solid var(--border); }
        .workspace-name { font-size: 18px; font-weight: 700; }
        .workspace-status { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        
        .users-section { flex: 1; overflow-y: auto; padding: 16px; }
        .user-section-title { font-size: 11px; color: var(--text-muted); margin: 0 0 12px 8px; text-transform: uppercase; }
        .user-item {
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            list-style: none;
        }
        .user-item:hover { background: #2b2d31; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
        .you-badge { background: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 10px; margin-left: auto; }
        
        .connect-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--sidebar-bg);
            flex-shrink: 0;
        }
        .room-input {
            width: 100%;
            background: #2b2d31;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .connect-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        /* Video Grid - 16:9 responsive */
        .video-grid {
            flex: 1;
            background: #0a0a0a;
            overflow-y: auto;
            padding: 12px;
        }
        .videos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            aspect-ratio: 16 / 9;
        }
        .video-wrapper.local { border-color: var(--accent); }
        .video-wrapper.remote { border-color: var(--success); }
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        .video-controls {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 6px;
            border-radius: 40px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .video-control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2b2d31;
            border: none;
            font-size: 16px;
            color: white;
            cursor: pointer;
        }
        .video-control-btn.active { background: var(--success); }
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            height: 100%;
            background: linear-gradient(135deg, #1e1f22, #111214);
        }
        .video-placeholder button {
            background: var(--accent);
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* Chat Section */
        .chat-section {
            height: 35vh;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }
        .chat-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .chat-tab {
            padding: 6px 14px;
            background: #2b2d31;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .chat-tab.active { background: var(--accent); }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
        }
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
        }
        .message-input-wrapper {
            background: #2b2d31;
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
        }
        .message-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            outline: none;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            padding: 6px 20px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        /* File Cabinet Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .file-cabinet {
            background: var(--sidebar-bg);
            border-radius: 24px;
            width: 90%;
            max-width: 800px;
            height: 70%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cabinet-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .file-item {
            background: #2b2d31;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .download-btn, .delete-btn {
            background: #1e1f22;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .download-btn:hover { background: var(--success); }
        .delete-btn:hover { background: var(--danger); }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.2s;
                z-index: 300;
                width: 280px;
            }
            .sidebar.open { transform: translateX(0); }
            .top-bar { display: flex !important; }
            .videos-container { grid-template-columns: 1fr; }
        }
        .top-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
        }
        .hamburger {
            background: var(--accent);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 299;
        }
        .sidebar-overlay.active { display: block; }
        @media (min-width: 769px) { .sidebar-overlay { display: none !important; } }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@latest/vdoninja-sdk.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="main-header">
            <div class="logo-area">
                <span class="logo-icon">⚔️</span>
                <span class="logo-text">KatanaShare</span>
            </div>
            <div class="header-right">
                <div class="room-badge">🏠 <span id="roomDisplay">lobby</span></div>
                <div class="peer-count" id="peerCount">👥 0 peers</div>
                <button class="file-storage-btn" id="fileStorageBtn">📁 File Storage</button>
            </div>
        </div>

        <div class="top-bar" id="mobileTopBar">
            <button class="hamburger" id="hamburgerBtn">☰</button>
            <div class="room-title-mobile" id="mobileRoomName"></div>
            <div style="width: 40px;"></div>
        </div>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="content-area">
            <div class="sidebar" id="sidebar">
                <button class="sidebar-close-btn" style="display:none;" id="sidebarCloseBtn">✕</button>
                <div class="workspace-header">
                    <div class="workspace-name">KatanaShare</div>
                    <div class="workspace-status">
                        <span class="status-indicator"></span>
                        <span id="connectionStatus">Disconnected</span>
                    </div>
                    <div style="font-size: 11px; margin-top: 8px; word-break: break-all;" id="myStreamId">Stream ID: -</div>
                </div>
                <div class="users-section">
                    <div class="user-section-title">👤 YOU</div>
                    <ul id="currentUserList" style="list-style:none;">
                        <li class="user-item"><span class="online-dot"></span><span id="currentUsername">You</span><span class="you-badge">You</span></li>
                    </ul>
                    <div class="user-section-title" style="margin-top:16px;">🟢 PEERS IN ROOM (<span id="peerCountSidebar">0</span>)</div>
                    <ul id="peerList" style="list-style:none;"></ul>
                </div>
                <div class="connect-section">
                    <input type="text" id="roomInput" class="room-input" placeholder="Room name" value="lobby">
                    <button id="connectRoomBtn" class="connect-btn">🔗 Join Room</button>
                </div>
            </div>

            <div class="main-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
                <div class="video-grid" id="videoGrid">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <div style="font-size: 48px;">🎥</div>
                        <button id="enableCameraBtn">Enable Camera</button>
                        <p style="margin-top:8px;">Share your video with the room</p>
                    </div>
                    <div class="videos-container" id="videosContainer" style="display:none;"></div>
                    <div class="video-controls" id="videoControls" style="display:none;">
                        <button class="video-control-btn" id="toggleAudioBtn">🎤</button>
                        <button class="video-control-btn" id="toggleVideoBtn">📹</button>
                    </div>
                </div>

                <div class="chat-section">
                    <div class="chat-tabs" id="chatTabs">
                        <div class="chat-tab active" data-target="global">🌍 Room Chat</div>
                    </div>
                    <div class="messages-container" id="messagesContainer"></div>
                    <div class="input-area">
                        <div class="message-input-wrapper">
                            <textarea class="message-input" id="messageInput" placeholder="Type a message... (Enter to send)" rows="1"></textarea>
                            <button class="send-btn" id="sendBtn">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- File Cabinet Modal -->
    <div class="modal-overlay" id="fileCabinetModal">
        <div class="file-cabinet">
            <div class="cabinet-header">
                <h2>📁 File Cabinet</h2>
                <button class="close-cabinet" id="closeCabinetBtn" style="background:#2b2d31; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">✕</button>
            </div>
            <div class="upload-area" style="padding:16px 24px; border-bottom:1px solid var(--border);">
                <input type="file" id="fileInput" style="display: none;" multiple>
                <button id="uploadFileBtn" class="upload-btn" style="background:var(--accent); border:none; padding:8px 20px; border-radius:30px; color:white; cursor:pointer;">📤 Upload File</button>
                <span style="margin-left:12px; font-size:12px;">Files shared P2P with everyone in the room</span>
            </div>
            <div class="file-list" id="fileListContainer">
                <div class="empty-files" style="text-align:center; padding:40px;">No files shared yet</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        let vdo = null;
        let localStream = null;
        let isCameraActive = false;
        let isAudioEnabled = true;
        let isVideoEnabled = true;
        let currentRoom = 'lobby';
        let myStreamId = null;
        let remoteStreams = new Map(); // streamId -> { stream, username }
        let peers = new Map(); // streamId -> username
        
        // Chat state
        let globalMessages = [];
        let dmMessages = new Map();
        let activeChat = 'global';
        
        // File sharing
        let sharedFiles = new Map();
        
        // DOM Elements
        const videosContainer = document.getElementById('videosContainer');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoControls = document.getElementById('videoControls');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const peerListEl = document.getElementById('peerList');
        const peerCountSpan = document.getElementById('peerCount');
        const peerCountSidebar = document.getElementById('peerCountSidebar');
        const roomDisplay = document.getElementById('roomDisplay');
        const mobileRoomName = document.getElementById('mobileRoomName');
        const myStreamIdSpan = document.getElementById('myStreamId');
        const connectionStatusSpan = document.getElementById('connectionStatus');
        const currentUsernameSpan = document.getElementById('currentUsername');
        const fileListContainer = document.getElementById('fileListContainer');
        
        // Set username from URL or random
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username') || `User_${Math.floor(Math.random() * 1000)}`;
        currentUsernameSpan.textContent = username;
        
        // ==================== Helper Functions ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }
        
        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function addSystemMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.style.opacity = '0.7';
            div.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div>${escapeHtml(msg)}</div></div>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function addChatMessage(author, text, time) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar">${escapeHtml(author.substring(0,2).toUpperCase())}</div>
                <div class="message-content">
                    <div style="display:flex; gap:8px;"><strong>${escapeHtml(author)}</strong><span style="font-size:11px;color:#9ca3af;">${time}</span></div>
                    <div>${escapeHtml(text)}</div>
                </div>
            `;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // ==================== Peer List Rendering ====================
        function updatePeerList() {
            const peerArray = Array.from(peers.entries());
            peerCountSpan.textContent = `👥 ${peerArray.length} peers`;
            peerCountSidebar.textContent = peerArray.length;
            
            if (peerArray.length === 0) {
                peerListEl.innerHTML = '<li style="padding:16px;text-align:center;color:#6b7280;">No other peers in room</li>';
            } else {
                peerListEl.innerHTML = peerArray.map(([streamId, peerUsername]) => `
                    <li class="user-item" data-stream-id="${escapeHtml(streamId)}">
                        <span class="online-dot"></span>
                        <span>${escapeHtml(peerUsername)}</span>
                        <span class="dm-badge" style="background:#4b5563; padding:2px 8px; border-radius:10px; font-size:10px; margin-left:auto; cursor:pointer;" onclick="openDM('${escapeHtml(streamId)}', '${escapeHtml(peerUsername)}')">💬 DM</span>
                    </li>
                `).join('');
            }
        }
        
        // ==================== Video Rendering ====================
        function renderVideos() {
            const hasLocal = isCameraActive;
            const hasRemote = remoteStreams.size > 0;
            
            if (!hasLocal && !hasRemote) {
                videosContainer.style.display = 'none';
                videoPlaceholder.style.display = 'flex';
                videoControls.style.display = 'none';
                return;
            }
            
            videosContainer.style.display = 'grid';
            videoPlaceholder.style.display = 'none';
            videoControls.style.display = 'flex';
            
            let html = '';
            
            // Local video
            if (localStream && isCameraActive) {
                html += `
                    <div class="video-wrapper local">
                        <video id="localVideo" class="video-element" autoplay playsinline muted></video>
                        <div class="video-label">📹 You (${escapeHtml(username)})</div>
                    </div>
                `;
                setTimeout(() => {
                    const vid = document.getElementById('localVideo');
                    if (vid && localStream) vid.srcObject = localStream;
                }, 100);
            }
            
            // Remote videos
            for (let [streamId, data] of remoteStreams) {
                if (data.stream) {
                    html += `
                        <div class="video-wrapper remote">
                            <video id="remote_${streamId.replace(/[^a-zA-Z0-9]/g, '_')}" class="video-element" autoplay playsinline></video>
                            <div class="video-label">👤 ${escapeHtml(data.username || streamId.substring(0,8))}</div>
                        </div>
                    `;
                    setTimeout(() => {
                        const vid = document.getElementById(`remote_${streamId.replace(/[^a-zA-Z0-9]/g, '_')}`);
                        if (vid && data.stream) vid.srcObject = data.stream;
                    }, 100);
                }
            }
            
            videosContainer.innerHTML = html;
        }
        
        // ==================== Camera ====================
        async function enableCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, aspectRatio: 16/9 },
                    audio: true
                });
                isCameraActive = true;
                
                // Publish stream to VDO.Ninja
                if (vdo && vdo.publish) {
                    await vdo.publish(localStream);
                    addSystemMessage('🎥 Camera enabled - Stream published to room');
                }
                
                renderVideos();
                
                document.getElementById('toggleAudioBtn').classList.add('active');
                document.getElementById('toggleVideoBtn').classList.add('active');
            } catch(err) {
                addSystemMessage('❌ Camera access denied');
            }
        }
        
        function toggleAudio() {
            if (!localStream) return;
            const track = localStream.getAudioTracks()[0];
            if (track) {
                isAudioEnabled = !isAudioEnabled;
                track.enabled = isAudioEnabled;
                const btn = document.getElementById('toggleAudioBtn');
                btn.textContent = isAudioEnabled ? '🎤' : '🔇';
                btn.classList.toggle('active', isAudioEnabled);
            }
        }
        
        function toggleVideo() {
            if (!localStream) return;
            const track = localStream.getVideoTracks()[0];
            if (track) {
                isVideoEnabled = !isVideoEnabled;
                track.enabled = isVideoEnabled;
                const btn = document.getElementById('toggleVideoBtn');
                btn.textContent = isVideoEnabled ? '📹' : '🚫';
                btn.classList.toggle('active', isVideoEnabled);
            }
        }
        
        // ==================== File Sharing via Data Channels ====================
        function renderFileList() {
            if (sharedFiles.size === 0) {
                fileListContainer.innerHTML = '<div class="empty-files" style="text-align:center; padding:40px;">📂 No files shared yet. Upload a file to share with peers.</div>';
                return;
            }
            
            let html = '';
            for (let [fileId, file] of sharedFiles) {
                const sizeKB = (file.size / 1024).toFixed(1);
                html += `
                    <div class="file-item">
                        <div>
                            <strong>${escapeHtml(file.name)}</strong><br>
                            <small>${sizeKB} KB • ${escapeHtml(file.uploader)}</small>
                        </div>
                        <div>
                            <button class="download-btn" onclick="downloadFile('${escapeHtml(fileId)}')">⬇️ Download</button>
                            ${file.uploader === username ? `<button class="delete-btn" onclick="deleteFile('${escapeHtml(fileId)}')">🗑️ Delete</button>` : ''}
                        </div>
                    </div>
                `;
            }
            fileListContainer.innerHTML = html;
        }
        
        function uploadAndShareFile(file) {
            const reader = new FileReader();
            const fileId = Date.now() + '_' + file.name;
            
            reader.onload = (e) => {
                const fileData = e.target.result;
                const fileObj = {
                    id: fileId,
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    data: fileData,
                    uploader: username,
                    timestamp: Date.now()
                };
                
                sharedFiles.set(fileId, fileObj);
                renderFileList();
                addSystemMessage(`📤 Shared: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
                
                // Broadcast to all peers via data channel
                if (vdo && vdo.sendDataToAll) {
                    vdo.sendDataToAll({
                        type: 'file-share',
                        fileId: fileId,
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: fileData,
                        uploader: username
                    });
                }
            };
            
            reader.readAsDataURL(file);
        }
        
        function receiveFile(fileData) {
            if (!sharedFiles.has(fileData.fileId)) {
                sharedFiles.set(fileData.fileId, {
                    id: fileData.fileId,
                    name: fileData.name,
                    size: fileData.size,
                    type: fileData.type,
                    data: fileData.data,
                    uploader: fileData.uploader,
                    timestamp: Date.now()
                });
                renderFileList();
                addSystemMessage(`📥 New file: ${fileData.name} from ${fileData.uploader}`);
            }
        }
        
        function downloadFile(fileId) {
            const file = sharedFiles.get(fileId);
            if (file && file.data) {
                const link = document.createElement('a');
                link.href = file.data;
                link.download = file.name;
                link.click();
                addSystemMessage(`⬇️ Downloading: ${file.name}`);
            }
        }
        
        function deleteFile(fileId) {
            const file = sharedFiles.get(fileId);
            if (file && file.uploader === username) {
                sharedFiles.delete(fileId);
                renderFileList();
                addSystemMessage(`🗑️ Deleted: ${file.name}`);
                
                if (vdo && vdo.sendDataToAll) {
                    vdo.sendDataToAll({ type: 'file-delete', fileId: fileId });
                }
            }
        }
        
        window.downloadFile = downloadFile;
        window.deleteFile = deleteFile;
        
        // ==================== Chat Functions ====================
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            const time = getTime();
            
            if (activeChat === 'global') {
                globalMessages.push({ author: username, text, time });
                addChatMessage(username, text, time);
                
                if (vdo && vdo.sendDataToAll) {
                    vdo.sendDataToAll({ type: 'chat', text: text, author: username, time: time });
                }
            }
            
            messageInput.value = '';
        }
        
        function openDM(streamId, peerUsername) {
            activeChat = streamId;
            if (!dmMessages.has(streamId)) dmMessages.set(streamId, []);
            // For now, just show system message - DM implementation can be expanded
            addSystemMessage(`💬 DM with ${peerUsername} - Send messages will go to them only`);
        }
        
        window.openDM = openDM;
        
        // ==================== VDO.Ninja SDK Setup ====================
        async function connectToRoom() {
            const room = document.getElementById('roomInput').value.trim() || 'lobby';
            currentRoom = room;
            roomDisplay.textContent = room;
            if (mobileRoomName) mobileRoomName.textContent = room;
            
            addSystemMessage(`🔗 Connecting to room: ${room}...`);
            connectionStatusSpan.textContent = 'Connecting...';
            
            // Initialize SDK
            vdo = new VDONinjaSDK();
            
            // Handle incoming tracks (video/audio)
            vdo.addEventListener('track', (event) => {
                const { track, stream, streamID, uuid } = event.detail;
                console.log('Track received:', streamID, track.kind);
                
                if (!remoteStreams.has(streamID)) {
                    remoteStreams.set(streamID, { stream: null, username: streamID.substring(0,8) });
                }
                
                const data = remoteStreams.get(streamID);
                if (track.kind === 'video' && !data.stream) {
                    // Create new MediaStream for this peer
                    const newStream = new MediaStream();
                    newStream.addTrack(track);
                    data.stream = newStream;
                    remoteStreams.set(streamID, data);
                    renderVideos();
                    addSystemMessage(`📹 New video from ${data.username}`);
                } else if (data.stream) {
                    data.stream.addTrack(track);
                    remoteStreams.set(streamID, data);
                    renderVideos();
                }
            });
            
            // Handle data channel messages
            vdo.addEventListener('data', (event) => {
                const { data, uuid, streamID } = event.detail;
                console.log('Data received:', data);
                
                if (data.type === 'chat') {
                    addChatMessage(data.author, data.text, data.time);
                } else if (data.type === 'file-share') {
                    receiveFile(data);
                } else if (data.type === 'file-delete') {
                    if (sharedFiles.has(data.fileId)) {
                        sharedFiles.delete(data.fileId);
                        renderFileList();
                    }
                } else if (data.type === 'username') {
                    // Update peer username
                    const existing = peers.get(streamID);
                    if (existing) {
                        peers.set(streamID, data.username);
                        const streamData = remoteStreams.get(streamID);
                        if (streamData) streamData.username = data.username;
                        updatePeerList();
                        renderVideos();
                    }
                }
            });
            
            // Handle connection events
            vdo.addEventListener('connected', () => {
                connectionStatusSpan.textContent = 'Connected';
                addSystemMessage(`✅ Connected to room: ${room}`);
            });
            
            vdo.addEventListener('streamAdded', (event) => {
                const { streamID } = event.detail;
                console.log('Stream added:', streamID);
                if (streamID !== myStreamId) {
                    peers.set(streamID, streamID.substring(0,8));
                    remoteStreams.set(streamID, { stream: null, username: streamID.substring(0,8) });
                    updatePeerList();
                    
                    // Send username to new peer
                    if (vdo && vdo.sendDataTo) {
                        vdo.sendDataTo(streamID, { type: 'username', username: username });
                    }
                }
            });
            
            vdo.addEventListener('streamRemoved', (event) => {
                const { streamID } = event.detail;
                console.log('Stream removed:', streamID);
                peers.delete(streamID);
                remoteStreams.delete(streamID);
                updatePeerList();
                renderVideos();
            });
            
            // Connect and join room
            try {
                await vdo.connect();
                await vdo.joinRoom({ room: room, password: null });
                
                // Announce ourselves
                const streamId = await vdo.announce({ streamID: username });
                myStreamId = streamId;
                myStreamIdSpan.textContent = `ID: ${streamId.substring(0,12)}...`;
                addSystemMessage(`🎉 Joined as ${username}`);
                
                // Share username with room
                if (vdo && vdo.sendDataToAll) {
                    setTimeout(() => {
                        vdo.sendDataToAll({ type: 'username', username: username });
                    }, 1000);
                }
            } catch (err) {
                console.error('Connection error:', err);
                addSystemMessage(`❌ Connection failed: ${err.message}`);
                connectionStatusSpan.textContent = 'Error';
            }
        }
        
        // ==================== Leave Room ====================
        function leaveRoom() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (vdo && vdo.disconnect) vdo.disconnect();
            addSystemMessage('👋 Left room. Reload to rejoin.');
            setTimeout(() => window.location.reload(), 1500);
        }
        
        // ==================== Event Listeners ====================
        document.getElementById('enableCameraBtn').onclick = enableCamera;
        document.getElementById('toggleAudioBtn').onclick = toggleAudio;
        document.getElementById('toggleVideoBtn').onclick = toggleVideo;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('connectRoomBtn').onclick = connectToRoom;
        document.getElementById('leaveRoomBtn')?.addEventListener('click', leaveRoom);
        messageInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        // File cabinet modal
        const fileModal = document.getElementById('fileCabinetModal');
        const fileStorageBtn = document.getElementById('fileStorageBtn');
        const closeCabinetBtn = document.getElementById('closeCabinetBtn');
        const uploadFileBtn = document.getElementById('uploadFileBtn');
        const fileInputEl = document.getElementById('fileInput');
        
        fileStorageBtn.onclick = () => fileModal.classList.add('active');
        closeCabinetBtn.onclick = () => fileModal.classList.remove('active');
        fileModal.onclick = (e) => { if (e.target === fileModal) fileModal.classList.remove('active'); };
        uploadFileBtn.onclick = () => fileInputEl.click();
        fileInputEl.onchange = (e) => {
            Array.from(e.target.files).forEach(file => uploadAndShareFile(file));
            fileInputEl.value = '';
        };
        
        // Mobile sidebar
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarEl = document.getElementById('sidebar');
        const sidebarOverlayEl = document.getElementById('sidebarOverlay');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
        
        function openSidebar() { sidebarEl.classList.add('open'); sidebarOverlayEl.classList.add('active'); }
        function closeSidebar() { sidebarEl.classList.remove('open'); sidebarOverlayEl.classList.remove('active'); }
        hamburgerBtn.onclick = openSidebar;
        if (sidebarCloseBtn) sidebarCloseBtn.onclick = closeSidebar;
        sidebarOverlayEl.onclick = closeSidebar;
        
        // Initial system message
        addSystemMessage(`⚔️ Welcome to KatanaShare, ${escapeHtml(username)}!`);
        addSystemMessage(`📹 Click "Enable Camera" to start video`);
        addSystemMessage(`📁 Click "File Storage" to share files P2P`);
        addSystemMessage(`🔗 Enter a room name and click "Join Room" to connect with others`);
        
        // Auto-connect to default room after a short delay
        setTimeout(() => {
            document.getElementById('roomInput').value = 'lobby';
            connectToRoom();
        }, 500);
    </script>
</body>
</html>
