<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Live Streaming | Broadcaster + Viewer with Real WebRTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .role-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .role-btn {
            padding: 12px 40px;
            border-radius: 40px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border-color: transparent;
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .video-card {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }

        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a2a;
        }

        .video-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .status.connected {
            background: rgba(0,255,0,0.2);
            color: #0f0;
        }

        .log {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.75rem;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            color: #0f0;
            margin-bottom: 5px;
            border-left: 2px solid #00d4ff;
            padding-left: 10px;
        }

        .stream-url {
            background: rgba(0,212,255,0.15);
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
        }

        .badge {
            display: inline-block;
            background: rgba(0,212,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📡 P2P Live Streaming</h1>
        <div class="role-selector">
            <button class="role-btn" id="broadcasterBtn">🎥 Broadcaster</button>
            <button class="role-btn" id="viewerBtn">👀 Viewer</button>
        </div>
    </div>

    <div class="video-container">
        <div class="video-card">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-label">📹 Broadcaster Camera</div>
        </div>
        <div class="video-card">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-label">📡 Viewer Stream</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" style="display:none;">🎥 Start Broadcasting</button>
        <button id="stopBtn" style="display:none;">⏹️ Stop</button>
        <button id="connectBtn" style="display:none;">🔗 Connect to Broadcaster</button>
        <button id="disconnectBtn" style="display:none;">🚪 Disconnect</button>
    </div>

    <div class="status" id="status">⚪ Idle - Select a role</div>
    <div class="stream-url" id="streamUrl"></div>

    <div class="log" id="log">
        <div class="log-entry">🎬 Ready. Choose Broadcaster or Viewer mode.</div>
        <div class="log-entry">📌 For full P2P: Open two tabs - one as Broadcaster, one as Viewer</div>
    </div>
</div>

<script>
    // ============================================================
    // SIMPLE WORKING P2P VIDEO - Broadcaster + Viewer
    // Uses localStorage for signaling (works across tabs)
    // ============================================================

    let localStream = null;
    let peerConnection = null;
    let currentRole = null; // 'broadcaster' or 'viewer'
    let sessionId = 'p2p_session_' + Math.random().toString(36).substr(2, 8);
    
    const SIGNALING_KEY = 'p2p_signaling_channel';
    const VIEWERS_KEY = 'p2p_active_viewers';
    
    // WebRTC config
    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };
    
    function log(msg) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logDiv.children.length > 50) logDiv.removeChild(logDiv.firstChild);
        console.log(msg);
    }
    
    function updateStatus(text, isConnected = false) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = text;
        if (isConnected) {
            statusDiv.classList.add('connected');
        } else {
            statusDiv.classList.remove('connected');
        }
    }
    
    // ========== SIGNALING (localStorage for cross-tab) ==========
    function sendSignal(type, data) {
        const signal = {
            type: type,
            data: data,
            from: currentRole,
            sessionId: sessionId,
            timestamp: Date.now()
        };
        localStorage.setItem(SIGNALING_KEY, JSON.stringify(signal));
        log(`📡 Sent ${type} signal`);
    }
    
    let signalListener = null;
    function startSignaling() {
        if (signalListener) clearInterval(signalListener);
        
        let lastSignal = null;
        signalListener = setInterval(() => {
            const signalStr = localStorage.getItem(SIGNALING_KEY);
            if (signalStr && signalStr !== lastSignal) {
                lastSignal = signalStr;
                try {
                    const signal = JSON.parse(signalStr);
                    // Don't process our own signals
                    if (signal.sessionId !== sessionId) {
                        handleSignal(signal);
                    }
                } catch(e) {}
            }
        }, 300);
    }
    
    async function handleSignal(signal) {
        log(`📨 Received ${signal.type} from ${signal.from}`);
        
        if (signal.type === 'offer' && currentRole === 'viewer') {
            await handleOffer(signal.data);
        } else if (signal.type === 'answer' && currentRole === 'broadcaster') {
            await handleAnswer(signal.data);
        } else if (signal.type === 'ice-candidate') {
            await handleIceCandidate(signal.data);
        }
    }
    
    // ========== BROADCASTER ==========
    async function startBroadcaster() {
        try {
            // Get camera
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: true
            });
            
            // Show local video
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = localStream;
            
            // Create peer connection
            peerConnection = new RTCPeerConnection(config);
            
            // Add tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal('ice-candidate', event.candidate);
                }
            };
            
            // Connection state
            peerConnection.onconnectionstatechange = () => {
                log(`Connection state: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('✅ Connected! Viewer is watching', true);
                    document.getElementById('streamUrl').innerHTML = '🎥 LIVE | Viewer connected';
                } else if (peerConnection.connectionState === 'disconnected') {
                    updateStatus('⚡ Waiting for viewer to connect...');
                    document.getElementById('streamUrl').innerHTML = '📡 Waiting for viewer to join...';
                }
            };
            
            // Create and send offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendSignal('offer', offer);
            
            updateStatus('🎥 Broadcasting - Waiting for viewer to connect...');
            document.getElementById('streamUrl').innerHTML = '📡 Broadcasting | Share this tab with viewers';
            log('✅ Broadcaster started! Waiting for viewer to connect...');
            
        } catch (err) {
            log(`❌ Camera error: ${err.message}`);
            updateStatus('❌ Camera access denied');
        }
    }
    
    // ========== VIEWER ==========
    async function startViewer() {
        // Create peer connection
        peerConnection = new RTCPeerConnection(config);
        
        // Handle incoming video
        peerConnection.ontrack = (event) => {
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo.srcObject !== event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                log('🎬 VIDEO RECEIVED! Watching broadcaster stream');
                updateStatus('✅ Connected! Watching live stream', true);
                document.getElementById('streamUrl').innerHTML = '📺 Connected | Live stream playing';
            }
        };
        
        // Handle ICE candidates
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal('ice-candidate', event.candidate);
            }
        };
        
        peerConnection.onconnectionstatechange = () => {
            log(`Connection state: ${peerConnection.connectionState}`);
            if (peerConnection.connectionState === 'connected') {
                updateStatus('✅ Connected to broadcaster!', true);
            } else if (peerConnection.connectionState === 'failed') {
                updateStatus('❌ Connection failed - is broadcaster active?');
            }
        };
        
        // Request broadcaster to send offer by clearing signaling
        // This triggers broadcaster to re-send offer if needed
        localStorage.removeItem(SIGNALING_KEY);
        
        updateStatus('👀 Waiting for broadcaster to connect...');
        document.getElementById('streamUrl').innerHTML = '⏳ Waiting for broadcaster to start...';
        log('👀 Viewer started - waiting for broadcaster signal...');
        
        // Also trigger a request
        sendSignal('viewer-ready', { ready: true });
    }
    
    async function handleOffer(offer) {
        if (!peerConnection) {
            startViewer();
            await new Promise(r => setTimeout(r, 500));
        }
        
        try {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            sendSignal('answer', answer);
            log('📡 Sent answer to broadcaster');
        } catch (err) {
            log(`❌ Error handling offer: ${err.message}`);
        }
    }
    
    async function handleAnswer(answer) {
        if (peerConnection && peerConnection.remoteDescription === null) {
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                log('✅ P2P connection established!');
            } catch (err) {
                log(`❌ Error setting answer: ${err.message}`);
            }
        }
    }
    
    async function handleIceCandidate(candidate) {
        if (peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (err) {
                // Ignore candidate errors
            }
        }
    }
    
    // ========== CLEANUP ==========
    function stop() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        localVideo.srcObject = null;
        remoteVideo.srcObject = null;
        
        if (currentRole === 'broadcaster') {
            updateStatus('⏹️ Broadcast stopped');
        } else {
            updateStatus('⏹️ Disconnected');
        }
        
        document.getElementById('streamUrl').innerHTML = '';
        log(`⏹️ ${currentRole === 'broadcaster' ? 'Broadcast' : 'Connection'} stopped`);
    }
    
    // ========== UI MODE SWITCHING ==========
    function setRole(role) {
        // Cleanup current
        if (localStream || peerConnection) {
            stop();
        }
        
        currentRole = role;
        
        // Update UI
        document.getElementById('broadcasterBtn').classList.toggle('active', role === 'broadcaster');
        document.getElementById('viewerBtn').classList.toggle('active', role === 'viewer');
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        
        if (role === 'broadcaster') {
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'inline-block';
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'none';
            startBtn.onclick = startBroadcaster;
            stopBtn.onclick = stop;
            updateStatus('🎥 Broadcaster mode - Click Start');
            document.getElementById('streamUrl').innerHTML = '';
            log('🎥 Broadcaster mode ready');
        } else if (role === 'viewer') {
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            connectBtn.style.display = 'inline-block';
            disconnectBtn.style.display = 'none';
            connectBtn.onclick = startViewer;
            stopBtn.onclick = stop;
            updateStatus('👀 Viewer mode - Click Connect');
            document.getElementById('streamUrl').innerHTML = '';
            log('👀 Viewer mode ready');
        }
        
        // Clear any old signaling
        localStorage.removeItem(SIGNALING_KEY);
    }
    
    // ========== INIT ==========
    document.getElementById('broadcasterBtn').onclick = () => setRole('broadcaster');
    document.getElementById('viewerBtn').onclick = () => setRole('viewer');
    
    // Start signaling listener
    startSignaling();
    
    // Default to broadcaster mode (so user sees camera)
    setRole('broadcaster');
    
    log('🎬 P2P Streaming Ready!');
    log('📌 To watch: Open a second tab, select "Viewer", click "Connect to Broadcaster"');
    log('📌 The viewer will see your camera feed in real-time via WebRTC P2P');
</script>
</body>
</html>
