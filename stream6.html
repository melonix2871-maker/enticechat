<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Rabbit • Live</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        .header {
            background: #0f0f0f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a855f7, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .live-badge {
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 2s infinite; }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .video-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-container {
            flex: 1;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }
        .stream-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .viewer-count {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
        }

        .chat-panel {
            width: 380px;
            background: #0f0f0f;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 14px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.95rem;
        }
        .chat-message {
            display: flex;
            flex-direction: column;
        }
        .chat-message.own { align-items: flex-end; }
        .sender {
            font-size: 0.8rem;
            color: #a855f7;
            margin-bottom: 3px;
        }
        .message-text {
            background: #1f1f1f;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-break: break-word;
        }
        .chat-message.own .message-text {
            background: #7c3aed;
        }
        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #333;
            background: #0f0f0f;
        }
        .chat-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 12px 16px;
            border-radius: 9999px;
            font-size: 1rem;
        }
        .chat-input:focus {
            outline: none;
            border-color: #a855f7;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            padding: 10px 24px;
            border-radius: 9999px;
            display: flex;
            gap: 12px;
            z-index: 50;
        }
        button {
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: #a855f7; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #333; color: white; }

        .status { text-align: center; padding: 10px; background: #1a1a1a; font-size: 0.9rem; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 900px) {
            .chat-panel { width: 100%; height: 40%; }
            .main-content { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🐇 Mystical Rabbit</div>
        <div class="room-info">
            <div id="roomName" style="font-family: monospace; font-size: 1.1rem; cursor: pointer;" onclick="copyRoomLink()">room-name-here</div>
            <div class="live-badge" id="liveBadge" style="display:none;">
                <span class="dot"></span> LIVE
            </div>
        </div>
        <div style="font-size:0.9rem; color:#888;">P2P • Powered by WebRTC + Firebase</div>
    </div>

    <div class="main-content">
        <!-- Video Area -->
        <div class="video-area">
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                
                <div class="stream-overlay">
                    <span id="streamTitle">Mystical Rabbit Live</span>
                    <div class="viewer-count" id="viewerCount">0 watching</div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn-primary" style="display:none;">🎥 Go Live</button>
                <button id="stopBtn" class="btn-danger" style="display:none;">⏹️ End Stream</button>
                <button id="connectBtn" class="btn-primary" style="display:none;">🔗 Join Stream</button>
                <button id="disconnectBtn" class="btn-secondary" style="display:none;">Leave</button>
            </div>

            <div class="status" id="statusText">Select role to begin</div>
        </div>

        <!-- Chat -->
        <div class="chat-panel">
            <div class="chat-header">
                💬 Live Chat 
                <span id="chatStatus" style="font-size:0.8rem; color:#666;">(disconnected)</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Say something..." disabled>
            </div>
        </div>
    </div>
</div>

<script>
// ============== Firebase Config (Demo Project) ==============
// For production: Create your own Firebase project and replace these values
const firebaseConfig = {
    apiKey: "AIzaSyDexampleKey1234567890abcdef",
    authDomain: "mystical-rabbit-p2p.firebaseapp.com",
    projectId: "mystical-rabbit-p2p",
    storageBucket: "mystical-rabbit-p2p.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:abcdef1234567890"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let localStream = null;
let peerConnection = null;
let dataChannel = null;
let currentRole = null;
let roomId = null;
let unsubscribeSignals = null;

const config = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
    ]
};

// ============== Helpers ==============
function generateRoomName() {
    const adjectives = ['mystical','neon','shadow','cosmic','velvet','phantom'];
    const nouns = ['rabbit','stream','void','echo','pulse','dream'];
    return adjectives[Math.floor(Math.random()*adjectives.length)] + '-' + 
           nouns[Math.floor(Math.random()*nouns.length)] + '-' + 
           Math.floor(Math.random()*900 + 100);
}

function getSignalRef(type) {
    return db.collection('rooms').doc(roomId).collection('signals').doc(type);
}

function sendSignal(type, data) {
    getSignalRef(type).set({
        type: type,
        data: data,
        from: currentRole,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
}

function listenToSignals() {
    if (unsubscribeSignals) unsubscribeSignals();

    unsubscribeSignals = db.collection('rooms').doc(roomId).collection('signals')
        .onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const signal = change.doc.data();
                    if (signal.from !== currentRole) {
                        handleSignal(signal);
                    }
                }
            });
        });
}

async function handleSignal(signal) {
    console.log('Received signal:', signal.type);

    if (signal.type === 'broadcaster-ready' && currentRole === 'viewer') {
        addSystemMessage('📡 Broadcaster is live! Connecting...');
        sendSignal('viewer-ready', {});
    }
    else if (signal.type === 'viewer-ready' && currentRole === 'broadcaster') {
        addSystemMessage('👀 Viewer joined. Sending offer...');
        await createOffer();
    }
    else if (signal.type === 'offer' && currentRole === 'viewer') {
        await handleOffer(signal.data);
    }
    else if (signal.type === 'answer' && currentRole === 'broadcaster') {
        await handleAnswer(signal.data);
    }
    else if (signal.type === 'ice-candidate') {
        await handleIceCandidate(signal.data);
    }
    else if (signal.type === 'chat') {
        addChatMessage(signal.data.sender, signal.data.message, false);
    }
}

// ============== WebRTC Functions (same as before, slightly cleaned) ==============
async function createOffer() {
    cleanupPeerConnection();
    peerConnection = new RTCPeerConnection(config);

    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel();

    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    peerConnection.onicecandidate = e => {
        if (e.candidate) sendSignal('ice-candidate', e.candidate.toJSON());
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    sendSignal('offer', offer);
}

async function handleOffer(offer) {
    if (!peerConnection) await connectAsViewer();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    sendSignal('answer', answer);
}

async function handleAnswer(answer) {
    if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
}

async function handleIceCandidate(candidate) {
    if (peerConnection) {
        try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); }
        catch(e) { console.debug('ICE error (normal)', e); }
    }
}

function setupDataChannel() {
    dataChannel.onopen = () => {
        document.getElementById('chatStatus').textContent = '(WebRTC chat connected)';
        document.getElementById('chatInput').disabled = false;
    };
    dataChannel.onmessage = e => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'chat') addChatMessage(currentRole === 'broadcaster' ? 'Viewer' : 'Broadcaster', msg.message, false);
        } catch {}
    };
}

function cleanupPeerConnection() {
    if (peerConnection) peerConnection.close();
    peerConnection = null;
    dataChannel = null;
}

// ============== Role Functions ==============
async function startBroadcaster() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('video').srcObject = localStream;
        document.getElementById('video').muted = true;

        document.getElementById('liveBadge').style.display = 'flex';
        sendSignal('broadcaster-ready', {});
        await createOffer();

        document.getElementById('statusText').textContent = '🔴 You are LIVE';
    } catch (err) {
        alert('Camera access denied or not available: ' + err.message);
    }
}

async function connectAsViewer() {
    cleanupPeerConnection();
    peerConnection = new RTCPeerConnection(config);

    peerConnection.ondatachannel = e => {
        dataChannel = e.channel;
        setupDataChannel();
    };

    peerConnection.ontrack = e => {
        document.getElementById('video').srcObject = e.streams[0];
        document.getElementById('statusText').textContent = '🎬 Watching live stream';
        document.getElementById('liveBadge').style.display = 'flex';
    };

    peerConnection.onicecandidate = e => {
        if (e.candidate) sendSignal('ice-candidate', e.candidate.toJSON());
    };

    sendSignal('viewer-ready', {});
}

function stopBroadcaster() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    cleanupPeerConnection();
    document.getElementById('video').srcObject = null;
    document.getElementById('liveBadge').style.display = 'none';
    document.getElementById('statusText').textContent = 'Stream ended';
}

function disconnectViewer() {
    cleanupPeerConnection();
    document.getElementById('video').srcObject = null;
    document.getElementById('liveBadge').style.display = 'none';
    document.getElementById('statusText').textContent = 'Disconnected';
}

// Chat
function addSystemMessage(msg) {
    const div = document.createElement('div');
    div.innerHTML = `<div style="color:#a855f7; font-size:0.85rem;">🐇 System</div><div style="background:#1f1f1f; padding:10px; border-radius:8px;">${msg}</div>`;
    document.getElementById('chatMessages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

function addChatMessage(sender, message, isOwn) {
    const div = document.createElement('div');
    div.className = `chat-message ${isOwn ? 'own' : ''}`;
    div.innerHTML = `
        <div class="sender">${isOwn ? 'You' : sender}</div>
        <div class="message-text">${message.replace(/</g, '&lt;')}</div>
    `;
    document.getElementById('chatMessages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    if (dataChannel && dataChannel.readyState === 'open') {
        dataChannel.send(JSON.stringify({ type: 'chat', message: msg }));
    } else {
        sendSignal('chat', { sender: currentRole === 'broadcaster' ? 'Broadcaster' : 'Viewer', message: msg });
    }
    addChatMessage('', msg, true);
    input.value = '';
}

// Room & Role
function updateRoom(room) {
    roomId = room;
    document.getElementById('roomName').textContent = room;
    const url = `${window.location.origin}${window.location.pathname}#${room}`;
    history.replaceState({}, '', url);
    listenToSignals();
}

function copyRoomLink() {
    navigator.clipboard.writeText(window.location.href);
    const orig = document.getElementById('roomName').textContent;
    document.getElementById('roomName').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('roomName').textContent = orig, 1500);
}

function setRole(role) {
    if (currentRole === 'broadcaster') stopBroadcaster();
    if (currentRole === 'viewer') disconnectViewer();

    currentRole = role;

    document.getElementById('startBtn').style.display = role === 'broadcaster' ? 'inline-block' : 'none';
    document.getElementById('stopBtn').style.display = role === 'broadcaster' ? 'inline-block' : 'none';
    document.getElementById('connectBtn').style.display = role === 'viewer' ? 'inline-block' : 'none';
    document.getElementById('disconnectBtn').style.display = role === 'viewer' ? 'inline-block' : 'none';

    if (role === 'broadcaster') {
        document.getElementById('startBtn').onclick = startBroadcaster;
        document.getElementById('stopBtn').onclick = stopBroadcaster;
        document.getElementById('statusText').textContent = 'Ready to go live';
    } else {
        document.getElementById('connectBtn').onclick = connectAsViewer;
        document.getElementById('disconnectBtn').onclick = disconnectViewer;
        document.getElementById('statusText').textContent = 'Ready to join';
    }
}

// Init
function init() {
    let room = window.location.hash ? window.location.hash.substring(1) : generateRoomName();
    updateRoom(room);

    document.getElementById('startBtn').onclick = startBroadcaster;
    document.getElementById('stopBtn').onclick = stopBroadcaster;
    document.getElementById('connectBtn').onclick = connectAsViewer;
    document.getElementById('disconnectBtn').onclick = disconnectViewer;

    // Chat send
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendChatMessage();
    });

    setRole('broadcaster');
    addSystemMessage(`Welcome to room <strong>${room}</strong>!<br>Share this page link with your friend to watch.`);
}

window.onload = init;
</script>
</body>
</html>
