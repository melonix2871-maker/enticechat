<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Stream | Mystical Rabbit Rooms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 24px; }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #fff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .room-badge {
            display: inline-block;
            background: rgba(168,85,247,0.2);
            border: 1px solid rgba(168,85,247,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 1rem;
            cursor: pointer;
        }
        .role-selector {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .role-btn {
            padding: 10px 32px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(124,58,237,0.3);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
        .video-card {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #1a1a2a; }
        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 1.5s infinite; }
        .dot.live { background: #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .chat-panel {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 450px;
        }
        .chat-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; height: 350px; font-size: 13px; }
        .chat-message { margin-bottom: 12px; display: flex; flex-direction: column; }
        .chat-message.own { align-items: flex-end; }
        .message-sender { font-size: 11px; color: #a855f7; margin-bottom: 2px; }
        .message-text { background: rgba(168,85,247,0.2); padding: 8px 12px; border-radius: 18px; max-width: 90%; word-break: break-word; }
        .chat-message.own .message-text { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .chat-input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; }
        .chat-input { flex: 1; padding: 10px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; }
        .send-btn { padding: 10px 20px; border-radius: 24px; background: linear-gradient(135deg, #7c3aed, #a855f7); border: none; color: white; cursor: pointer; }
        
        .controls { display: flex; gap: 12px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        button { padding: 10px 24px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; }
        .btn-danger { background: rgba(239,68,68,0.9); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        button:hover { transform: translateY(-2px); }
        
        .status-card { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 20px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-badge.idle { background: rgba(255,255,255,0.1); color: #aaa; }
        .status-badge.broadcasting { background: rgba(239,68,68,0.2); color: #f87171; }
        .status-badge.connected { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.waiting { background: rgba(245,158,11,0.2); color: #f59e0b; }
        
        .log { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; }
        .log-entry { color: #10b981; margin-bottom: 4px; border-left: 2px solid #7c3aed; padding-left: 8px; }
        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #666; }
        .invite-link {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📡 Mystical Rabbit Rooms</h1>
        <div class="room-badge" id="roomName" onclick="copyRoomLink()">🐇 mystical-rabbit</div>
        <div class="invite-link" id="inviteLink" style="display:none;"></div>
    </div>

    <div class="role-selector">
        <button class="role-btn" id="broadcasterBtn">🎥 Broadcaster</button>
        <button class="role-btn" id="viewerBtn">👀 Viewer</button>
        <button class="role-btn" id="newRoomBtn">🔄 New Room</button>
    </div>

    <div class="main-grid">
        <div class="video-card">
            <video id="video" autoplay playsinline muted></video>
            <div class="video-label" id="videoLabel">
                <span class="dot" id="dot"></span>
                <span id="labelText">Ready</span>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">💬 Room Chat <span id="chatStatus" style="font-size:11px;color:#888;">(disconnected)</span></div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message"><div class="message-sender">🐇 System</div><div class="message-text">Welcome! Click Broadcaster to start or Viewer to watch.</div></div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." disabled>
                <button class="send-btn" id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-primary" style="display:none;">🎥 Start Broadcasting</button>
        <button id="stopBtn" class="btn-danger" style="display:none;">⏹️ Stop</button>
        <button id="connectBtn" class="btn-primary" style="display:none;">🔗 Join Room</button>
        <button id="disconnectBtn" class="btn-secondary" style="display:none;">🚪 Leave</button>
    </div>

    <div class="status-card">
        <div class="status-badge idle" id="statusBadge">⚪ Idle</div>
        <div id="statusText">Select a role</div>
    </div>

    <div class="log" id="log">
        <div class="log-entry">🎬 Mystical Rabbit Rooms Ready</div>
        <div class="log-entry">📡 Create a room, share the link, start streaming!</div>
    </div>
    <div class="footer">🔒 Direct P2P WebRTC • Click room name to copy link</div>
</div>

<script>
    // ============================================================
    // WORKING P2P STREAMING - localStorage signaling + DataChannel chat
    // ============================================================

    let localStream = null;
    let peerConnection = null;
    let dataChannel = null;
    let currentRole = null;
    let isActive = false;
    let roomId = null;
    let pollingInterval = null;
    
    // Generate unique room name
    const adjectives = ['mystical', 'magical', 'ancient', 'crystal', 'silver', 'golden', 'velvet', 'shadow', 'phantom', 'eternal', 'brave', 'wise'];
    const nouns = ['rabbit', 'phoenix', 'dragon', 'wolf', 'fox', 'owl', 'star', 'moon', 'spirit', 'dream', 'forest', 'river'];
    
    function generateRoomName() {
        const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        const noun = nouns[Math.floor(Math.random() * nouns.length)];
        const num = Math.floor(Math.random() * 100);
        return `${adj}-${noun}-${num}`;
    }
    
    function getStorageKey(type) {
        return `p2p_${roomId}_${type}`;
    }
    
    // Signaling via localStorage polling (reliable across tabs)
    function sendSignal(type, data) {
        const key = getStorageKey(type);
        const signal = { type, data, from: currentRole, timestamp: Date.now() };
        localStorage.setItem(key, JSON.stringify(signal));
        // Auto-clean after 5 seconds
        setTimeout(() => {
            if (localStorage.getItem(key) === JSON.stringify(signal)) {
                localStorage.removeItem(key);
            }
        }, 5000);
    }
    
    function startSignalingPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        
        pollingInterval = setInterval(() => {
            const signalTypes = ['offer', 'answer', 'ice-candidate', 'viewer-ready', 'broadcaster-ready', 'chat'];
            
            for (const type of signalTypes) {
                const key = getStorageKey(type);
                const signalStr = localStorage.getItem(key);
                if (signalStr) {
                    try {
                        const signal = JSON.parse(signalStr);
                        // Don't process our own signals
                        if (signal.from !== currentRole) {
                            handleSignal(signal);
                        }
                        localStorage.removeItem(key);
                    } catch(e) {}
                }
            }
        }, 500);
    }
    
    async function handleSignal(signal) {
        console.log('Signal received:', signal.type, signal.from);
        
        if (signal.type === 'broadcaster-ready' && currentRole === 'viewer') {
            addSystemMessage('📡 Broadcaster found! Connecting...');
            sendSignal('viewer-ready', { ready: true });
        }
        else if (signal.type === 'viewer-ready' && currentRole === 'broadcaster' && isActive) {
            addSystemMessage('📡 Viewer detected, sending offer...');
            await createOffer();
        }
        else if (signal.type === 'offer' && currentRole === 'viewer') {
            await handleOffer(signal.data);
        }
        else if (signal.type === 'answer' && currentRole === 'broadcaster') {
            await handleAnswer(signal.data);
        }
        else if (signal.type === 'ice-candidate') {
            await handleIceCandidate(signal.data);
        }
        else if (signal.type === 'chat') {
            addChatMessage(signal.data.sender, signal.data.message, false);
        }
    }
    
    // WebRTC Config
    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };
    
    function addSystemMessage(msg) {
        const msgsDiv = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'chat-message';
        div.innerHTML = `<div class="message-sender">🐇 System</div><div class="message-text">${msg}</div>`;
        msgsDiv.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function addChatMessage(sender, message, isOwn = false) {
        const msgsDiv = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `chat-message ${isOwn ? 'own' : ''}`;
        div.innerHTML = `<div class="message-sender">${isOwn ? '📤 You' : sender}</div><div class="message-text">${escapeHtml(message)}</div>`;
        msgsDiv.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'chat', message: message }));
            addChatMessage('You', message, true);
        } else {
            sendSignal('chat', { sender: currentRole === 'broadcaster' ? '🎥 Broadcaster' : '👀 Viewer', message: message });
            addChatMessage('You', message, true);
        }
        input.value = '';
    }
    
    function log(msg) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logDiv.children.length > 40) logDiv.removeChild(logDiv.firstChild);
    }
    
    function updateStatus(status, text, type = 'idle') {
        const badge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        badge.className = `status-badge ${type}`;
        const statusMap = { idle: '⚪ Idle', broadcasting: '🎥 LIVE', connected: '🔗 CONNECTED', waiting: '⏳ WAITING' };
        badge.innerHTML = statusMap[type] || status;
        statusText.innerHTML = text;
    }
    
    function updateVideoLabel(text, isLive = false) {
        document.getElementById('labelText').innerText = text;
        const dot = document.getElementById('dot');
        if (isLive) dot.classList.add('live');
        else dot.classList.remove('live');
    }
    
    // ========== BROADCASTER ==========
    async function startBroadcaster() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: true });
            document.getElementById('video').srcObject = localStream;
            document.getElementById('video').muted = true;
            isActive = true;
            
            updateStatus('Broadcasting', 'Live - Waiting for viewers...', 'broadcasting');
            updateVideoLabel('Broadcasting Live', true);
            addSystemMessage('🎥 You are now broadcasting! Share the room link.');
            log('✅ Broadcaster started');
            
            // Announce broadcaster is ready
            sendSignal('broadcaster-ready', { ready: true });
            
            // Also create peer connection preemptively
            await createOffer();
            
        } catch (err) {
            log(`❌ Camera error: ${err.message}`);
            updateStatus('Error', 'Camera access denied', 'idle');
        }
    }
    
    async function createOffer() {
        if (!localStream) return;
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        peerConnection = new RTCPeerConnection(config);
        
        // Data channel for chat
        dataChannel = peerConnection.createDataChannel('chat');
        dataChannel.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'chat') {
                addChatMessage('Viewer', data.message, false);
            }
        };
        dataChannel.onopen = () => {
            addSystemMessage('💬 Chat connected!');
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatStatus').innerHTML = '(connected)';
        };
        
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal('ice-candidate', event.candidate);
            }
        };
        
        peerConnection.onconnectionstatechange = () => {
            log(`Connection: ${peerConnection.connectionState}`);
            if (peerConnection.connectionState === 'connected') {
                updateStatus('Connected', 'Viewer connected!', 'connected');
                updateVideoLabel('Live - Viewer Connected', true);
            } else if (peerConnection.connectionState === 'disconnected') {
                updateStatus('Broadcasting', 'Waiting for viewer...', 'broadcasting');
            }
        };
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        sendSignal('offer', offer);
        log('📡 Offer sent');
    }
    
    async function handleAnswer(answer) {
        if (peerConnection && !peerConnection.currentRemoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            log('✅ Answer received, connection established!');
        }
    }
    
    async function handleIceCandidate(candidate) {
        if (peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                log('📡 ICE candidate added');
            } catch(e) { console.log('ICE error:', e); }
        }
    }
    
    function stopBroadcaster() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        dataChannel = null;
        document.getElementById('video').srcObject = null;
        isActive = false;
        updateStatus('Stopped', 'Broadcast ended', 'idle');
        updateVideoLabel('Stopped', false);
        document.getElementById('chatInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatStatus').innerHTML = '(disconnected)';
        log('⏹️ Broadcast stopped');
    }
    
    // ========== VIEWER ==========
    async function connectAsViewer() {
        if (peerConnection) peerConnection.close();
        
        peerConnection = new RTCPeerConnection(config);
        
        peerConnection.ondatachannel = (event) => {
            dataChannel = event.channel;
            dataChannel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'chat') addChatMessage('Broadcaster', data.message, false);
            };
            dataChannel.onopen = () => {
                addSystemMessage('💬 Chat connected!');
                document.getElementById('chatInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('chatStatus').innerHTML = '(connected)';
            };
        };
        
        peerConnection.ontrack = (event) => {
            const video = document.getElementById('video');
            if (video.srcObject !== event.streams[0]) {
                video.srcObject = event.streams[0];
                addSystemMessage('🎬 Video received! Watching live stream');
                updateStatus('Connected', 'Watching live stream', 'connected');
                updateVideoLabel('Watching Live', true);
            }
        };
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal('ice-candidate', event.candidate);
            }
        };
        
        updateStatus('Connecting', 'Looking for broadcaster...', 'waiting');
        updateVideoLabel('Connecting...', false);
        addSystemMessage('🔍 Searching for broadcaster in this room...');
        
        // Send viewer-ready signal
        sendSignal('viewer-ready', { ready: true });
        
        // Also send a direct message to request broadcaster
        setTimeout(() => {
            if (!peerConnection.currentRemoteDescription) {
                sendSignal('viewer-ready', { ready: true });
            }
        }, 2000);
        
        // Timeout after 10 seconds
        setTimeout(() => {
            if (!peerConnection.currentRemoteDescription && !peerConnection.remoteDescription) {
                updateStatus('No Broadcaster', 'No broadcaster found. Start one first!', 'idle');
                updateVideoLabel('No Broadcaster', false);
                addSystemMessage('⚠️ No broadcaster found in this room. Please start a broadcast first.');
                log('⚠️ No broadcaster found');
            }
        }, 10000);
    }
    
    async function handleOffer(offer) {
        if (!peerConnection) {
            await connectAsViewer();
            await new Promise(r => setTimeout(r, 500));
        }
        
        if (peerConnection && !peerConnection.currentRemoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            sendSignal('answer', answer);
            log('📡 Answer sent');
        }
    }
    
    function disconnectViewer() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        dataChannel = null;
        document.getElementById('video').srcObject = null;
        updateStatus('Disconnected', 'Disconnected from stream', 'idle');
        updateVideoLabel('Disconnected', false);
        document.getElementById('chatInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatStatus').innerHTML = '(disconnected)';
        addSystemMessage('👋 Disconnected from room');
    }
    
    // ========== ROOM MANAGEMENT ==========
    function setRole(role) {
        if (currentRole === 'broadcaster') stopBroadcaster();
        if (currentRole === 'viewer') disconnectViewer();
        
        currentRole = role;
        
        document.getElementById('broadcasterBtn').classList.toggle('active', role === 'broadcaster');
        document.getElementById('viewerBtn').classList.toggle('active', role === 'viewer');
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        
        if (role === 'broadcaster') {
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'inline-block';
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'none';
            startBtn.onclick = startBroadcaster;
            stopBtn.onclick = stopBroadcaster;
            updateStatus('Broadcaster', 'Click Start Broadcasting', 'idle');
            updateVideoLabel('Broadcaster Ready', false);
        } else {
            startBtn.style.display = 'none';
            stopBtn.style.display = 'none';
            connectBtn.style.display = 'inline-block';
            disconnectBtn.style.display = 'inline-block';
            connectBtn.onclick = connectAsViewer;
            disconnectBtn.onclick = disconnectViewer;
            updateStatus('Viewer', 'Click Join Room to watch', 'idle');
            updateVideoLabel('Viewer Ready', false);
        }
        
        document.getElementById('chatInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatStatus').innerHTML = '(disconnected)';
    }
    
    function updateRoomInUrl(room) {
        const newUrl = `${window.location.origin}${window.location.pathname}#room=${encodeURIComponent(room)}`;
        window.history.pushState({}, '', newUrl);
        document.getElementById('roomName').innerHTML = `🐇 ${room}`;
        roomId = room;
        
        const inviteDiv = document.getElementById('inviteLink');
        inviteDiv.style.display = 'block';
        inviteDiv.innerHTML = `📋 Click to copy: ${window.location.href}`;
        inviteDiv.onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            inviteDiv.innerHTML = '✅ Copied!';
            setTimeout(() => inviteDiv.innerHTML = `📋 Click to copy: ${window.location.href}`, 2000);
        };
        
        // Restart signaling with new room
        if (pollingInterval) clearInterval(pollingInterval);
        startSignalingPolling();
    }
    
    function getRoomFromUrl() {
        const hash = window.location.hash;
        if (hash.startsWith('#room=')) {
            return decodeURIComponent(hash.substring(6));
        }
        return null;
    }
    
    function createNewRoom() {
        const newRoom = generateRoomName();
        updateRoomInUrl(newRoom);
        
        if (currentRole === 'broadcaster') stopBroadcaster();
        if (currentRole === 'viewer') disconnectViewer();
        
        addSystemMessage(`✨ Created new room: ${newRoom}`);
        addSystemMessage(`📢 Share this link: ${window.location.href}`);
        log(`🔄 New room: ${newRoom}`);
    }
    
    function copyRoomLink() {
        navigator.clipboard.writeText(window.location.href);
        const roomDiv = document.getElementById('roomName');
        const originalText = roomDiv.innerHTML;
        roomDiv.innerHTML = '✅ Copied!';
        setTimeout(() => roomDiv.innerHTML = originalText, 1500);
    }
    
    // ========== INIT ==========
    function init() {
        let room = getRoomFromUrl();
        if (!room) {
            room = generateRoomName();
        }
        updateRoomInUrl(room);
        
        startSignalingPolling();
        
        document.getElementById('broadcasterBtn').onclick = () => setRole('broadcaster');
        document.getElementById('viewerBtn').onclick = () => setRole('viewer');
        document.getElementById('newRoomBtn').onclick = createNewRoom;
        document.getElementById('sendBtn').onclick = sendChatMessage;
        document.getElementById('chatInput').onkeypress = (e) => { if (e.key === 'Enter') sendChatMessage(); };
        
        setRole('broadcaster');
        
        addSystemMessage(`🐇 Welcome to room: ${room}`);
        log('🎬 Mystical Rabbit Rooms Ready');
    }
    
    init();
</script>
</body>
</html>
