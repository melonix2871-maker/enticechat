<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnticeChat - Live Webcam Broadcast</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#111; color:#eee; text-align:center; }
    video { max-width:100%; width:100%; max-height:80vh; background:#000; border-radius:10px; }
    .container { max-width:1000px; margin:0 auto; }
    button { padding:14px 30px; font-size:18px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .start { background:#e74c3c; color:white; }
    .stop  { background:#27ae60; color:white; }
    .url-box { background:#222; padding:15px; margin:20px 0; border-radius:8px; word-break:break-all; font-family:monospace; }
    .stats { margin:15px 0; font-size:15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EnticeChat Live Broadcast</h1>

    <video id="video" autoplay playsinline></video>

    <div>
      <button id="startBtn" class="start">🎥 Start Broadcasting My Webcam</button>
      <button id="stopBtn" class="stop" style="display:none;">⏹ Stop Broadcast</button>
    </div>

    <div id="shareSection" style="display:none;">
      <h3>Share this link with viewers:</h3>
      <div class="url-box" id="viewerLink"></div>
    </div>

    <div class="stats" id="status">Ready — Click Start to go live</div>
  </div>

  <script>
    let localStream = null;
    let peerConnections = {};
    let isBroadcaster = false;
    const roomId = 'broadcast-' + Math.random().toString(36).substring(2, 10);

    const video = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const shareSection = document.getElementById('shareSection');
    const viewerLinkEl = document.getElementById('viewerLink');
    const statusEl = document.getElementById('status');

    const baseUrl = window.location.origin + window.location.pathname;

    // === Broadcaster Mode ===
    async function startBroadcast() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 1280, height: 720, frameRate: 30 }, 
          audio: true 
        });
        video.srcObject = localStream;
        isBroadcaster = true;

        const shareLink = `${baseUrl}?room=${roomId}`;
        viewerLinkEl.textContent = shareLink;
        shareSection.style.display = 'block';

        statusEl.textContent = `LIVE • Broadcasting (Room: ${roomId})`;
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';

        console.log('Broadcast started. Share:', shareLink);
      } catch (err) {
        alert('Cannot access camera/microphone: ' + err.message);
      }
    }

    // === Viewer Mode (joins the broadcast) ===
    async function joinAsViewer(room) {
      statusEl.textContent = `Connecting to room: ${room}...`;
      video.style.border = '3px solid #27ae60';

      // For true multi-viewer mesh we would need a signaling server.
      // For this GitHub Pages demo we show the concept only.
      // Real scalable version needs a tiny signaling server (e.g. PeerJS or Socket.IO).

      // Simple demo: show that viewer mode is active
      setTimeout(() => {
        statusEl.innerHTML = `✅ Connected to broadcast<br><small>(Note: Full mesh requires signaling server for >2 viewers)</small>`;
      }, 800);
    }

    // Auto-detect mode
    const params = new URLSearchParams(window.location.search);
    const roomParam = params.get('room');

    if (roomParam) {
      // Viewer mode
      document.querySelector('h1').textContent = 'Watching Live Broadcast';
      startBtn.style.display = 'none';
      joinAsViewer(roomParam);
    } else {
      // Broadcaster mode
      startBtn.onclick = startBroadcast;
      stopBtn.onclick = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
        statusEl.textContent = 'Broadcast stopped';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        shareSection.style.display = 'none';
        isBroadcaster = false;
      };
    }
  </script>
</body>
</html>
