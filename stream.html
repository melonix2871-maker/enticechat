<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam P2P Broadcast Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="importmap">
  {
    "imports": {
      "p2p-media-loader-core": "https://cdn.jsdelivr.net/npm/p2p-media-loader-core@latest/dist/p2p-media-loader-core.es.min.js",
      "p2p-media-loader-hlsjs": "https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@latest/dist/p2p-media-loader-hlsjs.es.min.js"
    }
  }
  </script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #111; color: #eee; text-align: center; }
    video { max-width: 100%; width: 100%; max-height: 75vh; background: #000; border-radius: 8px; }
    .container { max-width: 1000px; margin: 0 auto; }
    button { padding: 12px 24px; font-size: 18px; margin: 10px; border: none; border-radius: 6px; cursor: pointer; }
    .start { background: #e74c3c; color: white; }
    .stop  { background: #27ae60; color: white; }
    .stats { margin: 15px 0; padding: 12px; background: #222; border-radius: 6px; font-size: 15px; }
    .mode { font-weight: bold; color: #f39c12; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Webcam → P2P Live Broadcast</h1>
    <p class="mode">Broadcast Mode (Your Webcam) | Viewer Mode (Watch others)</p>

    <video id="localVideo" autoplay playsinline muted></video>
    <br><br>

    <button id="startBtn" class="start">🎥 Start Broadcasting My Webcam</button>
    <button id="stopBtn" class="stop" style="display:none;">⏹ Stop Broadcasting</button>

    <div class="stats">
      <strong>Status:</strong> <span id="status">Ready - Click Start to broadcast</span><br>
      <span id="peers">0 peers connected</span> | 
      <span id="p2pData">0 MB shared via P2P</span>
    </div>

    <h2>Watch the Live Stream (Open this link in another tab/browser)</h2>
    <p id="streamUrl" style="font-family: monospace; background:#222; padding:10px; border-radius:6px; word-break:break-all;">
      (Stream URL will appear here after you start broadcasting)
    </p>
  </div>

  <script type="module">
    import { HlsJsP2PEngine } from "p2p-media-loader-hlsjs";

    let mediaRecorder = null;
    let hls = null;
    let streamUrl = null;
    let p2pBytes = 0;

    const localVideo = document.getElementById('localVideo');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const peersEl = document.getElementById('peers');
    const p2pEl = document.getElementById('p2pData');
    const streamUrlEl = document.getElementById('streamUrl');

    // Unique room ID so only your viewers join your swarm
    const ROOM_ID = 'webcam-broadcast-' + Math.random().toString(36).substring(2, 10);

    startBtn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 1280, height: 720, frameRate: 30 },
          audio: true 
        });

        localVideo.srcObject = stream;

        // Create HLS-compatible segments from webcam using MediaRecorder + Blob URL trick (browser-only)
        const options = { mimeType: 'video/webm;codecs=vp8,opus' };
        mediaRecorder = new MediaRecorder(stream, options);

        const segments = [];
        let segmentIndex = 0;

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            segments.push(event.data);
            // In real production you would push segments to a proper HLS server.
            // For demo we simulate by creating a fake playlist (not real-time HLS).
            // Note: True browser-only HLS broadcast is limited. For production use go2rtc/SRS.
          }
        };

        mediaRecorder.start(2000); // Create segment every 2 seconds

        // Simulate HLS playlist URL (in real setup this would be a real .m3u8 served somewhere)
        streamUrl = `https://your-github-repo.github.io/stream/${ROOM_ID}/index.m3u8`; // placeholder
        streamUrlEl.textContent = `Your live stream URL: ${streamUrl} (share this)`;

        statusEl.textContent = `Broadcasting... Room: ${ROOM_ID}`;
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';

        // For demo purposes, we show how viewers would connect using P2P Media Loader
        console.log(`%cBroadcast started with swarm ID: ${ROOM_ID}`, 'color: lime');

      } catch (err) {
        alert('Cannot access webcam: ' + err.message);
      }
    };

    stopBtn.onclick = () => {
      if (mediaRecorder) mediaRecorder.stop();
      if (localVideo.srcObject) {
        localVideo.srcObject.getTracks().forEach(track => track.stop());
      }
      if (hls) hls.destroy();

      statusEl.textContent = 'Broadcast stopped';
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      streamUrlEl.textContent = '(Stream stopped)';
    };

    // === Viewer Mode Example (open in another tab) ===
    // You can add a separate "Watch" section or open this same file in another tab and manually load:
    // const viewerHls = new Hls({ ...new HlsJsP2PEngine({ core: { swarmId: ROOM_ID } }).getConfigForHlsJs() });
    // viewerHls.loadSource(yourStreamUrl);
  </script>
</body>
</html>
