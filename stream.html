<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnticeChat - VDO.Ninja Broadcast</title>

  <!-- Latest VDO.Ninja SDK -->
  <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@latest/vdoninja-sdk.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; text-align:center; margin:0; padding:20px; }
    video { max-width:100%; width:100%; max-height:78vh; background:#000; border-radius:12px; margin:15px 0; }
    button { padding:14px 30px; font-size:18px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .broadcaster { background:#e74c3c; color:white; }
    .viewer { background:#3498db; color:white; }
    .info { margin:20px; padding:15px; background:#222; border-radius:10px; }
  </style>
</head>
<body>
  <h1>EnticeChat Live Broadcast (VDO.Ninja)</h1>

  <div class="info">
    Room: <strong id="roomName">loading...</strong><br>
    <span id="mode">Choose your role</span>
  </div>

  <video id="video" autoplay playsinline controls></video>

  <div>
    <button onclick="startAsBroadcaster()" class="broadcaster">🎥 Start Broadcasting</button>
    <button onclick="startAsViewer()" class="viewer">👁️ Join as Viewer</button>
  </div>

  <script>
    let vdo = null;
    const video = document.getElementById('video');
    const room = "enticechat-" + Math.random().toString(36).substring(2, 10);

    document.getElementById('roomName').textContent = room;

    async function startAsBroadcaster() {
      document.getElementById('mode').innerHTML = '<strong style="color:#e74c3c;">You are the Broadcaster (LIVE)</strong>';

      vdo = new VDONinjaSDK({
        room: room,
        streamId: "main"
      });

      // Get webcam + mic
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: 1280, height: 720, frameRate: 30 },
        audio: true 
      });

      video.srcObject = stream;   // show local preview

      // Publish to the room
      await vdo.connect();
      await vdo.joinRoom({ room: room });
      await vdo.publish(stream, { streamId: "main" });

      console.log("Broadcasting started! Share this page link.");
    }

    function startAsViewer() {
      document.getElementById('mode').innerHTML = '<strong style="color:#3498db;">You are a Viewer</strong>';

      vdo = new VDONinjaSDK({
        room: room
      });

      vdo.on("stream", (stream) => {
        video.srcObject = stream;
        console.log("✅ Connected to broadcaster");
      });

      vdo.connect().then(() => {
        vdo.joinRoom({ room: room });
      });
    }

    // Auto join as viewer if URL contains ?view
    if (window.location.search.includes("view")) {
      startAsViewer();
    }
  </script>
</body>
</html>
