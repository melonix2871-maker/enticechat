<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnticeChat - Webcam Broadcast (No Server)</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#0a0a0a; color:#ddd; text-align:center; }
    video { width:100%; max-width:900px; background:#000; border-radius:12px; margin:15px 0; }
    textarea { width:90%; max-width:800px; height:120px; margin:10px; font-family:monospace; }
    button { padding:12px 24px; font-size:17px; margin:8px; border:none; border-radius:8px; cursor:pointer; }
    .broadcaster { background:#e74c3c; color:white; }
    .viewer { background:#3498db; color:white; }
    .section { margin:30px 0; padding:20px; background:#1f1f1f; border-radius:10px; }
    .status { font-weight:bold; color:#2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EnticeChat Webcam Broadcast</h1>
    <p><strong>No signaling server • Works on GitHub Pages</strong></p>

    <video id="video" autoplay playsinline controls></video>

    <!-- Broadcaster Section -->
    <div id="broadcasterSection" class="section">
      <h2>Broadcaster Mode</h2>
      <button onclick="startAsBroadcaster()" class="broadcaster">🎥 Start Broadcasting My Webcam</button>
      <div id="offerArea" style="display:none;">
        <p>1. Copy this Offer and send to viewer:</p>
        <textarea id="offerSdp" readonly></textarea><br>
        <button onclick="copyOffer()">Copy Offer</button>
        
        <p>2. Paste Answer from viewer here:</p>
        <textarea id="answerSdp"></textarea><br>
        <button onclick="setAnswer()">Set Answer & Start Stream</button>
      </div>
    </div>

    <!-- Viewer Section -->
    <div id="viewerSection" class="section" style="display:none;">
      <h2>Viewer Mode</h2>
      <p>Paste Broadcaster's Offer here:</p>
      <textarea id="remoteOffer"></textarea><br>
      <button onclick="startAsViewer()" class="viewer">Join as Viewer</button>
      
      <div id="answerArea" style="display:none;">
        <p>Copy this Answer and send back to broadcaster:</p>
        <textarea id="answerSdpViewer" readonly></textarea><br>
        <button onclick="copyAnswer()">Copy Answer</button>
      </div>
    </div>

    <div class="status" id="status">Choose mode below or refresh</div>
  </div>

  <script>
    let localStream = null;
    let peerConnection = null;
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');

    const config = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    // Auto detect if someone pasted ?viewer=1 in URL
    if (window.location.search.includes('viewer')) {
      document.getElementById('broadcasterSection').style.display = 'none';
      document.getElementById('viewerSection').style.display = 'block';
      statusEl.textContent = 'Viewer Mode - Paste Offer';
    }

    async function startAsBroadcaster() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 1280, height: 720, frameRate: 30 }, 
          audio: true 
        });
        video.srcObject = localStream;

        peerConnection = new RTCPeerConnection(config);
        
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });

        peerConnection.onicecandidate = (e) => {
          if (e.candidate) console.log("ICE candidate (ignore for manual):", e.candidate);
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        document.getElementById('offerSdp').value = offer.sdp;
        document.getElementById('offerArea').style.display = 'block';
        statusEl.textContent = 'Offer generated - Send to viewer';

      } catch (err) {
        alert('Camera access failed: ' + err.message);
      }
    }

    async function setAnswer() {
      const answerSdp = document.getElementById('answerSdp').value.trim();
      if (!answerSdp) return alert('Paste the Answer first');

      const answer = { type: 'answer', sdp: answerSdp };
      await peerConnection.setRemoteDescription(answer);
      statusEl.textContent = '✅ Connected! Viewer should see your video now';
      console.log('Answer set - Connection should establish');
    }

    async function startAsViewer() {
      const offerSdp = document.getElementById('remoteOffer').value.trim();
      if (!offerSdp) return alert('Paste the Offer from broadcaster');

      peerConnection = new RTCPeerConnection(config);

      peerConnection.ontrack = (event) => {
        video.srcObject = event.streams[0];
        statusEl.textContent = '✅ Receiving live video!';
      };

      peerConnection.onicecandidate = (e) => {
        if (e.candidate) console.log("ICE candidate:", e.candidate);
      };

      await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });

      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);

      document.getElementById('answerSdpViewer').value = answer.sdp;
      document.getElementById('answerArea').style.display = 'block';
      statusEl.textContent = 'Answer generated - Send back to broadcaster';
    }

    function copyOffer() {
      const text = document.getElementById('offerSdp').value;
      navigator.clipboard.writeText(text).then(() => alert('Offer copied! Send it to the viewer.'));
    }

    function copyAnswer() {
      const text = document.getElementById('answerSdpViewer').value;
      navigator.clipboard.writeText(text).then(() => alert('Answer copied! Send it back to broadcaster.'));
    }
  </script>
</body>
</html>
