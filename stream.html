<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnticeChat Live</title>

  <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@latest/vdoninja-sdk.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; text-align:center; margin:0; padding:20px; }
    video { max-width:100%; width:100%; max-height:80vh; background:#000; border-radius:12px; margin:15px 0; }
    button { padding:14px 32px; font-size:18px; margin:10px; border:none; border-radius:8px; cursor:pointer; }
    .broadcaster { background:#e74c3c; color:white; }
    .viewer { background:#3498db; color:white; }
    .info { margin:20px; padding:15px; background:#222; border-radius:10px; }
  </style>
</head>
<body>
  <h1>EnticeChat Live Broadcast</h1>

  <div class="info">
    Room: <strong>enticechat-oi0pcuhk</strong><br>
    <span id="status">Choose your role</span>
  </div>

  <video id="video" autoplay playsinline controls></video>

  <div>
    <button onclick="startBroadcaster()" class="broadcaster">🎥 Start Broadcasting</button>
    <button onclick="startViewer()" class="viewer">👁️ Join as Viewer</button>
  </div>

  <script>
    const ROOM = "enticechat-oi0pcuhk";
    let vdo = null;
    const video = document.getElementById('video');

    // ==================== BROADCASTER ====================
    async function startBroadcaster() {
      document.getElementById('status').innerHTML = '<strong style="color:#e74c3c;">You are LIVE as Broadcaster</strong>';

      vdo = new VDONinjaSDK({ salt: "vdo.ninja" });

      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: true, 
        audio: true 
      });

      video.srcObject = stream;   // local preview

      await vdo.connect();
      await vdo.joinRoom({ room: ROOM });

      await vdo.publish(stream, { streamID: "main" });
    }

    // ==================== VIEWER ====================
    async function startViewer() {
      document.getElementById('status').innerHTML = '<strong style="color:#3498db;">Joining room...</strong>';

      vdo = new VDONinjaSDK({ salt: "vdo.ninja" });

      await vdo.connect();
      await vdo.joinRoom({ room: ROOM });

      // The most reliable way to receive the stream
      vdo.on("stream", (stream) => {
        video.srcObject = stream;
        document.getElementById('status').innerHTML = '<strong style="color:#2ecc71;">✅ Receiving Broadcaster Video</strong>';
      });

      // Force request the stream (this often fixes the stuck "Joining room..." issue)
      setTimeout(() => {
        vdo.requestStream("main");
      }, 1000);
    }

    // Auto start as viewer if link has ?view
    if (window.location.search.includes("view")) {
      startViewer();
    }
  </script>
</body>
</html>
