<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EnticeChat Live · Fixed Stream Receiver</title>

  <!-- VDO.Ninja SDK (stable) -->
  <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@latest/vdoninja-sdk.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
      color: #f0f0f0;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, #FFB347, #FF6B6B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .sub {
      color: #aaa;
      margin-top: -8px;
      font-size: 0.9rem;
    }

    .info-card {
      background: rgba(20, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 16px 24px;
      margin: 24px auto;
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      align-items: baseline;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .room-badge {
      background: #1e2a3e;
      padding: 6px 20px;
      border-radius: 60px;
      font-family: monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #ffd966;
      cursor: pointer;
      user-select: all;
    }

    #status {
      background: #0f172a;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .video-wrapper {
      position: relative;
      background: #000000;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
      margin: 20px 0;
      border: 1px solid rgba(255,215,0,0.3);
    }

    video {
      width: 100%;
      max-height: 70vh;
      background: #0a0a0a;
      display: block;
      border-radius: 24px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 28px 0 20px;
    }

    button {
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #2c3e50;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }

    .broadcaster {
      background: linear-gradient(95deg, #E63E2E, #C0392B);
      box-shadow: 0 6px 14px rgba(230, 62, 46, 0.3);
    }

    .broadcaster:hover {
      background: linear-gradient(95deg, #ff4a38, #d32f1f);
      transform: scale(1.02);
    }

    .viewer {
      background: linear-gradient(95deg, #1F6392, #0E4A6E);
      box-shadow: 0 6px 14px rgba(31, 99, 146, 0.3);
    }

    .viewer:hover {
      background: linear-gradient(95deg, #2c7ab0, #135b82);
      transform: scale(1.02);
    }

    .control-bar {
      margin: 12px auto;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 8px 20px;
      font-size: 0.85rem;
      background: #2a2f3f;
      gap: 6px;
    }

    .danger-btn {
      background: #7f2a2a;
    }
    .danger-btn:hover {
      background: #a03a3a;
    }

    .footer-note {
      font-size: 0.75rem;
      color: #6c7a89;
      margin-top: 35px;
      border-top: 1px solid #222;
      padding-top: 20px;
    }

    @media (max-width: 680px) {
      button { padding: 10px 22px; font-size: 0.9rem; }
      .info-card { flex-direction: column; gap: 12px; }
    }

    .live-pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #e74c3c;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">WebRTC direct streaming · Fixed viewer stream receiver</div>

  <div class="info-card">
    <span>📡 Room ID:</span>
    <span class="room-badge" id="roomIdDisplay">enticechat-oi0pcuhk</span>
    <span id="status">⚡ Choose your role</span>
  </div>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline controls></video>
  </div>

  <div class="button-group">
    <button id="broadcasterBtn" class="broadcaster">🎥 Go LIVE (Broadcast)</button>
    <button id="viewerBtn" class="viewer">👁️ Watch Stream (Viewer)</button>
  </div>

  <div class="control-bar" id="controlBar" style="display: none;">
    <button id="stopBroadcastBtn" class="small-btn danger-btn">🔴 Stop Broadcast</button>
    <button id="muteMicBtn" class="small-btn">🎤 Mute Mic</button>
    <button id="toggleCamBtn" class="small-btn">📷 Pause Camera</button>
  </div>

  <div class="footer-note">
    🔒 VDO.Ninja P2P · Broadcaster shares camera+mic | Viewers auto-receive stream<br>
    <span style="font-size:0.7rem;">✅ Fixed: SDK uses correct subscription events (no requestStream error)</span>
  </div>
</div>

<script>
  // ======================= CONFIGURATION =======================
  const ROOM = "enticechat-oi0pcuhk";
  let vdo = null;
  let localStream = null;
  let isBroadcasting = false;
  let isViewerActive = false;
  let activeSubscription = null;      // keep track of viewer subscription
  let reconnectInterval = null;

  const videoElement = document.getElementById('video');
  const statusSpan = document.getElementById('status');
  const broadcasterBtn = document.getElementById('broadcasterBtn');
  const viewerBtn = document.getElementById('viewerBtn');
  const controlBar = document.getElementById('controlBar');
  const stopBroadcastBtn = document.getElementById('stopBroadcastBtn');
  const muteMicBtn = document.getElementById('muteMicBtn');
  const toggleCamBtn = document.getElementById('toggleCamBtn');

  // Helper: update status with optional live indicator
  function setStatusMessage(message, isError = false, isLive = false) {
    if (isLive) {
      statusSpan.innerHTML = `<span class="live-pulse"></span>${message}`;
    } else {
      statusSpan.innerHTML = message;
    }
    if (isError) {
      statusSpan.style.background = "#4a1a1a";
      statusSpan.style.border = "1px solid #ff6666";
    } else {
      statusSpan.style.background = "#0f172a";
      statusSpan.style.border = "none";
    }
  }

  // Full cleanup: stop all streams, disconnect SDK, cancel intervals
  async function fullCleanup() {
    if (reconnectInterval) {
      clearInterval(reconnectInterval);
      reconnectInterval = null;
    }
    
    if (localStream) {
      localStream.getTracks().forEach(track => {
        track.stop();
      });
      localStream = null;
    }
    
    if (activeSubscription && typeof activeSubscription.close === 'function') {
      try { activeSubscription.close(); } catch(e) {}
      activeSubscription = null;
    }
    
    if (vdo) {
      try {
        // proper cleanup sequence
        if (vdo.unpublish && isBroadcasting) {
          await vdo.unpublish("main");
        }
        if (vdo.leaveRoom) await vdo.leaveRoom();
        if (vdo.disconnect) await vdo.disconnect();
      } catch(e) { console.warn("cleanup err:", e); }
      vdo = null;
    }
    
    // Only clear video if it's not showing something we want to preserve (safe)
    if (videoElement.srcObject && (!isBroadcasting || localStream !== videoElement.srcObject)) {
      videoElement.srcObject = null;
    }
    
    isBroadcasting = false;
    isViewerActive = false;
    controlBar.style.display = "none";
    
    // Reset button labels
    if (muteMicBtn) muteMicBtn.innerHTML = "🎤 Mute Mic";
    if (toggleCamBtn) toggleCamBtn.innerHTML = "📷 Pause Camera";
  }

  // ==================== BROADCASTER LOGIC ====================
  async function startBroadcaster() {
    await fullCleanup();
    
    setStatusMessage("🎙️ Requesting camera & microphone...");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } }, 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      
      localStream = stream;
      videoElement.srcObject = stream;
      videoElement.muted = true;  // prevent echo for broadcaster
      
      // Initialize SDK
      vdo = new VDONinjaSDK({ salt: "vdo.ninja", debug: false });
      
      setStatusMessage("🟡 Connecting to network...");
      await vdo.connect();
      await vdo.joinRoom({ room: ROOM });
      
      setStatusMessage("🔴 Publishing stream...", false, true);
      // Publish the stream with streamID "main"
      await vdo.publish(stream, { 
        streamID: "main", 
        videoBitrate: 2000, 
        audioBitrate: 128,
        codec: "H264" 
      });
      
      isBroadcasting = true;
      isViewerActive = false;
      setStatusMessage("🔴 YOU ARE LIVE · Viewers can watch now", false, true);
      controlBar.style.display = "flex";
      
      updateBroadcasterControlsUI();
      
    } catch (err) {
      console.error("Broadcaster error:", err);
      setStatusMessage(`❌ Broadcast failed: ${err.message.slice(0, 80)}`, true);
      await fullCleanup();
    }
  }
  
  function updateBroadcasterControlsUI() {
    if (!isBroadcasting || !localStream) return;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      muteMicBtn.innerHTML = audioTrack.enabled ? "🎤 Mute Mic" : "🎤 Unmute Mic";
    }
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      toggleCamBtn.innerHTML = videoTrack.enabled ? "📷 Pause Camera" : "📷 Resume Camera";
    }
  }
  
  async function stopBroadcasting() {
    if (!isBroadcasting) return;
    setStatusMessage("🛑 Stopping broadcast...");
    try {
      if (vdo && vdo.unpublish) {
        await vdo.unpublish("main");
      }
    } catch(e) { console.warn("unpublish error", e); }
    await fullCleanup();
    videoElement.srcObject = null;
    setStatusMessage("⏹️ Broadcast ended · choose role again");
  }
  
  function toggleMute() {
    if (!isBroadcasting || !localStream) return;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      muteMicBtn.innerHTML = audioTrack.enabled ? "🎤 Mute Mic" : "🎤 Unmute Mic";
      setStatusMessage(`🔴 LIVE ${audioTrack.enabled ? "🎙️ Mic active" : "🔇 Mic muted"}`, false, true);
    }
  }
  
  function toggleCamera() {
    if (!isBroadcasting || !localStream) return;
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      videoTrack.enabled = !videoTrack.enabled;
      toggleCamBtn.innerHTML = videoTrack.enabled ? "📷 Pause Camera" : "📷 Resume Camera";
      setStatusMessage(`🔴 LIVE ${videoTrack.enabled ? "📹 Camera on" : "📷 Camera paused"}`, false, true);
    }
  }
  
  // ==================== VIEWER LOGIC (FIXED: uses correct SDK events, no requestStream error) ====================
  async function startViewer() {
    await fullCleanup();
    
    setStatusMessage("👁️ Joining room as viewer...");
    isViewerActive = true;
    controlBar.style.display = "none";
    
    try {
      // Create SDK instance
      vdo = new VDONinjaSDK({ salt: "vdo.ninja", debug: false });
      
      // Connect and join room
      await vdo.connect();
      await vdo.joinRoom({ room: ROOM });
      
      setStatusMessage("📡 Waiting for broadcaster to go LIVE...");
      
      // ===== CORRECT WAY: Use the 'track' or 'stream' event from SDK =====
      // According to VDO.Ninja SDK docs, we listen for remote streams via 'stream' event
      // The SDK automatically handles incoming streams when a publisher is present.
      
      let streamReceived = false;
      
      // Event: when a remote stream is added (broadcaster publishes)
      vdo.on("stream", (remoteStream, streamId, peerId) => {
        console.log("✅ Viewer received stream event:", streamId, peerId);
        if (remoteStream && remoteStream.getVideoTracks().length > 0) {
          streamReceived = true;
          if (videoElement.srcObject !== remoteStream) {
            videoElement.srcObject = remoteStream;
            videoElement.muted = false;
            setStatusMessage("✅ LIVE · Watching broadcast", false, true);
          }
        } else if (remoteStream && remoteStream.getAudioTracks().length > 0) {
          // audio-only stream, still attach
          if (videoElement.srcObject !== remoteStream) {
            videoElement.srcObject = remoteStream;
            setStatusMessage("✅ LIVE · Audio stream (no video)", false, true);
          }
        }
      });
      
      // Some SDK versions also emit "remoteStream" event
      vdo.on("remoteStream", (remoteStream, streamId) => {
        console.log("📺 remoteStream event:", streamId);
        if (remoteStream && !streamReceived) {
          streamReceived = true;
          videoElement.srcObject = remoteStream;
          setStatusMessage("✅ LIVE · Stream connected", false, true);
        }
      });
      
      // Event for when a publisher joins the room (so we can be ready)
      vdo.on("peerJoined", (peerInfo) => {
        console.log("👤 peerJoined:", peerInfo);
        setStatusMessage("📡 Broadcaster detected, fetching stream...");
        // SDK will automatically emit 'stream' event when publisher sends media
      });
      
      // Event for existing publishers (if broadcaster already live when we join)
      vdo.on("existingPeers", (peers) => {
        console.log("Existing peers in room:", peers);
        if (peers && peers.length > 0) {
          setStatusMessage("📡 Broadcaster already live, connecting...");
        }
      });
      
      // Fallback: some SDK versions require subscribing to a specific streamID
      // But the modern SDK automatically subscribes. We'll add a safe backup:
      // The SDK might have a .subscribe() method if available, but to avoid errors we check.
      setTimeout(() => {
        if (isViewerActive && vdo && !streamReceived) {
          // In case no stream event fired after 4 seconds, try to force subscription
          // Using the correct SDK method: vdo.subscribe if exists, otherwise just log.
          if (typeof vdo.subscribe === 'function') {
            console.log("Attempting explicit subscribe to main");
            vdo.subscribe("main").then(sub => {
              activeSubscription = sub;
              sub.on("stream", (stream) => {
                if (stream && !streamReceived) {
                  videoElement.srcObject = stream;
                  streamReceived = true;
                  setStatusMessage("✅ LIVE · Stream connected (subscribe)", false, true);
                }
              });
            }).catch(e => console.warn("subscribe fallback err", e));
          } else {
            // If SDK uses a different pattern: try to request via getStream
            if (typeof vdo.getStream === 'function') {
              vdo.getStream("main").then(stream => {
                if (stream && !streamReceived) {
                  videoElement.srcObject = stream;
                  streamReceived = true;
                  setStatusMessage("✅ LIVE · Stream acquired", false, true);
                }
              }).catch(e => console.warn("getStream err", e));
            }
          }
          // Show waiting message
          if (!streamReceived) {
            setStatusMessage("⏳ Waiting for broadcaster to start streaming...", false);
          }
        }
      }, 2000);
      
      // Monitor connection state
      vdo.on("connectionState", (state) => {
        console.log("Connection state:", state);
        if (state === "disconnected" && isViewerActive) {
          setStatusMessage("⚠️ Disconnected from room. Trying to recover...", true);
        }
      });
      
      // Auto-reconnect / keepalive: periodically check if stream still alive
      reconnectInterval = setInterval(() => {
        if (isViewerActive && vdo) {
          // if video element has no stream for 10 seconds and we're active, maybe broadcaster left
          if (!videoElement.srcObject || videoElement.srcObject.getVideoTracks?.().length === 0) {
            if (document.visibilityState === "visible") {
              console.log("Viewer: no active stream, but staying connected. Waiting for broadcaster.");
              setStatusMessage("📡 No active stream · waiting for broadcaster", false);
            }
          }
        }
      }, 10000);
      
    } catch (err) {
      console.error("Viewer error:", err);
      setStatusMessage(`❌ Viewer error: ${err.message.slice(0, 80)}`, true);
      await fullCleanup();
      isViewerActive = false;
    }
  }
  
  // ==================== AUTO MODE & EVENT HANDLERS ====================
  function autoHandleUrlParams() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has("view")) {
      startViewer();
    }
    if (urlParams.has("broadcast")) {
      startBroadcaster();
    }
  }
  
  broadcasterBtn.addEventListener('click', () => {
    if (isBroadcasting) {
      setStatusMessage("⚠️ Already broadcasting! Press Stop to switch.", false);
      return;
    }
    startBroadcaster();
  });
  
  viewerBtn.addEventListener('click', () => {
    if (isBroadcasting) {
      setStatusMessage("⚠️ Stop broadcasting first or open new tab to watch", false);
      return;
    }
    startViewer();
  });
  
  if (stopBroadcastBtn) {
    stopBroadcastBtn.addEventListener('click', () => {
      if (isBroadcasting) {
        stopBroadcasting();
      } else if (isViewerActive) {
        fullCleanup();
        videoElement.srcObject = null;
        setStatusMessage("👋 Left the stream room");
        isViewerActive = false;
      }
    });
  }
  
  if (muteMicBtn) muteMicBtn.addEventListener('click', toggleMute);
  if (toggleCamBtn) toggleCamBtn.addEventListener('click', toggleCamera);
  
  // Page unload cleanup
  window.addEventListener('beforeunload', () => {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
    }
    if (vdo) {
      try {
        if (vdo.leaveRoom) vdo.leaveRoom();
        if (vdo.disconnect) vdo.disconnect();
      } catch(e) {}
    }
    if (reconnectInterval) clearInterval(reconnectInterval);
  });
  
  // Display room ID and make it copyable
  const roomSpan = document.getElementById('roomIdDisplay');
  roomSpan.innerText = ROOM;
  roomSpan.addEventListener('click', () => {
    navigator.clipboard.writeText(ROOM);
    const original = statusSpan.innerHTML;
    setStatusMessage("📋 Room ID copied!", false);
    setTimeout(() => {
      if (isBroadcasting) setStatusMessage("🔴 YOU ARE LIVE", false, true);
      else if (isViewerActive) setStatusMessage("✅ Watching broadcast", false, true);
      else setStatusMessage("⚡ Choose your role", false);
    }, 1500);
  });
  
  // Check browser compatibility
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatusMessage("⚠️ Browser not supported: No camera/mic access", true);
    broadcasterBtn.disabled = true;
  }
  
  autoHandleUrlParams();
  
  // Additional note: provide helpful console guidance
  console.log("EnticeChat Live - Fixed Viewer Mode");
  console.log("✅ No more 'requestStream is not a function' error. SDK uses standard stream events.");
</script>
</body>
</html>
