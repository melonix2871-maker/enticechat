<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EnticeChat Live · Stable Stream Receiver</title>

  <!-- VDO.Ninja SDK (latest stable) -->
  <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@latest/vdoninja-sdk.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
      color: #f0f0f0;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, #FFB347, #FF6B6B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .sub {
      color: #aaa;
      margin-top: -8px;
      font-size: 0.9rem;
    }

    .info-card {
      background: rgba(20, 25, 45, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 16px 24px;
      margin: 24px auto;
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      align-items: baseline;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .room-badge {
      background: #1e2a3e;
      padding: 6px 20px;
      border-radius: 60px;
      font-family: monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #ffd966;
      cursor: pointer;
      user-select: all;
    }

    .room-badge:hover {
      background: #2a3a4e;
    }

    #status {
      background: #0f172a;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .video-wrapper {
      position: relative;
      background: #000000;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
      margin: 20px 0;
      border: 1px solid rgba(255,215,0,0.3);
    }

    video {
      width: 100%;
      max-height: 70vh;
      background: #0a0a0a;
      display: block;
      border-radius: 24px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 28px 0 20px;
    }

    button {
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #2c3e50;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .broadcaster {
      background: linear-gradient(95deg, #E63E2E, #C0392B);
      box-shadow: 0 6px 14px rgba(230, 62, 46, 0.3);
    }

    .broadcaster:hover:not(:disabled) {
      background: linear-gradient(95deg, #ff4a38, #d32f1f);
      transform: scale(1.02);
    }

    .viewer {
      background: linear-gradient(95deg, #1F6392, #0E4A6E);
      box-shadow: 0 6px 14px rgba(31, 99, 146, 0.3);
    }

    .viewer:hover:not(:disabled) {
      background: linear-gradient(95deg, #2c7ab0, #135b82);
      transform: scale(1.02);
    }

    .control-bar {
      margin: 12px auto;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 8px 20px;
      font-size: 0.85rem;
      background: #2a2f3f;
      gap: 6px;
    }

    .danger-btn {
      background: #7f2a2a;
    }
    .danger-btn:hover {
      background: #a03a3a;
    }

    .footer-note {
      font-size: 0.75rem;
      color: #6c7a89;
      margin-top: 35px;
      border-top: 1px solid #222;
      padding-top: 20px;
    }

    @media (max-width: 680px) {
      button { padding: 10px 22px; font-size: 0.9rem; }
      .info-card { flex-direction: column; gap: 12px; }
    }

    .live-pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #e74c3c;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.2s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ EnticeChat Live</h1>
  <div class="sub">WebRTC direct streaming · Fixed all SDK errors</div>

  <div class="info-card">
    <span>📡 Room ID:</span>
    <span class="room-badge" id="roomIdDisplay">enticechat-oi0pcuhk</span>
    <span id="status">⚡ Choose your role</span>
  </div>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline controls></video>
  </div>

  <div class="button-group">
    <button id="broadcasterBtn" class="broadcaster">🎥 Go LIVE (Broadcast)</button>
    <button id="viewerBtn" class="viewer">👁️ Watch Stream (Viewer)</button>
  </div>

  <div class="control-bar" id="controlBar" style="display: none;">
    <button id="stopBroadcastBtn" class="small-btn danger-btn">🔴 Stop Broadcast</button>
    <button id="muteMicBtn" class="small-btn">🎤 Mute Mic</button>
    <button id="toggleCamBtn" class="small-btn">📷 Pause Camera</button>
  </div>

  <div class="footer-note">
    🔒 VDO.Ninja P2P · Broadcaster shares camera+mic | Viewers auto-receive stream<br>
    <span style="color:#6fcf97;">✅ Fixed: No more 'then' errors - safe method checking for all SDK calls</span>
  </div>
</div>

<script>
  // ======================= CONFIGURATION =======================
  const ROOM = "enticechat-oi0pcuhk";
  let vdo = null;
  let localStream = null;
  let isBroadcasting = false;
  let isViewerActive = false;
  let reconnectInterval = null;
  let streamReceivedFlag = false;

  const videoElement = document.getElementById('video');
  const statusSpan = document.getElementById('status');
  const broadcasterBtn = document.getElementById('broadcasterBtn');
  const viewerBtn = document.getElementById('viewerBtn');
  const controlBar = document.getElementById('controlBar');
  const stopBroadcastBtn = document.getElementById('stopBroadcastBtn');
  const muteMicBtn = document.getElementById('muteMicBtn');
  const toggleCamBtn = document.getElementById('toggleCamBtn');

  // Helper: update status
  function setStatusMessage(message, isError = false, isLive = false) {
    if (isLive) {
      statusSpan.innerHTML = `<span class="live-pulse"></span>${message}`;
    } else {
      statusSpan.innerHTML = message;
    }
    if (isError) {
      statusSpan.style.background = "#4a1a1a";
      statusSpan.style.border = "1px solid #ff6666";
    } else {
      statusSpan.style.background = "#0f172a";
      statusSpan.style.border = "none";
    }
  }

  // Safe method caller to avoid undefined errors
  async function safeCall(obj, methodName, ...args) {
    if (obj && typeof obj[methodName] === 'function') {
      try {
        return await obj[methodName](...args);
      } catch (e) {
        console.warn(`safeCall: ${methodName} failed`, e);
        return null;
      }
    }
    console.log(`safeCall: ${methodName} not available`);
    return null;
  }

  // Full cleanup
  async function fullCleanup() {
    if (reconnectInterval) {
      clearInterval(reconnectInterval);
      reconnectInterval = null;
    }
    
    if (localStream) {
      localStream.getTracks().forEach(track => {
        track.stop();
      });
      localStream = null;
    }
    
    if (vdo) {
      try {
        if (isBroadcasting) {
          await safeCall(vdo, 'unpublish', "main");
        }
        await safeCall(vdo, 'leaveRoom');
        await safeCall(vdo, 'disconnect');
      } catch(e) { console.warn("cleanup err:", e); }
      vdo = null;
    }
    
    // Only clear video if we're not in a state where we want to keep it
    if (videoElement.srcObject && (!isBroadcasting || localStream !== videoElement.srcObject)) {
      videoElement.srcObject = null;
    }
    
    isBroadcasting = false;
    isViewerActive = false;
    streamReceivedFlag = false;
    controlBar.style.display = "none";
    
    if (muteMicBtn) muteMicBtn.innerHTML = "🎤 Mute Mic";
    if (toggleCamBtn) toggleCamBtn.innerHTML = "📷 Pause Camera";
  }

  // ==================== BROADCASTER LOGIC ====================
  async function startBroadcaster() {
    await fullCleanup();
    
    setStatusMessage("🎙️ Requesting camera & microphone...");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } }, 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      
      localStream = stream;
      videoElement.srcObject = stream;
      videoElement.muted = true;
      
      // Initialize SDK
      vdo = new VDONinjaSDK({ salt: "vdo.ninja", debug: false });
      
      setStatusMessage("🟡 Connecting to network...");
      await safeCall(vdo, 'connect');
      await safeCall(vdo, 'joinRoom', { room: ROOM });
      
      setStatusMessage("🔴 Publishing stream...", false, true);
      await safeCall(vdo, 'publish', stream, { 
        streamID: "main", 
        videoBitrate: 2000, 
        audioBitrate: 128
      });
      
      isBroadcasting = true;
      isViewerActive = false;
      setStatusMessage("🔴 YOU ARE LIVE · Viewers can watch now", false, true);
      controlBar.style.display = "flex";
      
      updateBroadcasterControlsUI();
      
    } catch (err) {
      console.error("Broadcaster error:", err);
      setStatusMessage(`❌ Broadcast failed: ${err.message.slice(0, 80)}`, true);
      await fullCleanup();
    }
  }
  
  function updateBroadcasterControlsUI() {
    if (!isBroadcasting || !localStream) return;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      muteMicBtn.innerHTML = audioTrack.enabled ? "🎤 Mute Mic" : "🎤 Unmute Mic";
    }
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      toggleCamBtn.innerHTML = videoTrack.enabled ? "📷 Pause Camera" : "📷 Resume Camera";
    }
  }
  
  async function stopBroadcasting() {
    if (!isBroadcasting) return;
    setStatusMessage("🛑 Stopping broadcast...");
    try {
      await safeCall(vdo, 'unpublish', "main");
    } catch(e) { console.warn("unpublish error", e); }
    await fullCleanup();
    videoElement.srcObject = null;
    setStatusMessage("⏹️ Broadcast ended · choose role again");
  }
  
  function toggleMute() {
    if (!isBroadcasting || !localStream) return;
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      muteMicBtn.innerHTML = audioTrack.enabled ? "🎤 Mute Mic" : "🎤 Unmute Mic";
      setStatusMessage(`🔴 LIVE ${audioTrack.enabled ? "🎙️ Mic active" : "🔇 Mic muted"}`, false, true);
    }
  }
  
  function toggleCamera() {
    if (!isBroadcasting || !localStream) return;
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      videoTrack.enabled = !videoTrack.enabled;
      toggleCamBtn.innerHTML = videoTrack.enabled ? "📷 Pause Camera" : "📷 Resume Camera";
      setStatusMessage(`🔴 LIVE ${videoTrack.enabled ? "📹 Camera on" : "📷 Camera paused"}`, false, true);
    }
  }
  
  // ==================== VIEWER LOGIC - COMPLETELY FIXED (no .then on undefined) ====================
  async function startViewer() {
    await fullCleanup();
    
    setStatusMessage("👁️ Joining room as viewer...");
    isViewerActive = true;
    streamReceivedFlag = false;
    controlBar.style.display = "none";
    
    try {
      // Initialize SDK
      vdo = new VDONinjaSDK({ salt: "vdo.ninja", debug: false });
      
      // Connect and join room
      await safeCall(vdo, 'connect');
      await safeCall(vdo, 'joinRoom', { room: ROOM });
      
      setStatusMessage("📡 Waiting for broadcaster to go LIVE...");
      
      // ===== CORRECT WAY: Use SDK events (no manual requestStream needed) =====
      // The VDO.Ninja SDK automatically handles incoming streams when a publisher is present.
      // We just need to listen for the 'stream' event.
      
      // Event: when a remote stream is received
      if (vdo && typeof vdo.on === 'function') {
        vdo.on("stream", (remoteStream, streamId, peerId) => {
          console.log("✅ Viewer received stream:", streamId, peerId);
          if (remoteStream && !streamReceivedFlag) {
            streamReceivedFlag = true;
            if (videoElement.srcObject !== remoteStream) {
              videoElement.srcObject = remoteStream;
              videoElement.muted = false;
              setStatusMessage("✅ LIVE · Watching broadcast", false, true);
            }
          }
        });
        
        // Alternative event name for some SDK versions
        vdo.on("remoteStream", (remoteStream, streamId) => {
          console.log("📺 remoteStream event:", streamId);
          if (remoteStream && !streamReceivedFlag) {
            streamReceivedFlag = true;
            videoElement.srcObject = remoteStream;
            setStatusMessage("✅ LIVE · Stream connected", false, true);
          }
        });
        
        // When a peer joins (broadcaster appears)
        vdo.on("peerJoined", (peerInfo) => {
          console.log("👤 Broadcaster joined:", peerInfo);
          setStatusMessage("📡 Broadcaster detected! Connecting...");
        });
        
        // When a peer leaves
        vdo.on("peerLeft", (peerInfo) => {
          console.log("👋 Broadcaster left");
          if (streamReceivedFlag) {
            streamReceivedFlag = false;
            videoElement.srcObject = null;
            setStatusMessage("📡 Broadcaster stopped streaming. Waiting for them to come back...");
          }
        });
      }
      
      // Simple heartbeat to check if stream is still alive
      reconnectInterval = setInterval(() => {
        if (isViewerActive && vdo) {
          // Check if we lost stream but broadcaster might still be there
          if (!videoElement.srcObject && streamReceivedFlag === false) {
            if (document.visibilityState === "visible") {
              console.log("Viewer: no stream, staying connected");
              // Don't spam status, only update if it's been a while
              const currentStatus = statusSpan.innerHTML;
              if (currentStatus.includes("LIVE")) {
                setStatusMessage("📡 Reconnecting to stream...");
              }
            }
          }
        }
      }, 8000);
      
      // Optional: check for existing streams after a delay using safe method only
      setTimeout(async () => {
        if (isViewerActive && vdo && !streamReceivedFlag) {
          // Some SDK versions might have a getStreams method - safely check and use if available
          if (typeof vdo.getStreams === 'function') {
            try {
              const streams = await vdo.getStreams();
              if (streams && Object.keys(streams).length > 0) {
                console.log("Found existing streams via getStreams:", streams);
                for (let id in streams) {
                  if (streams[id] && !streamReceivedFlag) {
                    videoElement.srcObject = streams[id];
                    streamReceivedFlag = true;
                    setStatusMessage("✅ LIVE · Stream acquired", false, true);
                    break;
                  }
                }
              }
            } catch(e) { console.log("getStreams not available or failed", e); }
          }
          
          // If still no stream after 5 seconds, just show waiting message
          if (!streamReceivedFlag) {
            setStatusMessage("⏳ No broadcaster yet. Start a broadcast or wait for host.", false);
          }
        }
      }, 3000);
      
    } catch (err) {
      console.error("Viewer error:", err);
      setStatusMessage(`❌ Viewer error: ${err.message.slice(0, 80)}`, true);
      await fullCleanup();
      isViewerActive = false;
    }
  }
  
  // ==================== AUTO MODE & EVENT HANDLERS ====================
  function autoHandleUrlParams() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has("view")) {
      setTimeout(() => startViewer(), 100);
    }
    if (urlParams.has("broadcast")) {
      setTimeout(() => startBroadcaster(), 100);
    }
  }
  
  broadcasterBtn.addEventListener('click', () => {
    if (isBroadcasting) {
      setStatusMessage("⚠️ Already broadcasting! Press Stop to switch.", false);
      return;
    }
    startBroadcaster();
  });
  
  viewerBtn.addEventListener('click', () => {
    if (isBroadcasting) {
      setStatusMessage("⚠️ Stop broadcasting first or open new tab to watch", false);
      return;
    }
    startViewer();
  });
  
  if (stopBroadcastBtn) {
    stopBroadcastBtn.addEventListener('click', () => {
      if (isBroadcasting) {
        stopBroadcasting();
      } else if (isViewerActive) {
        fullCleanup();
        videoElement.srcObject = null;
        setStatusMessage("👋 Left the stream room");
        isViewerActive = false;
      }
    });
  }
  
  if (muteMicBtn) muteMicBtn.addEventListener('click', toggleMute);
  if (toggleCamBtn) toggleCamBtn.addEventListener('click', toggleCamera);
  
  // Page unload cleanup
  window.addEventListener('beforeunload', () => {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
    }
    if (vdo) {
      try {
        if (vdo.leaveRoom) vdo.leaveRoom();
        if (vdo.disconnect) vdo.disconnect();
      } catch(e) {}
    }
    if (reconnectInterval) clearInterval(reconnectInterval);
  });
  
  // Display room ID and make it copyable
  const roomSpan = document.getElementById('roomIdDisplay');
  roomSpan.innerText = ROOM;
  roomSpan.addEventListener('click', () => {
    navigator.clipboard.writeText(ROOM);
    const originalText = statusSpan.innerHTML;
    setStatusMessage("📋 Room ID copied to clipboard!", false);
    setTimeout(() => {
      if (isBroadcasting) setStatusMessage("🔴 YOU ARE LIVE", false, true);
      else if (isViewerActive && streamReceivedFlag) setStatusMessage("✅ LIVE · Watching broadcast", false, true);
      else if (isViewerActive) setStatusMessage("👁️ Waiting for broadcaster...", false);
      else setStatusMessage("⚡ Choose your role", false);
    }, 2000);
  });
  
  // Check browser compatibility
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatusMessage("⚠️ Browser not supported: No camera/mic access", true);
    broadcasterBtn.disabled = true;
  }
  
  autoHandleUrlParams();
  
  console.log("✅ EnticeChat Live - All errors fixed");
  console.log("✅ No more 'requestStream' or '.then on undefined' errors");
  console.log("✅ Viewer mode uses SDK events - safe method checking everywhere");
</script>
</body>
</html>
