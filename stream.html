<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnticeChat P2P Broadcast (Novage Style)</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="importmap">
  {
    "imports": {
      "p2p-media-loader-core": "https://cdn.jsdelivr.net/npm/p2p-media-loader-core@latest/dist/p2p-media-loader-core.es.min.js",
      "p2p-media-loader-hlsjs": "https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@latest/dist/p2p-media-loader-hlsjs.es.min.js"
    }
  }
  </script>

  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; text-align:center; margin:0; padding:20px; }
    video { max-width:100%; width:100%; max-height:80vh; background:#000; border-radius:10px; }
    .stats { margin:20px; padding:15px; background:#222; border-radius:8px; }
  </style>
</head>
<body>
  <h1>EnticeChat P2P Live Broadcast</h1>
  <video id="video" controls autoplay playsinline></video>

  <div class="stats">
    Status: <span id="status">Loading...</span><br>
    Peers: <span id="peers">0</span> | P2P Data: <span id="p2p">0 MB</span>
  </div>

  <script type="module">
    import { HlsJsP2PEngine } from "p2p-media-loader-hlsjs";

    const video = document.getElementById('video');
    let hls = null;

    // Replace this with your real HLS URL (from go2rtc, SRS, etc.)
    const STREAM_URL = "https://your-hls-source.example.com/live/stream.m3u8";

   const engine = new HlsJsP2PEngine({
  core: {
    announceTrackers: [
      "wss://tracker.novage.com.ua",
      "wss://tracker.webtorrent.dev",
      "wss://tracker.openwebtorrent.com"
    ],
    // Optional: group your viewers together
    swarmId: "enticechat-live-" + "junielive"   // change this per broadcast
  }
});

    hls = new Hls({
      ...engine.getConfigForHlsJs(),
      enableWorker: true
    });

    hls.loadSource(STREAM_URL);
    hls.attachMedia(video);

    // Simple stats
    setInterval(() => {
      const peerCount = engine.getPeers ? engine.getPeers().length : 0;
      document.getElementById('peers').textContent = peerCount;
    }, 3000);

    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) console.error("HLS Error", data);
    });
  </script>
</body>
</html>
